<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pénélope</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f9fafb;--bg2:#fff;--bg3:#f3f4f6;--bg4:#e5e7eb;
  --text:#111827;--text2:#6b7280;--text3:#9ca3af;
  --border:#e5e7eb;--border2:#d1d5db;
  --green:#059669;--green-bg:#ecfdf5;
  --blue:#2563eb;--blue-bg:#eff6ff;
  --amber:#d97706;--amber-bg:#fffbeb;
  --red:#dc2626;--red-bg:#fef2f2;
  --purple:#7c3aed;--purple-bg:#f5f3ff;
  --pink:#db2777;--pink-bg:#fdf2f8;
  --r:8px;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;}
.app{display:flex;height:100vh;overflow:hidden;}

/* Sidebar */
.sidebar{width:240px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sb-logo{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;}
.sb-logo-mark{width:26px;height:26px;background:#111827;border-radius:5px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0;}
.sb-logo h1{font-size:14px;font-weight:600;letter-spacing:-.2px;}
.sb-logo p{font-size:11px;color:var(--text3);}
.sb-section{padding:14px 12px 4px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;}
.sb-item{display:flex;align-items:center;gap:8px;padding:6px 10px;margin:1px 4px;border-radius:6px;cursor:pointer;font-size:12.5px;color:var(--text2);transition:all .1s;}
.sb-item:hover{background:var(--bg3);color:var(--text);}
.sb-item.active{background:var(--bg3);color:var(--text);font-weight:500;}
.sb-item svg{flex-shrink:0;opacity:.6;}
.sb-item.active svg,.sb-item:hover svg{opacity:1;}
.sb-sub{padding-left:20px;}
.sb-user{padding:10px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;margin:auto 4px 4px;}
.sb-avatar{width:24px;height:24px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;}

/* Main */
.main{flex:1;overflow-y:auto;background:var(--bg);}
.pg{padding:24px 28px;max-width:1100px;}
.pg-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.pg-title{font-size:18px;font-weight:600;letter-spacing:-.3px;}
.pg-sub{font-size:12.5px;color:var(--text2);margin-top:2px;}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:0;margin-bottom:18px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--border);}
.stat{background:#fff;padding:14px 16px;}
.stat-l{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500;}
.stat-v{font-size:21px;font-weight:600;letter-spacing:-.6px;line-height:1.1;}

/* Card */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:10px;}

/* Badges */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px;white-space:nowrap;}
.b-green{background:#ecfdf5;color:#065f46;}
.b-blue{background:#eff6ff;color:#1e40af;}
.b-amber{background:#fffbeb;color:#92400e;}
.b-red{background:#fef2f2;color:#991b1b;}
.b-purple{background:#f5f3ff;color:#5b21b6;}
.b-gray{background:#f9fafb;color:#374151;border:1px solid var(--border);}
.b-pink{background:#fdf2f8;color:#9d174d;}
/* Sources */
.b-direct{background:#ecfdf5;color:#065f46;}
.b-airbnb{background:#fef2f2;color:#991b1b;}
.b-roadstr{background:#f5f3ff;color:#5b21b6;}
.b-gdc{background:#eff6ff;color:#1e40af;}
.b-mrm{background:#f9fafb;color:#374151;border:1px solid var(--border);}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:6px;border:1px solid var(--border2);background:#fff;color:var(--text);font-size:12.5px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap;}
.btn:hover{background:var(--bg3);}
.btn-primary{background:#111827;color:#fff;border-color:#111827;}
.btn-primary:hover{background:#1f2937;}
.btn-sm{padding:4px 9px;font-size:12px;}
.btn-danger{color:var(--red);}
.btn-danger:hover{background:var(--red-bg);}

/* Filters */
.filters{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
.fpill{padding:4px 11px;border-radius:6px;border:1px solid var(--border);background:#fff;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;font-family:inherit;}
.fpill:hover{background:var(--bg3);}
.fpill.active{background:#111827;color:#fff;border-color:#111827;}
.search-wrap{position:relative;flex:1;min-width:160px;}
.search-box{width:100%;padding:6px 10px 6px 28px;border:1px solid var(--border2);border-radius:6px;font-size:12.5px;background:#fff;color:var(--text);font-family:inherit;}
.search-box:focus{outline:none;border-color:#111827;}
.search-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--text3);}

/* Table */
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--r);}
.tbl{width:100%;border-collapse:collapse;min-width:500px;background:#fff;}
.tbl th{text-align:left;font-size:11px;font-weight:600;color:var(--text2);padding:9px 12px;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--bg3);text-transform:uppercase;letter-spacing:.04em;}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12.5px;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--bg3);}
.tbl tr.clickable{cursor:pointer;}

/* Form */
.fg{margin-bottom:10px;}
.fl{display:block;font-size:12px;color:var(--text2);margin-bottom:3px;font-weight:500;}
.fi{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:5px;font-size:13px;background:#fff;color:var(--text);font-family:inherit;}
.fi:focus{outline:none;border-color:#111827;}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px);}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:10px;padding:22px;width:90%;max-width:500px;max-height:92vh;overflow-y:auto;border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,.15);}
.modal-title{font-size:15px;font-weight:600;margin-bottom:14px;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px;}
.tab{padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);border:none;background:transparent;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--text);border-bottom-color:#111827;}

/* Expandable */
.exp-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;overflow:hidden;}
.exp-head{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;cursor:pointer;}
.exp-head:hover{background:var(--bg3);}
.exp-body{border-top:1px solid var(--border);}
.exp-tabs{display:flex;border-bottom:1px solid var(--border);}
.etab{flex:1;padding:7px 4px;text-align:center;font-size:12px;font-weight:500;cursor:pointer;color:var(--text2);border:none;background:transparent;font-family:inherit;border-bottom:2px solid transparent;}
.etab.active{color:var(--text);border-bottom-color:#111827;}
.exp-panel{padding:12px 14px;}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.il{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;}
.iv{font-size:13px;font-weight:500;}

/* Alerts */
.alert{padding:9px 13px;border-radius:5px;font-size:12.5px;margin-bottom:8px;border:1px solid transparent;}
.a-warn{background:#fffbeb;color:#78350f;border-color:#fde68a;}
.a-red{background:#fef2f2;color:#7f1d1d;border-color:#fca5a5;}
.a-green{background:#ecfdf5;color:#064e3b;border-color:#6ee7b7;}
.a-blue{background:#eff6ff;color:#1e3a8a;border-color:#93c5fd;}

/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.cal-hd{text-align:center;font-size:11px;font-weight:600;color:var(--text2);padding:5px 0;background:var(--bg3);}
.cal-day{min-height:76px;padding:3px 4px;background:#fff;}
.cal-day.today{background:#fefce8;}
.cal-day.we{background:var(--bg3);}
.cal-num{font-size:11px;font-weight:600;margin-bottom:2px;color:var(--text2);}
.cal-day.today .cal-num{color:var(--blue);}
.cal-ev{font-size:9.5px;border-radius:3px;padding:1px 4px;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;font-weight:500;}

/* Pagination */
.pag{display:flex;gap:3px;margin-top:12px;flex-wrap:wrap;}
.pp{padding:4px 9px;border-radius:5px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);font-family:inherit;}
.pp.active{background:#111827;color:#fff;border-color:#111827;}
.pp:hover:not(.active){background:var(--bg3);}

/* Pay row */
.prow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.prow:last-child{border-bottom:none;}

/* Doc pill */
.dpill{display:inline-flex;align-items:center;gap:3px;font-size:12px;padding:3px 9px;border-radius:4px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;margin:2px;font-family:inherit;}

/* Bar */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.bar-lbl{width:100px;font-size:12px;color:var(--text2);flex-shrink:0;}
.bar-bg{flex:1;background:var(--bg4);border-radius:3px;height:6px;}
.bar-fill{height:6px;border-radius:3px;}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text2);}
.spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:#111;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Login */
.login-bg{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);}
.login-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:36px;text-align:center;width:340px;}
.login-logo{font-size:26px;font-weight:700;letter-spacing:-.8px;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:24px;}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:10px;border-radius:6px;border:1px solid var(--border2);background:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;}
.btn-google:hover{background:var(--bg3);}

/* Elisa */
.el-papa{background:#ecfdf5;}
.el-maman{background:#fdf2f8;}
.el-vac-papa{background:#bbf7d0;}
.el-vac-maman{background:#fbcfe8;}

/* Mobile */
@media(max-width:768px){
  .sidebar{position:fixed;left:-240px;top:0;bottom:0;z-index:100;transition:left .2s;}
  .sidebar.open{left:0;}
  .pg{padding:14px 16px;}
  .f2{grid-template-columns:1fr;}
  .stats{grid-template-columns:1fr 1fr;}
}
.mob-bar{display:none;align-items:center;gap:12px;padding:10px 14px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
@media(max-width:768px){.mob-bar{display:flex;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-bg" style="display:none">
  <div class="login-card">
    <div class="login-logo">Pénélope</div>

    <button class="btn-google" onclick="loginGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>

    </button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="mob-bar">
    <button onclick="document.getElementById('sidebar').classList.toggle('open')" style="background:none;border:none;cursor:pointer;font-size:18px;">☰</button>
    <span style="font-size:14px;font-weight:600;">Pénélope</span>
  </div>
  <div class="app">
    <div class="sidebar" id="sidebar">
      <div class="sb-logo">
        <div class="sb-logo-mark">P</div>
        <div><h1>Pénélope</h1><p id="sb-sub">Chargement...</p></div>
      </div>
      <div id="sb-nav" style="flex:1;overflow-y:auto;padding:4px 0;"></div>
      <div class="sb-user">
        <div class="sb-avatar" id="sb-av">?</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="sb-name">—</div>
          <div style="font-size:11px;color:var(--text3)" id="sb-role">—</div>
        </div>
        <button onclick="logout()" style="border:none;background:none;cursor:pointer;color:var(--text3);font-size:11px;">Déco</button>
      </div>

      <div class="loading" id="app-loading"><div class="spin"></div> Chargement...</div>

    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-title" id="m-title"></div>
    <div id="m-body"></div>
    <div class="modal-footer" id="m-footer">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="doSave()">Sauvegarder</button>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ─────────────────────────────────────────────
const SB_URL = 'https://ucoxqqrzdbutvtskpevh.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjb3hxcXJ6ZGJ1dHZ0c2twZXZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjE3NjYsImV4cCI6MjA5MDc5Nzc2Nn0.GYFRNB1nXxUucUEp-1_xanfZOBWho6JjBkbtmFMFhJY';
const db = supabase.createClient(SB_URL, SB_KEY);

// ─── UTILS ───────────────────────────────────────────────
const $ = id => document.getElementById(id);
const set = (id, html) => { const e = $(id); if (e) e.innerHTML = html; };
const fmt = n => (n || 0).toLocaleString('fr-FR', { maximumFractionDigits: 0 });

// Date avec année obligatoire
const fmtDate = s => {
  if (!s) return '—';
  return new Date(s).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' });
};
const fmtShort = s => {
  if (!s) return '—';
  return new Date(s).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' });
};
const fmtMonth = s => {
  if (!s) return '—';
  return new Date(s).toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
};

const today = () => { const d = new Date(); d.setHours(0,0,0,0); return d; };
const todayStr = () => today().toISOString().split('T')[0];
const esc = s => String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;');

// Source badge class
const srcBadge = s => ({ 'Direct': 'b-direct', 'Roadstr': 'b-roadstr', 'MRM': 'b-mrm', 'AirBNB': 'b-airbnb', 'Gens de Confiance': 'b-gdc' }[s] || 'b-gray');
const srcColor = s => ({ 'Direct': '#059669', 'Roadstr': '#7c3aed', 'MRM': '#6b7280', 'AirBNB': '#dc2626', 'Gens de Confiance': '#2563eb' }[s] || '#6b7280');

// Modal
let saveFn = null;
function openModal(title, body, saveCb, extraBtn) {
  $('m-title').textContent = title;
  $('m-body').innerHTML = body;
  saveFn = saveCb;
  let footer = '<button class="btn" onclick="closeModal()">Annuler</button><button class="btn btn-primary" onclick="doSave()">Sauvegarder</button>';
  if (extraBtn) footer = extraBtn + footer;
  $('m-footer').innerHTML = footer;
  $('modal').classList.add('open');
}
function closeModal() { $('modal').classList.remove('open'); saveFn = null; }
function doSave() { if (saveFn) saveFn(); }

// Generic table builder
function mkTable(headers, rows, empty = 'Aucun résultat') {
  if (!rows.length) return `<div style="padding:20px;text-align:center;color:var(--text2)">${empty}</div>`;
  return `<div class="tbl-wrap"><table class="tbl">
    <thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${rows.join('')}</tbody>
  </table></div>`;
}

// Stats row builder
function mkStats(items) {
  return `<div class="stats">${items.map(i =>
    `<div class="stat"><div class="stat-l">${i.l}</div><div class="stat-v" style="color:${i.c||'var(--text)'}">${i.v}</div></div>`
  ).join('')}</div>`;
}

// Pagination
function mkPag(total, perPage, current, onClickFn) {
  const pages = Math.ceil(total / perPage);
  if (pages <= 1) return '';
  let html = '';
  for (let i = 1; i <= Math.min(pages, 9); i++)
    html += `<button class="pp${i === current ? ' active' : ''}" onclick="${onClickFn}(${i})">${i}</button>`;
  if (pages > 9) html += `<span style="color:var(--text3);padding:4px 6px">…${pages}</span>`;
  return `<div class="pag">
    <button class="pp" onclick="${onClickFn}(${Math.max(1, current-1)})" ${current===1?'disabled':''}>←</button>
    ${html}
    <button class="pp" onclick="${onClickFn}(${Math.min(pages, current+1)})" ${current===pages?'disabled':''}>→</button>
  </div>`;
}

// Calendar builder
function mkCalendar(year, month, bookings, colorFn, clickFn) {
  const first = new Date(year, month, 1);
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const startDow = (first.getDay() + 6) % 7;
  const ts = todayStr();
  const firstStr = `${year}-${String(month+1).padStart(2,'0')}-01`;
  const lastStr = `${year}-${String(month+1).padStart(2,'0')}-${String(daysInMonth).padStart(2,'0')}`;

  let html = `<div class="cal-grid">
    ${['Lu','Ma','Me','Je','Ve','Sa','Di'].map(d => `<div class="cal-hd">${d}</div>`).join('')}
    ${Array(startDow).fill('<div class="cal-day we"></div>').join('')}`;

  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const date = new Date(year, month, d);
    const isToday = ds === ts;
    const isWE = date.getDay() === 0 || date.getDay() === 6;
    const dayBk = bookings.filter(b => {
      if (!b.debut) return false;
      const deb = b.debut.substring(0, 10);
      const fin = (b.fin || b.debut).substring(0, 10);
      return deb <= ds && fin >= ds;
    });
    html += `<div class="cal-day${isToday ? ' today' : isWE ? ' we' : ''}">
      <div class="cal-num">${d}</div>
      ${dayBk.map(b => `<div class="cal-ev" onclick="${clickFn}('${b.id}')" style="background:${colorFn(b)}22;color:${colorFn(b)};border-left:2px solid ${colorFn(b)}" title="${esc(b.client||'')} — ${esc(b.voiture||'')}">
        ${(b.voiture || b.client || '').substring(0, 14)}
      </div>`).join('')}
    </div>`;
  }
  return html + '</div>';
}

async function getProfile(user) {
  try {
    const { data } = await db.from('user_profiles').select('*').eq('id', user.id);
    if (data && data.length > 0) return data[0];
    const role = user.email === 'olivier@ykone.com' ? 'admin' : 'viewer';
    const nom = user.user_metadata?.full_name || user.email;
    await db.from('user_profiles').upsert({ id: user.id, email: user.email, nom, role });
    return { id: user.id, email: user.email, nom, role };
  } catch { return { id: user.id, email: user.email, nom: user.email, role: 'admin' }; }
}

db.auth.onAuthStateChange(async (event, session) => {
  if ((event === 'SIGNED_IN' || event === 'INITIAL_SESSION') && session && !_appStarted) {

    await startApp(session.user);
  } else if (event === 'INITIAL_SESSION' && !session) {

  }
  if (event === 'SIGNED_OUT') { _appStarted = false; location.reload(); }
});

// Fallback direct — si onAuthStateChange ne tire pas INITIAL_SESSION
(async () => {
  await new Promise(r => setTimeout(r, 800));
  if (_appStarted) return;
  const { data: { session } } = await db.auth.getSession();
  if (session && !_appStarted) {
    _appStarted = true;
    await startApp(session.user);
  } else if (!session) {
    $('login-screen').style.display = 'flex';
  }
})();

let fleetData = [], fleetCA = {}, fleetDynStatus = {};
let openV = {}, openVTab = {}, fleetFilter = 'tous';

const ST_LBL = { standby: 'Disponible', court: 'En location', long: 'Location longue', repare: 'En réparation', perso: 'Usage perso', leasing: 'Leasing' };
const ST_BADGE = { standby: 'b-green', court: 'b-blue', long: 'b-amber', repare: 'b-red', perso: 'b-blue', leasing: 'b-gray' };

async function renderFlotte() {
  set('app-page', '<div class="loading"><div class="spin"></div> Chargement...</div>');
  const [vRes, bkRes] = await Promise.all([
    db.from('vehicles').select('*').order('nom'),
    db.from('ferdinand_bookings').select('voiture,prix,debut,fin,statut,type_booking,prix_mensuel').not('voiture', 'is', null)
  ]);
  fleetData = vRes.data || [];
  const bookings = bkRes.data || [];
  const ts = todayStr();
  const tom = new Date(); tom.setDate(tom.getDate()+1);
  const tomStr = tom.toISOString().split('T')[0];

  // Calculate CA and dynamic status
  fleetCA = {}; fleetDynStatus = {};
  bookings.forEach(b => {
    const nom = (b.voiture || '').trim();
    if (!fleetCA[nom]) fleetCA[nom] = { total: 0, count: 0, mrr: 0 };
    if (b.prix) { fleetCA[nom].total += b.prix; fleetCA[nom].count++; }
    if ((b.type_booking === 'abonnement' || b.prix_mensuel > 0) && b.prix_mensuel > 0) {
      const fin = b.fin || '';
      if (!fin || fin >= ts) fleetCA[nom].mrr += b.prix_mensuel;
    }
    if (b.debut && b.fin) {
      if (b.debut <= ts && b.fin >= ts && !fleetDynStatus[nom])
        fleetDynStatus[nom] = { status: 'court', booking: b };
      else if (b.debut === tomStr && !fleetDynStatus[nom])
        fleetDynStatus[nom] = { status: 'apreparer', booking: b };
    }
  });
  renderFlotteHTML();
}

function getCA(nom) {
  if (fleetCA[nom]) return fleetCA[nom];
  const k = Object.keys(fleetCA).find(n => n.toLowerCase().includes(nom.toLowerCase().split(' ').pop()) || nom.toLowerCase().includes(n.toLowerCase().split(' ').pop()));
  return k ? fleetCA[k] : null;
}

function renderFlotteHTML() {
  const cnt = { standby: 0, court: 0, long: 0, repare: 0, leasing: 0, apreparer: 0 };
  fleetData.forEach(v => {
    const ds = fleetDynStatus[v.nom];
    const s = ds ? ds.status : v.statut;
    if (cnt[s] !== undefined) cnt[s]++; else cnt.standby++;
  });
  const rev = fleetData.filter(v => v.loyer > 0).reduce((s,v) => s + v.loyer, 0);
  let list = fleetFilter === 'tous' ? [...fleetData] : fleetData.filter(v => {
    const ds = fleetDynStatus[v.nom];
    const s = ds ? ds.status : v.statut;
    return s === fleetFilter;
  });

  set('app-page', `
    <div class="pg-header">
      <div><div class="pg-title">Flotte Ferdinand</div><div class="pg-sub">${fleetData.length} véhicules · ${fmt(rev)}€/mois revenus</div></div>
      <button class="btn btn-primary" onclick="openAddVehicle()">+ Véhicule</button>
    </div>
    ${mkStats([
      { l: 'Disponibles', v: cnt.standby, c: 'var(--green)' },
      { l: 'En location', v: cnt.court + cnt.long, c: 'var(--blue)' },
      { l: 'À préparer', v: cnt.apreparer, c: 'var(--amber)' },
      { l: 'Réparation', v: cnt.repare, c: 'var(--red)' },
      { l: 'Revenus/mois', v: fmt(rev) + '€', c: 'var(--green)' },
    ])}
    <div class="filters">
      ${['tous','standby','court','repare','leasing'].map(f => `<button class="fpill${f===fleetFilter?' active':''}" onclick="setFleetFilter('${f}')">${f==='tous'?'Tous':ST_LBL[f]||f}</button>`).join('')}
    </div>
    <div id="fleet-list">${list.map(v => vCard(v)).join('')}</div>
  `);
}

function setFleetFilter(f) { fleetFilter = f; renderFlotteHTML(); }

      ${v.notes ? `<div style="margin-top:8px;font-size:12px;color:var(--text2);font-style:italic">${v.notes}</div>` : ''}

    } else if (tab === 'entretien') {

    } else if (tab === 'docs') {
      panel = `<div>${(v.docs || []).map(d => `<span class="dpill">📄 ${d}</span>`).join('')}<span class="dpill" style="border-style:dashed" onclick="addVDoc('${v.id}')">+ Ajouter</span></div>`;

async function addVTask(id) {
  const inp = $('vt-' + id); if (!inp || !inp.value.trim()) return;
  const v = fleetData.find(x => x.id === id);
  const tasks = [...(v.tasks || []), inp.value.trim()];
  await db.from('vehicles').update({ tasks }).eq('id', id);
  v.tasks = tasks; inp.value = ''; renderFlotteHTML();
}
async function removeVTask(id, idx) {
  const v = fleetData.find(x => x.id === id);
  const tasks = (v.tasks || []).filter((_, i) => i !== idx);
  await db.from('vehicles').update({ tasks }).eq('id', id);
  v.tasks = tasks; renderFlotteHTML();
}
async function addVDoc(id) {
  const n = prompt('Nom du document :'); if (!n) return;
  const v = fleetData.find(x => x.id === id);
  const docs = [...(v.docs || []), n];
  await db.from('vehicles').update({ docs }).eq('id', id);
  v.docs = docs; renderFlotteHTML();
}

function getBkList() {
  let list = [...bkData];

  if (bkFilter === 'upcoming') list = list.filter(b => b.fin && b.fin >= ts || (!b.fin && b.debut && b.debut >= ts));

  if (bkSearch) { const q = bkSearch.toLowerCase(); list = list.filter(b => (b.client||'').toLowerCase().includes(q) || (b.voiture||'').toLowerCase().includes(q)); }

async function renderFinance() {
  set('app-page', `
    <div class="pg-header"><div><div class="pg-title">Ferdinand — Finance Stripe</div><div class="pg-sub">Rapprochement paiements</div></div></div>
    <div id="stripe-content"><div class="loading"><div class="spin"></div> Chargement Stripe...</div></div>
  `);
  try {
    const [sRes, bRes] = await Promise.all([
      fetch('/api/stripe?limit=100'),
      db.from('ferdinand_bookings').select('id,client,voiture,debut,prix,stripe_payment_id')
    ]);
    if (!sRes.ok) throw new Error('Erreur API Stripe');
    const sData = await sRes.json();
    const charges = (sData.data || []).filter(c => c.captured !== false && (c.amount_captured || 0) > 0);
    const cautions = (sData.data || []).filter(c => c.captured === false || (c.amount_captured || 0) === 0);
    const bookings = bRes.data || [];
    renderFinanceData(charges, cautions, bookings);
  } catch(e) {
    set('stripe-content', `<div class="alert a-red">Erreur : ${e.message}. Vérifiez que STRIPE_RESTRICTED_KEY est configurée dans Vercel.</div>`);
  }
}

function strSim(a, b) {
  if (!a || !b) return 0;
  a = a.toLowerCase(); b = b.toLowerCase();
  if (a === b) return 1;
  if (a.includes(b) || b.includes(a)) return 0.8;
  const wa = new Set(a.split(/\s+/)), wb = new Set(b.split(/\s+/));
  const inter = [...wa].filter(w => wb.has(w)).length;
  return inter / new Set([...wa,...wb]).size;
}

function renderFinanceData(charges, cautions, bookings) {
  const total = charges.reduce((s,c) => s+(c.amount_captured||0), 0);
  const linked = bookings.filter(b => b.stripe_payment_id).length;

  // Reconciliation
  const results = charges.map(c => {
    const name = (c.billing_details?.name || c.description || '').toLowerCase();
    const amount = (c.amount_captured || 0) / 100;
    const date = new Date(c.created * 1000);
    let best = null, bestScore = 0;
    bookings.filter(b => !b.stripe_payment_id).forEach(b => {
      let score = 0;
      const sim = strSim(name, (b.client||'').toLowerCase());
      if (sim > 0.7) score += 2; else if (sim > 0.4) score += 1;
      const diff = b.prix ? Math.abs(amount - b.prix) / b.prix : 1;
      if (diff < 0.1) score += 2; else if (diff < 0.3) score += 1;
      if (b.debut) { const days = Math.abs(date - new Date(b.debut)) / 864e5; if (days < 7) score += 2; else if (days < 30) score += 1; }
      if (score > bestScore) { bestScore = score; best = b; }
    });
    return { c, match: best, score: bestScore, auto: bestScore >= 4, suggest: bestScore >= 2 && bestScore < 4 };
  });

  const auto = results.filter(r => r.auto);
  const suggest = results.filter(r => r.suggest && !r.auto);
  const unmatched = results.filter(r => !r.auto && !r.suggest);

  let html = mkStats([
    { l: 'Paiements encaissés', v: charges.length, c: 'var(--green)' },
    { l: 'Total encaissé', v: fmt(total/100) + '€', c: 'var(--green)' },
    { l: 'Cautions (non encaissées)', v: cautions.length, c: 'var(--amber)' },
    { l: 'Locations liées', v: linked, c: 'var(--blue)' },
    { l: 'Non pointées', v: unmatched.length },
  ]);

  if (auto.length) html += `<div class="card">
    <div style="font-size:13px;font-weight:600;color:var(--green);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
      ✓ Rapprochements automatiques (${auto.length})
      <button class="btn btn-sm btn-primary" onclick="confirmAllAuto()">Confirmer tous</button>
    </div>
    ${mkTable(['Client Stripe','Montant','Date','↔ Booking','Voiture','Action'],
      auto.map(r => `<tr>
        <td><strong>${r.c.billing_details?.name||r.c.description||'—'}</strong></td>
        <td style="color:var(--green);font-weight:600">${fmt((r.c.amount_captured||0)/100)}€</td>
        <td>${new Date(r.c.created*1000).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'})}</td>
        <td>${r.match?.client||'—'}</td>
        <td>${r.match?.voiture||'—'}</td>
        <td><button class="btn btn-sm" style="background:var(--green);color:#fff;border-color:var(--green)" onclick="confirmLink('${r.c.id}','${r.match?.id}',${(r.c.amount_captured||0)/100})">✓ Lier</button></td>
      </tr>`)
    )}
  </div>`;

  if (unmatched.length) html += `<div class="card">
    <div style="font-size:13px;font-weight:600;margin-bottom:10px">Transactions non pointées (${unmatched.length})</div>
    ${mkTable(['Client Stripe','Montant','Date','Statut','Action'],
      unmatched.map(r => `<tr>
        <td>${r.c.billing_details?.name||r.c.description||'—'}</td>
        <td style="font-weight:600;color:var(--green)">${fmt((r.c.amount_captured||0)/100)}€</td>
        <td>${new Date(r.c.created*1000).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'})}</td>
        <td><span class="badge ${r.c.refunded?'b-amber':r.c.status==='succeeded'?'b-green':'b-red'}">${r.c.refunded?'Remboursé':r.c.status==='succeeded'?'Réussi':r.c.status}</span></td>
        <td><button class="btn btn-sm" onclick="openManualLink('${r.c.id}')">Lier</button></td>
      </tr>`)
    )}
  </div>`;

  if (cautions.length) html += `<div class="card">
    <div style="font-size:13px;font-weight:600;color:var(--amber);margin-bottom:8px">Cautions / Autorisations (${cautions.length}) — non encaissées</div>

let elisaView = 'agenda', elisaTasks = [];
let elCalYear = new Date().getFullYear(), elCalMonth = new Date().getMonth();
const VACANCES = [
  {label:'Printemps 2025',start:'2025-04-19',end:'2025-05-04'},
  {label:'Été 2025',start:'2025-07-05',end:'2025-08-31'},
  {label:'Toussaint 2025',start:'2025-10-18',end:'2025-11-02'},
  {label:'Noël 2025',start:'2025-12-20',end:'2026-01-04'},
  {label:'Hiver 2026',start:'2026-02-14',end:'2026-03-01'},
  {label:'Printemps 2026',start:'2026-04-11',end:'2026-04-26'},
];
const REF_PAPA = new Date(2025,3,2);

function getPeriod(date) {
  for (const v of VACANCES) { const s=new Date(v.start),e=new Date(v.end); e.setHours(23,59,59); if(date>=s&&date<=e) return {type:'vac',label:v.label}; }
  const d=new Date(date); d.setHours(12); const ref=new Date(REF_PAPA); ref.setHours(12);
  const diff=Math.floor((d-ref)/864e5); const cycle=((diff%14)+14)%14;
  return {type:cycle<=5?'papa':'maman'};
}
function isVac(date) { for(const v of VACANCES){const s=new Date(v.start),e=new Date(v.end);e.setHours(23,59,59);if(date>=s&&date<=e)return true;}return false; }
function isTrans(date) { const d=new Date(date);d.setHours(12);const ref=new Date(REF_PAPA);ref.setHours(12);const diff=Math.floor((d-ref)/864e5);const cycle=((diff%14)+14)%14;return cycle===0||cycle===5; }

  const p = getPeriod(today()), isPapa = p.type === 'papa';
  let nT = new Date(today());
  for (let i=1;i<=14;i++) { const d=new Date(today()); d.setDate(d.getDate()+i); if(isTrans(d)){nT=d;break;} }
  const nV = VACANCES.find(v => new Date(v.start) > today());
  set('app-page', `
    <div class="pg-header">
      <div><div class="pg-title">Elisa</div><div class="pg-sub">Garde alternée · École Saint François d'Assise · Boulogne-Billancourt</div></div>
      <button class="btn btn-primary" onclick="openAddElisaTask()">+ Tâche</button>
    </div>
    ${mkStats([
      {l:'Cette semaine',v:isPapa?'Papa ♥':'Maman',c:isPapa?'var(--green)':'var(--pink)'},
      {l:'Prochaine transition',v:nT.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short',year:'numeric'})},
      {l:'Prochaines vacances',v:nV?nV.label:'—'},
      {l:'Tâches',v:elisaTasks.filter(t=>!t.done).length},
    ])}
    <div class="tabs">
      ${['agenda','semaine','taches','infos'].map(v=>`<button class="tab${elisaView===v?' active':''}" onclick="setElisaView('${v}')">${{agenda:'Agenda',semaine:'Cette semaine',taches:'Tâches',infos:'Infos école'}[v]}</button>`).join('')}
    </div>
    <div id="elisa-view"></div>
  `);
  renderElisaView();
}

function setElisaView(v) { elisaView = v; renderElisaView(); }
function renderElisaView() {
  if (elisaView==='agenda') renderElisaAgenda();
  else if (elisaView==='semaine') renderElisaSemaine();
  else if (elisaView==='taches') renderElisaTaches();
  else renderElisaInfos();
}

function renderElisaAgenda() {
  const first=new Date(elCalYear,elCalMonth,1), last=new Date(elCalYear,elCalMonth+1,0);
  const startDow=(first.getDay()+6)%7;
  const ml=first.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
  const ts=todayStr();
  let html=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
    <button class="btn btn-sm" onclick="elCalMonth--;if(elCalMonth<0){elCalMonth=11;elCalYear--;}renderElisaAgenda()">←</button>
    <span style="font-size:15px;font-weight:600;flex:1;text-align:center">${ml.charAt(0).toUpperCase()+ml.slice(1)}</span>
    <button class="btn btn-sm" onclick="elCalMonth++;if(elCalMonth>11){elCalMonth=0;elCalYear++;}renderElisaAgenda()">→</button>
  </div>
  <div style="display:flex;gap:10px;margin-bottom:8px;font-size:12px;flex-wrap:wrap">
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#ecfdf5;border:1px solid #6ee7b7;display:inline-block"></span>Papa</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#fdf2f8;border:1px solid #fbcfe8;display:inline-block"></span>Maman</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#bbf7d0;display:inline-block"></span>Vac. papa</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#fbcfe8;display:inline-block"></span>Vac. maman</span>
  </div>
  <div class="cal-grid">
    ${['Lu','Ma','Me','Je','Ve','Sa','Di'].map(d=>`<div class="cal-hd">${d}</div>`).join('')}
    ${Array(startDow).fill('<div class="cal-day we"></div>').join('')}`;
  for (let d=1;d<=last.getDate();d++) {
    const date=new Date(elCalYear,elCalMonth,d);
    const p=getPeriod(date); const vac=isVac(date); const trans=isTrans(date);
    const dow=date.getDay();
    const ds=`${elCalYear}-${String(elCalMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=ds===ts;
    let bg, border;
    if(vac){bg=p.type==='papa'?'#bbf7d0':'#fbcfe8';border=p.type==='papa'?'#6ee7b7':'#fbcfe8';}
    else{bg=p.type==='papa'?'#ecfdf5':'#fdf2f8';border=p.type==='papa'?'#6ee7b7':'#fbcfe8';}
    let pills='';
    if(!vac&&p.type==='papa'&&dow!==0&&dow!==6&&dow!==3)pills+=`<div style="background:#bfdbfe;color:#1e40af;font-size:9px;border-radius:3px;padding:1px 3px;margin-bottom:1px">Dépôt</div>`;
    if(dow===3&&p.type==='papa'&&!vac)pills+=`<div style="background:#ddd6fe;color:#5b21b6;font-size:9px;border-radius:3px;padding:1px 3px;margin-bottom:1px">Danse</div>`;
    if(trans)pills+=`<div style="background:#fde68a;color:#78350f;font-size:9px;border-radius:3px;padding:1px 3px;margin-bottom:1px">${dow===3?'→Papa':'→Maman'}</div>`;
    html+=`<div style="min-height:70px;padding:3px 4px;background:${bg};border:1px solid ${border};${isToday?'outline:2px solid #2563eb;outline-offset:-2px':''}">
      <div style="font-size:11px;font-weight:600;color:${isToday?'#2563eb':'#374151'};margin-bottom:2px">${d}</div>${pills}
    </div>`;
  }
  set('elisa-view', html+'</div>');
}

function renderElisaSemaine() {
  const now=today(); const dow=(now.getDay()+6)%7;
  const mon=new Date(now); mon.setDate(mon.getDate()-dow);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(d.getDate()+i);return d;});
  const dn=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
  let html='';
  days.forEach((date,i)=>{
    const p=getPeriod(date); const vac=isVac(date); const dow2=date.getDay();
    const isPapa=p.type==='papa'; const trans=isTrans(date); const isToday=date.getTime()===now.getTime();
    const evts=[];
    if(!vac&&isPapa&&dow2!==0&&dow2!==6&&dow2!==3)evts.push({t:'Dépôt école',s:'8h15–8h20 · Florian',c:'#bfdbfe',tc:'#1e40af'});
    if(!vac&&isPapa&&(dow2===4||dow2===5))evts.push({t:'Récupération',s:'16h30 ou 17h45',c:'#bbf7d0',tc:'#065f46'});
    if(dow2===3&&isPapa&&!vac)evts.push({t:'Danse',s:'15h30–16h30',c:'#ddd6fe',tc:'#5b21b6'});
    if(trans)evts.push({t:dow2===3?'Début semaine papa':'→ Maman',s:dow2===3?'Mercredi après-midi':'Dépôt école puis Magali',c:'#fde68a',tc:'#78350f'});
    html+=`<div style="background:${isPapa?'#ecfdf5':'#fdf2f8'};border:1px solid ${isPapa?'#6ee7b7':'#fbcfe8'};border-radius:8px;padding:10px 12px;margin-bottom:6px;${isToday?'outline:2px solid #2563eb;outline-offset:-2px':''}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
        <span style="font-weight:700;font-size:13px;color:${isPapa?'#065f46':'#9d174d'}">${dn[i]} ${date.getDate()} ${date.toLocaleDateString('fr-FR',{month:'short',year:'numeric'})}</span>
        <span class="badge ${isPapa?'b-green':'b-pink'}">${isPapa?'Papa':'Maman'}</span>
      </div>
      ${evts.map(e=>`<div style="background:${e.c};border-radius:4px;padding:3px 7px;margin-bottom:3px"><div style="font-size:12px;font-weight:600;color:${e.tc}">${e.t}</div><div style="font-size:11px;color:${e.tc};opacity:.8">${e.s}</div></div>`).join('')||'<div style="font-size:12px;color:#9ca3af">Jour libre</div>'}
    </div>`;
  });
  set('elisa-view', html);
}

function renderElisaTaches() {
  const open=elisaTasks.filter(t=>!t.done).sort((a,b)=>new Date(a.date||0)-new Date(b.date||0));
  const done=elisaTasks.filter(t=>t.done);
  const PRIO={high:'var(--red)',med:'var(--amber)',low:'var(--green)'};
  const ASSIGN={florian:'Florian',papa:'Moi',magali:'Magali'};
  set('elisa-view', `
    <div class="card">
      ${open.length?open.map(t=>`<div style="display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)" data-assign="${t.assign}">
        <span style="width:8px;height:8px;border-radius:50%;background:${PRIO[t.priority]||PRIO.med};flex-shrink:0;margin-top:4px"></span>
        <div style="flex:1"><div>${t.description}</div><div style="font-size:12px;color:var(--text2)">${ASSIGN[t.assign]||t.assign}${t.date?' · '+fmtDate(t.date):''}</div></div>
        <div style="display:flex;gap:2px">
          <button onclick="doneET('${t.id}')" style="border:none;background:none;cursor:pointer;color:var(--green);font-size:14px">✓</button>
          <button onclick="delET('${t.id}')" style="border:none;background:none;cursor:pointer;color:var(--text3);font-size:14px">×</button>
        </div>
      </div>`).join(''):'<div style="color:var(--text2);padding:8px 0">Aucune tâche.</div>'}
      ${done.length?`<div style="margin-top:10px;font-size:12px;color:var(--text3);margin-bottom:4px">Terminées (${done.length})</div>${done.slice(0,3).map(t=>`<div style="opacity:.5;text-decoration:line-through;font-size:13px;padding:3px 0">${t.description}</div>`).join('')}`:''}
    </div>
  `);
}

function renderElisaInfos() {
  set('elisa-view', `
    <div class="card"><div style="font-weight:700;font-size:14px;margin-bottom:6px">École Privée Saint François d'Assise</div>
    <div style="color:var(--text2)">54 Rue de l'Ancienne Mairie, 92100 Boulogne-Billancourt</div>
    <a href="https://maps.google.com/?q=54+Rue+Ancienne+Mairie+92100+Boulogne" target="_blank" style="color:var(--blue);font-size:12px;display:block;margin-top:6px">Voir sur Maps ↗</a></div>
    <div class="card">
      <div style="font-weight:600;margin-bottom:8px">Horaires</div>
      ${[['Dépôt','8h15 – 8h25'],['Sortie','16h30'],['Avec étude','17h45'],['Mercredi','Pas école'],['Danse','Mercredi 15h30–16h30']].map(r=>`<div class="prow"><span style="color:var(--text2)">${r[0]}</span><strong>${r[1]}</strong></div>`).join('')}
    </div>
    <div class="card">
      <div style="font-weight:600;margin-bottom:8px">Contacts</div>
      <div class="prow"><span style="color:var(--text2)">Florian de Mazière</span><a href="mailto:florian@ferdinandparis.com" style="color:var(--blue)">florian@ferdinandparis.com</a></div>
      <div class="prow"><span style="color:var(--text2)">Magali Brunel</span><a href="mailto:magali.anne.brunel@gmail.com" style="color:var(--blue)">magali.anne.brunel@gmail.com</a></div>
    </div>
  `);
}

function openAddElisaTask() {
  openModal('Nouvelle tâche', `
    <div class="fg"><label class="fl">Description</label><input class="fi" id="et-d" placeholder="ex: Récupérer Elisa vendredi"></div>
    <div class="f2">
      <div class="fg"><label class="fl">Assigné à</label><select class="fi" id="et-a"><option value="florian">Florian</option><option value="papa">Moi</option><option value="magali">Magali</option></select></div>
      <div class="fg"><label class="fl">Priorité</label><select class="fi" id="et-p"><option value="high">Urgente</option><option value="med" selected>Normale</option><option value="low">Basse</option></select></div>
    </div>
    <div class="f2">
      <div class="fg"><label class="fl">Date</label><input class="fi" type="date" id="et-dt"></div>
      <div class="fg"><label class="fl">Notes</label><input class="fi" id="et-n"></div>
    </div>`,
    async () => {
      const t = { id: 'et'+Date.now(), description: $('et-d').value, assign: $('et-a').value, priority: $('et-p').value, date: $('et-dt').value||null, notes: $('et-n').value, done: false };
      if (!t.description) { alert('Description requise'); return; }
      const { data } = await db.from('elisa_tasks').insert(t).select();
      if (data) elisaTasks.push(data[0]);
      closeModal(); renderElisaTaches();
    }
  );
}
async function doneET(id) { await db.from('elisa_tasks').update({done:true}).eq('id',id); elisaTasks.find(x=>x.id===id).done=true; renderElisaTaches(); }
async function delET(id) { await db.from('elisa_tasks').delete().eq('id',id); elisaTasks=elisaTasks.filter(x=>x.id!==id); renderElisaTaches(); }

// ═══════════════════════════════════════════════════════
// ADMIN
// ═══════════════════════════════════════════════════════
async function renderAdmin() {
  set('app-page', '<div class="loading"><div class="spin"></div> Chargement...</div>');
  const { data } = await db.from('user_profiles').select('*').order('created_at');
  const users = data || [];
  const ROLES = { admin: 'Administrateur', assistant: 'Assistant', coparent: 'Co-parent', viewer: 'Lecteur' };
  const ROLE_ACCESS = { admin: 'Accès complet', assistant: 'Ferdinand + Elisa', coparent: 'Elisa uniquement', viewer: 'Dashboard' };
  set('app-page', `
    <div class="pg-header"><div><div class="pg-title">Utilisateurs & Accès</div><div class="pg-sub">Connexion Google · rôles par utilisateur</div></div></div>
    <div class="alert a-blue">Les utilisateurs apparaissent ici après leur première connexion Google sur l'app.</div>
    ${mkStats([{l:'Utilisateurs',v:users.length},{l:'Admins',v:users.filter(u=>u.role==='admin').length,c:'var(--red)'}])}
    <div class="card">
      <div style="font-weight:600;margin-bottom:10px">Utilisateurs</div>
      ${users.length ? mkTable(['Nom','Email','Rôle','Accès','Action'],
        users.map(u=>`<tr>
          <td style="font-weight:500">${u.nom||'—'}</td>
          <td style="font-size:12px;color:var(--text2)">${u.email||'—'}</td>
          <td><span class="badge b-${u.role==='admin'?'red':u.role==='assistant'?'green':u.role==='coparent'?'pink':'gray'}">${ROLES[u.role]||u.role}</span></td>
          <td style="font-size:12px;color:var(--text2)">${ROLE_ACCESS[u.role]||'—'}</td>
          <td><button class="btn btn-sm" onclick="openEditUser('${u.id}','${u.role}')">Modifier</button></td>
        </tr>`)
      ) : '<div style="color:var(--text2);padding:12px 0">Aucun utilisateur connecté.</div>'}
    </div>
    <div class="card">
      <div style="font-weight:600;margin-bottom:10px">Accès à inviter</div>
      ${mkTable(['Nom','Email','Rôle prévu'],[
        `<tr><td>Florian de Mazière</td><td><a href="mailto:florian@ferdinandparis.com" style="color:var(--blue)">florian@ferdinandparis.com</a></td><td><span class="badge b-green">Assistant</span></td></tr>`,
        `<tr><td>Magali Brunel</td><td><a href="mailto:magali.anne.brunel@gmail.com" style="color:var(--blue)">magali.anne.brunel@gmail.com</a></td><td><span class="badge b-pink">Co-parent</span></td></tr>`,
      ])}
    </div>
  `);
}

function openEditUser(id, role) {
  const ROLES = { admin: 'Administrateur', assistant: 'Assistant', coparent: 'Co-parent', viewer: 'Lecteur' };
  openModal('Modifier le rôle', `
    <div class="fg"><label class="fl">Rôle</label><select class="fi" id="ur-role">
      ${Object.entries(ROLES).map(([r,l]) => `<option value="${r}" ${r===role?'selected':''}>${l}</option>`).join('')}
    </select></div>`,
    async () => {
      const newRole = $('ur-role').value;
      await db.from('user_profiles').update({ role: newRole }).eq('id', id);
      closeModal(); renderAdmin();
    }
  );
}
