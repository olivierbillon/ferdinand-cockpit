<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pénélope</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f8f7f4;--bg2:#fff;--bg3:#f1efe8;
  --text:#1a1a18;--text2:#6b6a65;--text3:#a09e98;
  --border:#e2e0d8;--border2:#c8c5bb;
  --blue:#185FA5;--blue-bg:#E6F1FB;
  --green:#0F6E56;--green-bg:#E1F5EE;
  --amber:#854F0B;--amber-bg:#FAEEDA;
  --red:#A32D2D;--red-bg:#FCEBEB;
  --purple:#534AB7;--purple-bg:#EEEDFE;
  --pink:#993556;--pink-bg:#FBEAF0;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:left .3s;}
.main{flex:1;overflow-y:auto;padding:24px;}
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid var(--border);}
.sidebar-logo h1{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.3px;}
.sidebar-logo p{font-size:11px;color:var(--text3);margin-top:2px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;font-size:13px;color:var(--text2);border-left:2px solid transparent;transition:all .15s;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--blue-bg);color:var(--blue);border-left-color:var(--blue);font-weight:500;}
.nav-sub{padding-left:30px;font-size:12px;}
.nav-section{padding:12px 16px 4px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;}
.sidebar-footer{margin-top:auto;padding:12px 16px;border-top:1px solid var(--border);font-size:12px;color:var(--text3);}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.page-title{font-size:20px;font-weight:700;}
.page-sub{font-size:13px;color:var(--text2);margin-top:2px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:4px;}
.stat-val{font-size:20px;font-weight:700;}
.badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.badge-green{background:var(--green-bg);color:var(--green);}
.badge-amber{background:var(--amber-bg);color:var(--amber);}
.badge-red{background:var(--red-bg);color:var(--red);}
.badge-blue{background:var(--blue-bg);color:var(--blue);}
.badge-purple{background:var(--purple-bg);color:var(--purple);}
.badge-gray{background:var(--bg3);color:var(--text2);}
.badge-pink{background:var(--pink-bg);color:var(--pink);}
.btn{padding:7px 14px;border-radius:7px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:13px;cursor:pointer;transition:all .15s;}
.btn:hover{background:var(--bg3);}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn-primary:hover{background:#0f4d87;}
.btn-sm{padding:4px 10px;font-size:12px;}
.btn-danger{border-color:var(--red);color:var(--red);}
.table-wrap{overflow-x:auto;}
.table{width:100%;border-collapse:collapse;min-width:600px;}
.table th{text-align:left;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;padding:8px 12px;border-bottom:1px solid var(--border);white-space:nowrap;}
.table td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
.table tr:last-child td{border-bottom:none;}
.table tr:hover td{background:var(--bg3);}
.form-group{margin-bottom:12px;}
.form-label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500;}
.form-input{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:6px;font-size:13px;background:var(--bg2);color:var(--text);}
.form-input:focus{outline:none;border-color:var(--blue);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:1000;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border-radius:12px;padding:24px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);}
.tabs{display:flex;gap:4px;background:var(--bg3);border-radius:8px;padding:3px;margin-bottom:16px;width:fit-content;flex-wrap:wrap;}
.tab{padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;color:var(--text2);border:none;background:transparent;}
.tab.active{background:var(--bg2);color:var(--text);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1);}
.filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.filter-pill{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;font-size:12px;color:var(--text2);cursor:pointer;}
.filter-pill.active{background:var(--blue-bg);color:var(--blue);border-color:var(--blue);}
.search-wrap{position:relative;flex:1;min-width:200px;}
.search-box{width:100%;padding:7px 10px 7px 32px;border:1px solid var(--border2);border-radius:7px;font-size:13px;background:var(--bg2);color:var(--text);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;}
.alert{padding:10px 14px;border-radius:7px;font-size:13px;margin-bottom:10px;}
.alert-warn{background:var(--amber-bg);color:var(--amber);}
.alert-red{background:var(--red-bg);color:var(--red);}
.alert-green{background:var(--green-bg);color:var(--green);}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text2);font-size:13px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px;}
.bar-label{width:80px;color:var(--text2);flex-shrink:0;}
.bar-bg{flex:1;background:var(--bg3);border-radius:3px;height:8px;}
.bar-fill{height:8px;border-radius:3px;}
.pay-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);}
.pay-row:last-child{border-bottom:none;}
.vehicle-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;}
.vehicle-head{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;cursor:pointer;}
.vehicle-head:hover{background:var(--bg3);}
.vehicle-body{border-top:1px solid var(--border);}
.vehicle-tabs{display:flex;border-bottom:1px solid var(--border);}
.vtab{flex:1;padding:7px 4px;text-align:center;font-size:12px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;}
.vtab.active{color:var(--blue);border-bottom-color:var(--blue);}
.vehicle-panel{padding:14px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.info-label{font-size:11px;color:var(--text2);margin-bottom:2px;}
.info-val{font-size:13px;font-weight:500;}
.doc-pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;margin:3px;}
.booking-row{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:6px;display:flex;gap:10px;align-items:flex-start;}
.booking-row.upcoming{border-color:#B5D4F4;background:#fafcff;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-head{text-align:center;font-size:11px;color:var(--text2);padding:4px 0;font-weight:600;}
.cal-day{border-radius:5px;padding:4px;min-height:52px;border:1px solid transparent;}
.cal-day-papa{background:#E1F5EE;border-color:#9FE1CB;}
.cal-day-maman{background:#FBEAF0;border-color:#F4C0D1;}
.cal-day-vac-papa{background:#C0DD97;border-color:#97C459;}
.cal-day-vac-maman{background:#F0997B;border-color:#F5C4B3;}
.cal-day-empty{background:transparent;}
.cal-day-num{font-size:11px;font-weight:700;margin-bottom:2px;}
.cal-pill{display:block;font-size:9px;border-radius:3px;padding:1px 3px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.task-item:last-child{border-bottom:none;}
.task-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.pagination{display:flex;gap:6px;align-items:center;margin-top:16px;flex-wrap:wrap;}
.page-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:12px;color:var(--text2);}
.page-btn.active{background:var(--blue-bg);color:var(--blue);border-color:var(--blue);}
.page-btn:hover{background:var(--bg3);}
@media(max-width:768px){
  .sidebar{position:fixed;left:-220px;top:0;bottom:0;z-index:100;}
  .sidebar.open{left:0;}
  .main{padding:16px;}
  .form-row{grid-template-columns:1fr;}
  .stats-row{grid-template-columns:1fr 1fr;}
}
.mobile-header{display:none;align-items:center;gap:12px;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
@media(max-width:768px){.mobile-header{display:flex;}}
</style>
</head>
<body>

<script>
const SB_URL='https://ucoxqqrzdbutvtskpevh.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjb3hxcXJ6ZGJ1dHZ0c2twZXZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjE3NjYsImV4cCI6MjA5MDc5Nzc2Nn0.GYFRNB1nXxUucUEp-1_xanfZOBWho6JjBkbtmFMFhJY';
const {createClient}=supabase;
const db=createClient(SB_URL,SB_KEY);

let modalSaveCb=null;
const STATUS_LABELS={standby:'Stand by',court:'Location courte',long:'Location longue',repare:'En réparation',perso:'Usage perso',leasing:'Leasing'};
const STATUS_BADGE={standby:'badge-green',court:'badge-amber',long:'badge-amber',repare:'badge-red',perso:'badge-blue',leasing:'badge-gray'};

// ─── UTILS ────────────────────────────────────────────────
const fmt=n=>(n||0).toLocaleString('fr-FR',{maximumFractionDigits:0});
const fmtDate=s=>{if(!s)return'—';return new Date(s).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});};
const fmtShort=s=>{if(!s)return'—';return new Date(s).toLocaleDateString('fr-FR',{day:'numeric',month:'short'});};
const today=()=>{const d=new Date();d.setHours(0,0,0,0);return d;};
const set=(el,html)=>{const e=document.getElementById(el);if(e)e.innerHTML=html;};
const esc=s=>(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');

function openModal(title,body,cb){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  modalSaveCb=cb;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');modalSaveCb=null;}
function modalSave(){if(modalSaveCb)modalSaveCb();}

// ─── INIT ─────────────────────────────────────────────────
async function init(){
  await seedFleetIfEmpty();
  await seedTouquetIfEmpty();
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('page-content').style.display='block';
  showPage('dashboard');
}

function showPage(page,navEl){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(navEl)navEl.classList.add('active');
  else{const el=document.querySelector(`.nav-item[onclick*="'${page}'"]`);if(el)el.classList.add('active');}
  const pages={dashboard:renderDashboard,flotte:renderFlotte,bookings:renderBookings,stripe:renderStripe,elisa:renderElisa,airbnb:renderAirbnb,immo:renderImmo};
  if(pages[page])pages[page]();
  if(window.innerWidth<=768)document.getElementById('sidebar').classList.remove('open');
}

async function seedTouquetIfEmpty(){
  const{data}=await db.from('bookings_touquet').select('id').limit(1);
  if(data&&data.length>0)return;
  const bk=[
    {id:'b44',client:'Simon Briquet-Loggia',source:'AirBNB',arrive:'2025-04-09',depart:'2025-04-11',pax:10,airbnb:2183,direct:0,notes:'Supplément 200€'},

let fleetData=[];let openV={};let openVT={};let fleetFilter='tous';

async function renderFlotte(){

}

function renderFlotteHTML(){
  const cnt={standby:0,court:0,long:0,repare:0,leasing:0};
  fleetData.forEach(v=>{if(cnt[v.statut]!==undefined)cnt[v.statut]++;});
  const rev=fleetData.filter(v=>v.loyer>0).reduce((s,v)=>s+v.loyer,0);
  let html=`<div class="page-header">
    <div><div class="page-title">Flotte Ferdinand</div><div class="page-sub">${fleetData.length} véhicules · ${fmt(rev)}€/mois</div></div>
    <button class="btn btn-primary" onclick="openAddVehicle()">+ Véhicule</button>
  </div>
  <div class="stats-row">
    <div class="stat"><div class="stat-label">Stand by</div><div class="stat-val" style="color:var(--green)">${cnt.standby}</div></div>
    <div class="stat"><div class="stat-label">En location</div><div class="stat-val" style="color:var(--amber)">${cnt.court+cnt.long}</div></div>
    <div class="stat"><div class="stat-label">Réparation</div><div class="stat-val" style="color:var(--red)">${cnt.repare}</div></div>
    <div class="stat"><div class="stat-label">Leasing</div><div class="stat-val">${cnt.leasing}</div></div>
    <div class="stat"><div class="stat-label">Revenus/mois</div><div class="stat-val" style="color:var(--green)">${fmt(rev)}€</div></div>
  </div>
  <div class="filters">
    ${['tous','standby','court','long','repare','leasing'].map(f=>`<button class="filter-pill${f===fleetFilter?' active':''}" onclick="setFleetFilter('${f}')">${f==='tous'?'Tous':STATUS_LABELS[f]}</button>`).join('')}
    <div class="search-wrap"><span class="search-icon">🔍</span><input class="search-box" id="fleet-search" placeholder="Rechercher..." oninput="renderFleetList()"></div>
  </div>
  <div id="fleet-list"></div>`;
  set('page-content',html);renderFleetList();
}

function setFleetFilter(f){fleetFilter=f;renderFlotteHTML();}

function renderFleetList(){
  const q=(document.getElementById('fleet-search')||{}).value||'';
  let list=fleetFilter==='tous'?[...fleetData]:fleetData.filter(v=>v.statut===fleetFilter);
  if(q)list=list.filter(v=>(v.nom+v.immat+(v.client||'')).toLowerCase().includes(q.toLowerCase()));
  set('fleet-list',list.map(v=>vehicleCard(v)).join('')||'<div style="color:var(--text2);padding:20px;text-align:center;">Aucun véhicule trouvé.</div>');
}

function vehicleCard(v){
  const isOpen=openV[v.id];const tab=openVT[v.id]||'infos';

  let body='';
  if(isOpen){
    const tabs=`<div class="vehicle-tabs">${['infos','entretien','docs','taches'].map(t=>`<button class="vtab${tab===t?' active':''}" onclick="setVTab('${v.id}','${t}')">${{infos:'Infos',entretien:'Entretien',docs:'Documents',taches:'Tâches'}[t]}</button>`).join('')}</div>`;
    let panel='';
    if(tab==='infos')panel=`<div class="info-grid">
      <div><div class="info-label">Immatriculation</div><div class="info-val">${v.immat||'—'}</div></div>
      <div><div class="info-label">Année</div><div class="info-val">${v.annee||'—'}</div></div>
      <div><div class="info-label">Couleur</div><div class="info-val">${v.couleur||'—'}</div></div>
      <div><div class="info-label">Transmission</div><div class="info-val">${v.trans||'—'}</div></div>
      <div><div class="info-label">Localisation</div><div class="info-val">${v.loc||'—'}</div></div>
      <div><div class="info-label">Détention</div><div class="info-val">${v.detention||'—'}</div></div>
      ${v.garage?`<div><div class="info-label">Garage</div><div class="info-val">${v.garage}</div></div>`:''}
    </div>${v.notes?`<div style="margin-top:10px;font-size:12px;color:var(--text2);font-style:italic;">${v.notes}</div>`:''}
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-sm" onclick="openEditVehicle('${v.id}')">Modifier ↗</button>
      <button class="btn btn-sm" onclick="showPage('bookings');setTimeout(()=>filterBookingsByVehicle('${v.nom}'),300)">Voir bookings ↗</button>
    </div>`;
    else if(tab==='entretien'){
      const warn=v.prochain&&new Date(v.prochain)<=new Date(Date.now()+30*864e5);
      panel=`<div class="info-grid">
        <div><div class="info-label">Dernier entretien</div><div class="info-val">${v.entretien?fmtDate(v.entretien):'Non renseigné'}</div></div>
        <div><div class="info-label">Prochain entretien</div><div class="info-val" style="color:${warn?'var(--red)':'inherit'}">${v.prochain?fmtDate(v.prochain):'Non renseigné'}</div></div>
        <div><div class="info-label">Garage référent</div><div class="info-val">${v.garage||'—'}</div></div>
      </div>${warn?`<div class="alert alert-warn" style="margin-top:10px;">⚠ Entretien prévu le ${fmtDate(v.prochain)}</div>`:''}
      <button class="btn btn-sm" style="margin-top:10px;" onclick="openEditVehicle('${v.id}')">Modifier les dates ↗</button>`;
    }
    else if(tab==='docs')panel=`<div>${(v.docs||[]).map(d=>`<span class="doc-pill">📄 ${d}</span>`).join('')}<span class="doc-pill" style="border-style:dashed;" onclick="addDoc('${v.id}')">+ Ajouter</span></div>`;
    else if(tab==='taches'){
      const tasks=v.tasks||[];
      panel=`${tasks.map((t,i)=>`<div class="task-item"><div class="task-dot" style="background:var(--amber)"></div><span style="flex:1">${t}</span><button onclick="removeVTask('${v.id}',${i})" style="border:none;background:none;cursor:pointer;color:var(--text3);font-size:16px;">×</button></div>`).join('')||'<div style="color:var(--text2);font-size:13px;padding:4px 0">Aucune tâche</div>'}
      <div style="display:flex;gap:8px;margin-top:10px"><input id="vt-${v.id}" placeholder="Nouvelle tâche..." style="flex:1;padding:6px 10px;border:1px solid var(--border2);border-radius:6px;font-size:13px"><button class="btn btn-sm" onclick="addVTask('${v.id}')">+ Ajouter</button></div>`;
    }
    body=`<div class="vehicle-body">${tabs}<div class="vehicle-panel">${panel}</div></div>`;
  }
  return`<div class="vehicle-card">
    <div class="vehicle-head" onclick="toggleV('${v.id}')">
      <div style="flex:1;min-width:0">
        <div style="display:flex;gap:6px;margin-bottom:5px;flex-wrap:wrap">
          <span class="badge ${STATUS_BADGE[v.statut]||'badge-gray'}">${STATUS_LABELS[v.statut]||v.statut}</span>
          <span class="badge badge-gray">${v.detention}</span>
          ${v.immat&&v.immat!=='—'?`<span style="font-size:11px;color:var(--text3);font-family:monospace">${v.immat}</span>`:''}
        </div>
        <div style="font-weight:600;font-size:14px">${v.nom}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px">${v.loc||'—'}</div>
        ${loyerLine}
      </div>
      <span style="color:var(--text3)">${isOpen?'▲':'▼'}</span>
    </div>${body}
  </div>`;
}

function toggleV(id){openV[id]=!openV[id];if(!openVT[id])openVT[id]='infos';renderFleetList();}
function setVTab(id,tab){openVT[id]=tab;renderFleetList();}
async function addVTask(id){const inp=document.getElementById('vt-'+id);if(!inp||!inp.value.trim())return;const v=fleetData.find(x=>x.id===id);const tasks=[...(v.tasks||[]),inp.value.trim()];await db.from('vehicles').update({tasks}).eq('id',id);v.tasks=tasks;inp.value='';renderFleetList();}
async function removeVTask(id,idx){const v=fleetData.find(x=>x.id===id);const tasks=(v.tasks||[]).filter((_,i)=>i!==idx);await db.from('vehicles').update({tasks}).eq('id',id);v.tasks=tasks;renderFleetList();}
async function addDoc(id){const n=prompt('Nom du document:');if(!n)return;const v=fleetData.find(x=>x.id===id);const docs=[...(v.docs||[]),n];await db.from('vehicles').update({docs}).eq('id',id);v.docs=docs;renderFleetList();}

async function renderBookings(){
  set('page-content','<div class="loading"><div class="spinner"></div> Chargement des bookings...</div>');
  const{data}=await db.from('ferdinand_bookings').select('*').order('debut',{ascending:false});
  bkData=data||[];
  renderBookingsHTML();
}

function filterBookingsByVehicle(v){bkVehicle=v;bkFilter='tous';renderBookingsHTML();}

function getBkFiltered(){
  let list=[...bkData];
  if(bkFilter==='upcoming')list=list.filter(b=>b.debut&&new Date(b.debut)>=today());
  else if(bkFilter!=='tous')list=list.filter(b=>b.debut&&b.debut.startsWith(bkFilter));
  if(bkSearch)list=list.filter(b=>(b.client||'').toLowerCase().includes(bkSearch.toLowerCase())||(b.voiture||'').toLowerCase().includes(bkSearch.toLowerCase()));
  if(bkVehicle)list=list.filter(b=>(b.voiture||'').toLowerCase().includes(bkVehicle.toLowerCase()));
  return list.sort((a,b)=>new Date(b.debut)-new Date(a.debut));

function openEditBooking(id){
  const b=bkData.find(x=>x.id===id);if(!b)return;
  // Override modal footer to add delete button
  openModal(`Modifier — ${b.client||'Booking'}`, bkFormHTML(b),async()=>{
    const u=getBkFormData();
    await db.from('ferdinand_bookings').update(u).eq('id',id);
    Object.assign(b,u);closeModal();renderBkList();
  });
  // Add delete button to modal footer
  setTimeout(()=>{
    const footer=document.querySelector('.modal-footer');
    if(footer&&!footer.querySelector('.btn-del')){
      const del=document.createElement('button');
      del.className='btn btn-danger btn-del';del.textContent='Supprimer';del.style.marginRight='auto';
      del.onclick=async()=>{if(!confirm('Supprimer ce booking ?'))return;await db.from('ferdinand_bookings').delete().eq('id',id);bkData=bkData.filter(x=>x.id!==id);closeModal();renderBkList();};
      footer.insertBefore(del,footer.firstChild);
    }
  },50);
}

let elisaView='agenda';let elisaTasks=[];
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
const VACANCES=[{label:'Printemps 2025',start:'2025-04-19',end:'2025-05-04'},{label:'Été 2025',start:'2025-07-05',end:'2025-08-31'},{label:'Toussaint 2025',start:'2025-10-18',end:'2025-11-02'},{label:'Noël 2025',start:'2025-12-20',end:'2026-01-04'},{label:'Hiver 2026',start:'2026-02-14',end:'2026-03-01'},{label:'Printemps 2026',start:'2026-04-11',end:'2026-04-26'}];
const REF_PAPA=new Date(2025,3,2);

function getPeriod(date){for(const v of VACANCES){const s=new Date(v.start),e=new Date(v.end);e.setHours(23,59,59);if(date>=s&&date<=e)return{type:'vac',label:v.label};}const d=new Date(date);d.setHours(12);const ref=new Date(REF_PAPA);ref.setHours(12);const diff=Math.floor((d-ref)/(1000*60*60*24));const cycle=((diff%14)+14)%14;return{type:cycle<=5?'papa':'maman'};}
function isVac(date){for(const v of VACANCES){const s=new Date(v.start),e=new Date(v.end);e.setHours(23,59,59);if(date>=s&&date<=e)return true;}return false;}
function isSchool(date){const dow=date.getDay();if(dow===0||dow===6||dow===3)return false;return!isVac(date);}
function isTrans(date){const d=new Date(date);d.setHours(12);const ref=new Date(REF_PAPA);ref.setHours(12);const diff=Math.floor((d-ref)/(1000*60*60*24));const cycle=((diff%14)+14)%14;return cycle===0||cycle===5;}

function renderElisaAgenda(){
  const first=new Date(calYear,calMonth,1),last=new Date(calYear,calMonth+1,0);
  const startDow=(first.getDay()+6)%7;
  const monthLabel=first.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
  const todayStr=today().toISOString().split('T')[0];
  let html=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
    <button class="btn btn-sm" onclick="calPrev()">←</button>
    <span style="font-size:15px;font-weight:600;flex:1;text-align:center">${monthLabel.charAt(0).toUpperCase()+monthLabel.slice(1)}</span>
    <button class="btn btn-sm" onclick="calNext()">→</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:10px;font-size:12px;flex-wrap:wrap">
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#E1F5EE;border:1px solid #9FE1CB;display:inline-block"></span>Papa</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#FBEAF0;border:1px solid #F4C0D1;display:inline-block"></span>Maman</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#C0DD97;display:inline-block"></span>Vac. papa</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#F0997B;display:inline-block"></span>Vac. maman</span>
  </div>
  <div class="cal-grid">
    ${['Lu','Ma','Me','Je','Ve','Sa','Di'].map(d=>`<div class="cal-head">${d}</div>`).join('')}
    ${Array(startDow).fill('<div class="cal-day cal-day-empty"></div>').join('')}`;
  for(let d=1;d<=last.getDate();d++){
    const date=new Date(calYear,calMonth,d);const p=getPeriod(date);const vac=isVac(date);const trans=isTrans(date);const school=isSchool(date);const dow=date.getDay();
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=dateStr===todayStr;
    let cls='cal-day ';
    if(vac)cls+=p.type==='papa'?'cal-day-vac-papa':'cal-day-vac-maman';
    else cls+=p.type==='papa'?'cal-day-papa':'cal-day-maman';
    let pills='';
    if(school&&p.type==='papa'&&dow!==3)pills+=`<span class="cal-pill" style="background:#B5D4F4;color:#0C447C">Dépôt</span>`;
    if(dow===3&&p.type==='papa'&&!vac)pills+=`<span class="cal-pill" style="background:#CECBF6;color:#3C3489">Danse</span>`;
    if(trans)pills+=`<span class="cal-pill" style="background:#FAC775;color:#633806">${dow===3?'→Papa':'→Maman'}</span>`;
    html+=`<div class="${cls}" style="${isToday?'outline:2px solid var(--blue);outline-offset:-2px':''}"><div class="cal-day-num">${d}${isToday?' •':''}</div>${pills}</div>`;
  }
  html+=`</div>`;set('elisa-view',html);
}
function calPrev(){if(calMonth===0){calMonth=11;calYear--;}else calMonth--;renderElisaAgenda();}
function calNext(){if(calMonth===11){calMonth=0;calYear++;}else calMonth++;renderElisaAgenda();}

  const now=today();const dow=(now.getDay()+6)%7;const mon=new Date(now);mon.setDate(mon.getDate()-dow);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(d.getDate()+i);return d;});
  const dn=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
  let html='';
  days.forEach((date,i)=>{
    const p=getPeriod(date);const vac=isVac(date);const school=isSchool(date);const dow2=date.getDay();const isPapa=p.type==='papa';const trans=isTrans(date);const isToday=date.getTime()===now.getTime();
    const evts=[];
    if(school&&isPapa&&dow2!==3)evts.push({t:'Dépôt école',s:'8h15–8h20 · Florian',c:'#B5D4F4',tc:'#0C447C'});
    if(school&&isPapa&&(dow2===4||dow2===5))evts.push({t:'Récupération',s:'16h30 ou 17h45 · Florian',c:'#9FE1CB',tc:'#085041'});
    if(dow2===3&&isPapa&&!vac)evts.push({t:'Danse',s:'15h30–16h30',c:'#CECBF6',tc:'#3C3489'});
    if(trans)evts.push({t:dow2===3?'Début semaine papa':'→ Maman',s:dow2===3?'Arrivée mercredi après-midi':'Dépôt école puis Magali',c:'#FAC775',tc:'#633806'});
    html+=`<div style="background:${isPapa?'#E1F5EE':'#FBEAF0'};border:1px solid ${isPapa?'#9FE1CB':'#F4C0D1'};border-radius:10px;padding:10px 14px;margin-bottom:8px;${isToday?'outline:2px solid var(--blue);outline-offset:-2px':''}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-weight:700;font-size:13px;color:${isPapa?'#085041':'#72243E'}">${dn[i]} ${date.getDate()}</span>
        <span class="badge ${isPapa?'badge-green':'badge-pink'}">${isPapa?'Papa':'Maman'}</span>
      </div>
      ${evts.map(e=>`<div style="background:${e.c};border-radius:5px;padding:4px 8px;margin-bottom:4px"><div style="font-size:12px;font-weight:600;color:${e.tc}">${e.t}</div><div style="font-size:11px;color:${e.tc};opacity:.8">${e.s}</div></div>`).join('')||'<div style="font-size:12px;color:#888">Jour libre</div>'}
    </div>`;
  });
  set('elisa-view',html);
}

function renderElisaTaches(){
  const open=elisaTasks.filter(t=>!t.done).sort((a,b)=>new Date(a.date||0)-new Date(b.date||0));
  const done=elisaTasks.filter(t=>t.done);
  const PRIO={high:'var(--red)',med:'var(--amber)',low:'var(--green)'};
  const ASSIGN={florian:'Florian',papa:'Moi',magali:'Magali'};
  let html=`<div class="filters">
    <button class="filter-pill active" onclick="filterET('all',this)">Toutes</button>
    <button class="filter-pill" onclick="filterET('florian',this)">Florian</button>
    <button class="filter-pill" onclick="filterET('papa',this)">Moi</button>
    <button class="filter-pill" onclick="filterET('magali',this)">Magali</button>
  </div>
  <div class="card" id="et-list">
    ${open.length?open.map(t=>`<div class="task-item" data-assign="${t.assign}">
      <div class="task-dot" style="background:${PRIO[t.priority]||PRIO.med}"></div>
      <div style="flex:1"><div style="font-size:14px">${t.description}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:2px">${ASSIGN[t.assign]||t.assign}${t.date?' · '+fmtDate(t.date):''}</div></div>
      <div style="display:flex;gap:4px">
        <button onclick="doneET('${t.id}')" style="border:none;background:none;cursor:pointer;font-size:16px;color:var(--green)">✓</button>
        <button onclick="delET('${t.id}')" style="border:none;background:none;cursor:pointer;font-size:16px;color:var(--text3)">×</button>
      </div>
    </div>`).join(''):'<div style="color:var(--text2);font-size:13px;padding:8px 0">Aucune tâche.</div>'}
    ${done.length?`<div style="margin-top:10px;font-size:12px;color:var(--text3);margin-bottom:6px">Terminées (${done.length})</div>${done.slice(0,3).map(t=>`<div style="opacity:.5;text-decoration:line-through;font-size:13px;padding:4px 0">${t.description}</div>`).join('')}`:''}
  </div>`;
  set('elisa-view',html);
}
function filterET(f,btn){document.querySelectorAll('#et-list .task-item').forEach(el=>el.style.display=(f==='all'||el.dataset.assign===f)?'flex':'none');document.querySelectorAll('.filter-pill').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}

function openAddElisaTask(){
  openModal('Nouvelle tâche',`
    <div class="form-group"><label class="form-label">Description</label><input class="form-input" id="et-desc" placeholder="ex: Récupérer Elisa vendredi 16h30"></div>
    <div class="form-row"><div class="form-group"><label class="form-label">Assigné à</label><select class="form-input" id="et-assign"><option value="florian">Florian</option><option value="papa">Moi</option><option value="magali">Magali</option></select></div>
    <div class="form-group"><label class="form-label">Priorité</label><select class="form-input" id="et-prio"><option value="high">Urgente</option><option value="med" selected>Normale</option><option value="low">Basse</option></select></div></div>

async function doneET(id){await db.from('elisa_tasks').update({done:true}).eq('id',id);const t=elisaTasks.find(x=>x.id===id);if(t)t.done=true;renderElisaTaches();}
async function delET(id){await db.from('elisa_tasks').delete().eq('id',id);elisaTasks=elisaTasks.filter(x=>x.id!==id);renderElisaTaches();}

// ─── AIRBNB ───────────────────────────────────────────────
let airbnbBien='touquet';let airbnbView='reservations';let tqBk=[],paBk=[];

async function renderAirbnb(){
  set('page-content','<div class="loading"><div class="spinner"></div> Chargement AirBnB...</div>');
  const[tq,pa]=await Promise.all([db.from('bookings_touquet').select('*').order('arrive'),db.from('bookings_paris').select('*').order('arrive')]);
  tqBk=tq.data||[];paBk=pa.data||[];renderAirbnbHTML();
}

function renderAirbnbHTML(){
  const bk=airbnbBien==='touquet'?tqBk:paBk;
  const upcoming=bk.filter(b=>b.arrive&&new Date(b.arrive)>=today()&&!b.annule);
  const revUp=upcoming.reduce((s,b)=>s+(b.airbnb||0)+(b.direct||0),0);
  let html=`<div class="page-header">
    <div><div class="page-title">AirBnB — Mes biens</div><div class="page-sub">Luxury Forest Retreat · Appartement Trocadéro</div></div>
    <button class="btn btn-primary" onclick="openAddABK()">+ Réservation</button>
  </div>
  <div class="tabs" style="margin-bottom:12px">
    <button class="tab${airbnbBien==='touquet'?' active':''}" onclick="setABien('touquet')">Le Touquet</button>
    <button class="tab${airbnbBien==='paris'?' active':''}" onclick="setABien('paris')">Paris</button>
  </div>
  <div class="stats-row">
    <div class="stat"><div class="stat-label">À venir</div><div class="stat-val" style="color:var(--blue)">${upcoming.length}</div></div>
    <div class="stat"><div class="stat-label">Pipeline</div><div class="stat-val" style="color:var(--green)">${fmt(revUp)}€</div></div>
    <div class="stat"><div class="stat-label">Total résa</div><div class="stat-val">${bk.filter(b=>!b.annule).length}</div></div>
  </div>
  <div class="tabs">
    <button class="tab${airbnbView==='reservations'?' active':''}" onclick="setAView('reservations')">Réservations</button>
    <button class="tab${airbnbView==='compta'?' active':''}" onclick="setAView('compta')">Comptabilité</button>
  </div>
  <div id="airbnb-view"></div>`;
  set('page-content',html);renderAirbnbView();
}
function setABien(b){airbnbBien=b;renderAirbnbHTML();}
function setAView(v){airbnbView=v;renderAirbnbView();}
function renderAirbnbView(){
  const bk=airbnbBien==='touquet'?tqBk:paBk;
  if(airbnbView==='reservations'){
    const upcoming=bk.filter(b=>b.arrive&&new Date(b.arrive)>=today()&&!b.annule).sort((a,b)=>new Date(a.arrive)-new Date(b.arrive));
    const past=bk.filter(b=>b.arrive&&new Date(b.arrive)<today()&&!b.annule).sort((a,b)=>new Date(b.arrive)-new Date(a.arrive)).slice(0,10);
    const html=`${upcoming.length?`<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:8px">À venir</div>${upcoming.map(b=>abkCard(b,true)).join('')}`:''}
    ${past.length?`<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;margin:12px 0 8px">Passées (10 dernières)</div>${past.map(b=>abkCard(b,false)).join('')}`:''}
    <button class="btn btn-sm" style="margin-top:8px" onclick="openAddABK()">+ Ajouter une réservation</button>`;
    set('airbnb-view',html);
  } else {
    const years=['2023','2024','2025','2026'];
    const maxRev=Math.max(...years.map(y=>bk.filter(b=>b.arrive&&b.arrive.startsWith(y)&&!b.annule).reduce((s,b)=>s+(b.airbnb||0)+(b.direct||0),0)),1);
    let html='<div class="card">';
    years.forEach(y=>{
      const r=bk.filter(b=>b.arrive&&b.arrive.startsWith(y)&&!b.annule).reduce((s,b)=>s+(b.airbnb||0)+(b.direct||0),0);
      const n=bk.filter(b=>b.arrive&&b.arrive.startsWith(y)&&!b.annule).length;
      html+=`<div class="bar-row"><span class="bar-label">${y} (${n})</span><div class="bar-bg"><div class="bar-fill" style="width:${Math.round(r/maxRev*100)}%;background:var(--green)"></div></div><span style="width:80px;text-align:right;font-weight:600;font-size:13px">${fmt(r)}€</span></div>`;
    });
    html+=`</div>`;
    if(airbnbBien==='touquet'){html+=`<div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:10px">Rapport AirBnB officiel</div><div class="pay-row"><span style="color:var(--text2)">Revenus bruts</span><strong>125 344€</strong></div><div class="pay-row"><span style="color:var(--text2)">Frais service AirBnB</span><span style="color:var(--red)">−4 512€</span></div><div class="pay-row"><span style="color:var(--text2)">Total net versé</span><strong style="color:var(--green)">120 832€</strong></div></div>`;}
    else{html+=`<div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:10px">Rapport AirBnB officiel</div><div class="pay-row"><span style="color:var(--text2)">Revenus bruts</span><strong>42 608€</strong></div><div class="pay-row"><span style="color:var(--text2)">Frais service AirBnB</span><span style="color:var(--red)">−1 453€</span></div><div class="pay-row"><span style="color:var(--text2)">Total net versé</span><strong style="color:var(--green)">38 650€</strong></div></div>`;}
    set('airbnb-view',html);
  }
}
function abkCard(b,isUp){
  const rev=(b.airbnb||0)+(b.direct||0)+(b.montant||0);
  const nights=b.arrive&&b.depart?Math.ceil((new Date(b.depart)-new Date(b.arrive))/(1000*60*60*24)):null;
  return`<div class="booking-row${isUp?' upcoming':''}" style="${b.annule?'opacity:.4':''}">
    <div style="flex:1;min-width:0">
      <div style="display:flex;gap:6px;margin-bottom:4px;flex-wrap:wrap">
        <span class="badge ${b.source==='AirBNB'?'badge-red':b.source==='Gens de Confiance'?'badge-purple':'badge-green'}">${b.source||'—'}</span>
        ${b.pax?`<span style="font-size:11px;color:var(--text2)">${b.pax} pers.</span>`:''}
        ${nights?`<span style="font-size:11px;color:var(--text2)">${nights} nuits</span>`:''}
      </div>
      <div style="font-weight:600;font-size:14px">${b.client}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:2px">${fmtShort(b.arrive)} → ${fmtShort(b.depart)}</div>
      ${b.notes?`<div style="font-size:12px;color:var(--text3);font-style:italic;margin-top:2px">${b.notes}</div>`:''}
    </div>
    ${rev>0?`<div style="font-weight:700;font-size:15px;color:var(--green);flex-shrink:0">${fmt(rev)}€</div>`:''}
  </div>`;
}
function openAddABK(){
  const tbl=airbnbBien==='touquet'?'bookings_touquet':'bookings_paris';
  openModal(`Nouvelle résa — ${airbnbBien==='touquet'?'Le Touquet':'Paris'}`,`
    <div class="form-group"><label class="form-label">Client</label><input class="form-input" id="ab-client"></div>
    <div class="form-row"><div class="form-group"><label class="form-label">Source</label><select class="form-input" id="ab-source"><option value="AirBNB">AirBnB</option><option value="Direct">Direct</option><option value="Gens de Confiance">Gens de Confiance</option></select></div>
    <div class="form-group"><label class="form-label">Personnes</label><input class="form-input" type="number" id="ab-pax"></div></div>
    <div class="form-row"><div class="form-group"><label class="form-label">Arrivée</label><input class="form-input" type="date" id="ab-arrive"></div>
    <div class="form-group"><label class="form-label">Départ</label><input class="form-input" type="date" id="ab-depart"></div></div>
    <div class="form-row"><div class="form-group"><label class="form-label">Montant AirBnB (€)</label><input class="form-input" type="number" id="ab-airbnb"></div>
    <div class="form-group"><label class="form-label">Montant Direct (€)</label><input class="form-input" type="number" id="ab-direct"></div></div>
    <div class="form-group"><label class="form-label">Notes</label><textarea class="form-input" id="ab-notes" rows="2"></textarea></div>`,
  async()=>{
    const b={id:'b'+Date.now(),client:document.getElementById('ab-client').value,source:document.getElementById('ab-source').value,arrive:document.getElementById('ab-arrive').value||null,depart:document.getElementById('ab-depart').value||null,pax:parseInt(document.getElementById('ab-pax').value)||null,airbnb:parseFloat(document.getElementById('ab-airbnb').value)||0,direct:parseFloat(document.getElementById('ab-direct').value)||0,notes:document.getElementById('ab-notes').value,annule:false};
    if(!b.client){alert('Client requis');return;}
    const{data}=await db.from(tbl).insert(b).select();
    if(data){if(airbnbBien==='touquet')tqBk.push(data[0]);else paBk.push(data[0]);}
    closeModal();renderAirbnbHTML();
  });
}
