<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pénélope</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap');

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── TOKENS ── */
:root {
  --fg:         #000000;
  --fg2:        #666666;
  --fg3:        #999999;
  --fg4:        #c0c0c0;
  --bg:         #ffffff;
  --bg1:        #fafafa;
  --bg2:        #f5f5f5;
  --bg3:        #ebebeb;
  --border:     #eaeaea;
  --border2:    #d4d4d4;

  /* Sidebar (light) */
  --sb-bg:      #ffffff;
  --sb-border:  #eaeaea;
  --sb-text:    #666666;
  --sb-active:  #000000;
  --sb-hover:   #f5f5f5;

  /* Accents */
  --blue:       #0070f3;
  --blue-bg:    #eff6ff;
  --green:      #00a67e;
  --green-bg:   #f0fdf4;
  --red:        #e00000;
  --red-bg:     #fff0f0;
  --amber:      #f5a623;
  --amber-bg:   #fffbeb;
  --purple:     #7928ca;
  --purple-bg:  #f5f0ff;
  --pink:       #eb367f;
  --pink-bg:    #fff0f6;

  --r:          6px;
  --r-lg:       8px;
}

/* ── BASE ── */
body {
  font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  line-height: 1.5;
  color: var(--fg);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── LAYOUT ── */
.app { display: flex; height: 100vh; overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width: 232px;
  background: var(--sb-bg);
  border-right: 1px solid var(--sb-border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
  overflow-x: hidden;
}
.sb-logo {
  padding: 12px 14px;
  border-bottom: 1px solid var(--sb-border);
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 48px;
}
.sb-logo-mark {
  width: 22px; height: 22px;
  background: #000;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 11px; font-weight: 700; flex-shrink: 0;
}
.sb-logo h1 { font-size: 13px; font-weight: 500; color: #000; letter-spacing: -.01em; }
.sb-logo p  { font-size: 11px; color: var(--sb-text); margin-top: 0; }
.sb-section {
  padding: 16px 14px 4px;
  font-size: 10.5px;
  font-weight: 500;
  color: var(--fg3);
  text-transform: uppercase;
  letter-spacing: .08em;
}
.sb-item {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 10px;
  margin: 1px 3px;
  border-radius: var(--r);
  cursor: pointer;
  font-size: 12.5px;
  font-weight: 400;
  color: var(--sb-text);
  transition: background .1s, color .1s;
  user-select: none;
  border: 1px solid transparent;
}
.sb-item svg { flex-shrink: 0; opacity: .55; }
.sb-item:hover {
  background: var(--sb-hover);
  color: var(--fg);
}
.sb-item:hover svg { opacity: .9; }
.sb-item.active {
  color: var(--fg);
  background: var(--bg2);
  border-color: var(--border);
}
.sb-item.active svg { opacity: 1; }
.sb-sub { padding-left: 18px; }
.sb-user {
  padding: 10px 12px;
  border-top: 1px solid var(--sb-border);
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: auto;
}
.sb-avatar {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--bg2);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 600; color: var(--fg); flex-shrink: 0;
}

/* ── MAIN ── */
.main {
  flex: 1;
  overflow-y: auto;
  background: var(--bg1);
  display: flex;
  flex-direction: column;
}
.pg {
  padding: 24px 32px;
  max-width: 1100px;
  width: 100%;
  margin: 0 auto;
}

/* ── PAGE HEADER ── */
.pg-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 10px;
}
.pg-title {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -.025em;
  color: var(--fg);
  line-height: 1.3;
}
.pg-sub {
  font-size: 12px;
  color: var(--fg2);
  margin-top: 2px;
  font-weight: 400;
}

/* ── STATS ROW ── */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 0;
  margin-bottom: 16px;
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
  background: var(--border);
}
.stat {
  background: var(--bg);
  padding: 14px 16px;
}
.stat-l {
  font-size: 11px;
  color: var(--fg3);
  margin-bottom: 4px;
  font-weight: 500;
  letter-spacing: .01em;
}
.stat-v {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -.04em;
  line-height: 1.1;
}

/* ── CARD ── */
.card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 16px;
  margin-bottom: 8px;
}

/* ── BADGES ── */
.badge {
  display: inline-flex;
  align-items: center;
  font-size: 11px;
  font-weight: 500;
  padding: 1px 7px;
  border-radius: 20px;
  white-space: nowrap;
  letter-spacing: .01em;
}
.b-green  { background: #e6f6ef; color: #00663b; }
.b-blue   { background: #e6f0ff; color: #0055cc; }
.b-amber  { background: #fef3e6; color: #7a4200; }
.b-red    { background: #fff0f0; color: #b00000; }
.b-purple { background: #f0ebff; color: #5c0fbf; }
.b-gray   { background: #f5f5f5; color: #555; border: 1px solid var(--border2); }
.b-pink   { background: #fff0f6; color: #ab0052; }
/* Sources */
.b-direct  { background: #e6f6ef; color: #00663b; }
.b-airbnb  { background: #fff0f0; color: #b00000; }
.b-roadstr { background: #f0ebff; color: #5c0fbf; }
.b-gdc     { background: #e6f0ff; color: #0055cc; }
.b-mrm     { background: #f5f5f5; color: #555; border: 1px solid var(--border2); }

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 0 12px;
  height: 32px;
  border-radius: var(--r);
  border: 1px solid var(--border2);
  background: var(--bg);
  color: var(--fg);
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
  letter-spacing: -.01em;
  transition: background .1s, border-color .1s, color .1s;
  line-height: 1;
}
.btn:hover { background: var(--bg2); border-color: var(--border2); }
.btn-primary {
  background: var(--fg);
  color: var(--bg);
  border-color: var(--fg);
}
.btn-primary:hover { background: #333; border-color: #333; }
.btn-sm { padding: 0 10px; height: 28px; font-size: 12px; }
.btn-danger { color: var(--red); }
.btn-danger:hover { background: var(--red-bg); border-color: #fca5a5; }

/* ── FILTERS ── */
.filters {
  display: flex;
  gap: 4px;
  margin-bottom: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.fpill {
  padding: 0 11px;
  height: 28px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg);
  font-size: 12px;
  font-weight: 500;
  color: var(--fg2);
  cursor: pointer;
  font-family: inherit;
  transition: all .1s;
  display: inline-flex;
  align-items: center;
}
.fpill:hover { background: var(--bg2); color: var(--fg); }
.fpill.active {
  background: var(--fg);
  color: var(--bg);
  border-color: var(--fg);
}
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-box {
  width: 100%;
  padding: 0 10px 0 28px;
  height: 32px;
  border: 1px solid var(--border);
  border-radius: var(--r);
  font-size: 12.5px;
  background: var(--bg);
  color: var(--fg);
  font-family: inherit;
  transition: border-color .1s;
}
.search-box:focus {
  outline: none;
  border-color: var(--fg);
  box-shadow: 0 0 0 3px rgba(0,0,0,.06);
}
.search-icon {
  position: absolute;
  left: 8px; top: 50%;
  transform: translateY(-50%);
  color: var(--fg3);
  font-size: 12px;
  pointer-events: none;
}

/* ── TABLE ── */
.tbl-wrap {
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  background: var(--bg);
}
.tbl {
  width: 100%;
  border-collapse: collapse;
  min-width: 500px;
}
.tbl th {
  text-align: left;
  font-size: 11px;
  font-weight: 500;
  color: var(--fg3);
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  background: var(--bg1);
  letter-spacing: .05em;
  text-transform: uppercase;
}
.tbl td {
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 12.5px;
  vertical-align: middle;
  color: var(--fg);
}
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: var(--bg1); }
.tbl tr.clickable { cursor: pointer; }

/* ── FORM ── */
.fg-label, .fg { margin-bottom: 10px; }
.fl {
  display: block;
  font-size: 12px;
  color: var(--fg2);
  margin-bottom: 4px;
  font-weight: 500;
  letter-spacing: .01em;
}
.fi {
  width: 100%;
  padding: 0 10px;
  height: 34px;
  border: 1px solid var(--border2);
  border-radius: var(--r);
  font-size: 13px;
  background: var(--bg);
  color: var(--fg);
  font-family: inherit;
  transition: border-color .1s, box-shadow .1s;
}
textarea.fi { height: auto; padding: 8px 10px; }
.fi:focus {
  outline: none;
  border-color: var(--fg);
  box-shadow: 0 0 0 3px rgba(0,0,0,.06);
}
.f2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

/* ── MODAL ── */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.55);
  display: none; align-items: center; justify-content: center;
  z-index: 100;
  backdrop-filter: blur(4px);
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--bg);
  border-radius: var(--r-lg);
  padding: 20px;
  width: 90%;
  max-width: 480px;
  max-height: 92vh;
  overflow-y: auto;
  border: 1px solid var(--border);
  box-shadow: 0 24px 48px rgba(0,0,0,.18);
}
.modal-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 14px;
  letter-spacing: -.02em;
}
.modal-footer {
  display: flex;
  gap: 6px;
  justify-content: flex-end;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}

/* ── TABS ── */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
  gap: 0;
}
.tab {
  padding: 7px 14px;
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  color: var(--fg3);
  border: none;
  background: transparent;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  font-family: inherit;
  transition: color .1s;
  letter-spacing: -.01em;
}
.tab:hover { color: var(--fg); }
.tab.active { color: var(--fg); border-bottom-color: var(--fg); }

/* ── EXPANDABLE CARD ── */
.exp-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  margin-bottom: 6px;
  overflow: hidden;
  transition: border-color .15s;
}
.exp-card:hover { border-color: var(--border2); }
.exp-head {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px 14px;
  cursor: pointer;
}
.exp-head:hover { background: var(--bg1); }
.exp-body { border-top: 1px solid var(--border); }
.exp-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--bg1);
}
.etab {
  flex: 1;
  padding: 7px 4px;
  text-align: center;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  color: var(--fg3);
  border: none;
  background: transparent;
  font-family: inherit;
  border-bottom: 2px solid transparent;
  transition: color .1s;
}
.etab:hover { color: var(--fg); }
.etab.active { color: var(--fg); border-bottom-color: var(--fg); background: var(--bg); }
.exp-panel { padding: 12px 14px; }
.ig { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.il {
  font-size: 10.5px;
  color: var(--fg3);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 2px;
}
.iv { font-size: 13px; font-weight: 500; color: var(--fg); }

/* ── ALERTS ── */
.alert {
  padding: 10px 12px;
  border-radius: var(--r);
  font-size: 12.5px;
  margin-bottom: 8px;
  border: 1px solid transparent;
  display: flex;
  align-items: flex-start;
  gap: 7px;
  line-height: 1.5;
}
.a-warn  { background: var(--amber-bg); color: #7a4200; border-color: #fde68a; }
.a-red   { background: var(--red-bg);   color: #7f1d1d; border-color: #fca5a5; }
.a-green { background: var(--green-bg); color: #064e3b; border-color: #6ee7b7; }
.a-blue  { background: var(--blue-bg);  color: #1e3a8a; border-color: #93c5fd; }

/* ── CALENDAR ── */
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
}
.cal-hd {
  text-align: center;
  font-size: 10.5px;
  font-weight: 600;
  color: var(--fg3);
  padding: 6px 0;
  background: var(--bg1);
  letter-spacing: .04em;
  text-transform: uppercase;
}
.cal-day { min-height: 72px; padding: 3px 4px; background: var(--bg); }
.cal-day.today { background: #fefce8; }
.cal-day.we { background: var(--bg1); }
.cal-num {
  font-size: 11px;
  font-weight: 500;
  margin-bottom: 2px;
  color: var(--fg3);
}
.cal-day.today .cal-num { color: var(--blue); font-weight: 700; }
.cal-ev {
  font-size: 9.5px;
  border-radius: 3px;
  padding: 1px 4px;
  margin-bottom: 2px;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  cursor: pointer;
  font-weight: 500;
}

/* ── PAGINATION ── */
.pag { display: flex; gap: 3px; margin-top: 12px; flex-wrap: wrap; }
.pp {
  padding: 0 9px;
  height: 28px;
  border-radius: var(--r);
  border: 1px solid var(--border);
  background: var(--bg);
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  color: var(--fg2);
  font-family: inherit;
  display: inline-flex;
  align-items: center;
}
.pp.active { background: var(--fg); color: var(--bg); border-color: var(--fg); }
.pp:hover:not(.active) { background: var(--bg2); }
.pp:disabled { opacity: .4; cursor: default; }

/* ── MISC ── */
.prow {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.prow:last-child { border-bottom: none; }
.dpill {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 12px;
  padding: 2px 8px;
  height: 24px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--bg1);
  cursor: pointer;
  margin: 2px;
  font-family: inherit;
  color: var(--fg2);
}
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
.bar-lbl { width: 100px; font-size: 12px; color: var(--fg2); flex-shrink: 0; }
.bar-bg { flex: 1; background: var(--bg2); border-radius: 3px; height: 4px; }
.bar-fill { height: 4px; border-radius: 3px; }

/* ── LOADING ── */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px;
  color: var(--fg3);
  font-size: 13px;
}
.spin {
  width: 14px; height: 14px;
  border: 1.5px solid var(--border2);
  border-top-color: var(--fg);
  border-radius: 50%;
  animation: spin .6s linear infinite;
  margin-right: 8px;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── LOGIN ── */
.login-bg {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: var(--bg1);
}
.login-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 32px;
  text-align: center;
  width: 360px;
  box-shadow: 0 8px 30px rgba(0,0,0,.08);
}
.login-logo {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -.04em;
  margin-bottom: 4px;
}
.login-sub { font-size: 12.5px; color: var(--fg2); margin-bottom: 24px; }
.btn-google {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
  width: 100%;
  height: 36px;
  border-radius: var(--r);
  border: 1px solid var(--border2);
  background: var(--bg);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  color: var(--fg);
  transition: background .1s;
}
.btn-google:hover { background: var(--bg1); }

/* ── ELISA ── */
.el-papa      { background: #f0fdf4; }
.el-maman     { background: #fdf2f8; }
.el-vac-papa  { background: #bbf7d0; }
.el-vac-maman { background: #fbcfe8; }

/* ── RESPONSIVE ── */
@media (max-width: 1024px) {
  .pg { padding: 20px 20px; }
}
@media (max-width: 768px) {
  .sidebar {
    position: fixed; left: -232px; top: 0; bottom: 0;
    z-index: 100; transition: left .2s;
  }
  .sidebar.open { left: 0; }
  .pg { padding: 14px 14px; }
  .f2 { grid-template-columns: 1fr; }
  .stats { grid-template-columns: 1fr 1fr; }
  .tbl-wrap { border-radius: 0; margin: 0 -14px; border-left: none; border-right: none; }
}
.mob-bar {
  display: none;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50;
}
@media (max-width: 768px) { .mob-bar { display: flex; } }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-bg" style="display:none">
  <div class="login-card">
    <div class="login-logo">Pénélope</div>
    <div class="login-sub">Cockpit de vie · Olivier Billon</div>
    <button class="btn-google" onclick="loginGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>

// Pagination
function mkPag(total, perPage, current, onClickFn) {
  const pages = Math.ceil(total / perPage);
  if (pages <= 1) return '';
  let html = '';
  for (let i = 1; i <= Math.min(pages, 9); i++)
    html += `<button class="pp${i === current ? ' active' : ''}" onclick="${onClickFn}(${i})">${i}</button>`;
  if (pages > 9) html += `<span style="color:var(--text3);padding:4px 6px">…${pages}</span>`;
  return `<div class="pag">
    <button class="pp" onclick="${onClickFn}(${Math.max(1, current-1)})" ${current===1?'disabled':''}>←</button>
    ${html}
    <button class="pp" onclick="${onClickFn}(${Math.min(pages, current+1)})" ${current===pages?'disabled':''}>→</button>
  </div>`;
}

// Calendar builder
function mkCalendar(year, month, bookings, colorFn, clickFn) {
  const first = new Date(year, month, 1);
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const startDow = (first.getDay() + 6) % 7;
  const ts = todayStr();
  const firstStr = `${year}-${String(month+1).padStart(2,'0')}-01`;
  const lastStr = `${year}-${String(month+1).padStart(2,'0')}-${String(daysInMonth).padStart(2,'0')}`;

  let html = `<div class="cal-grid">
    ${['Lu','Ma','Me','Je','Ve','Sa','Di'].map(d => `<div class="cal-hd">${d}</div>`).join('')}
    ${Array(startDow).fill('<div class="cal-day we"></div>').join('')}`;

  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const date = new Date(year, month, d);
    const isToday = ds === ts;
    const isWE = date.getDay() === 0 || date.getDay() === 6;
    const dayBk = bookings.filter(b => {
      if (!b.debut) return false;
      const deb = b.debut.substring(0, 10);
      const fin = (b.fin || b.debut).substring(0, 10);
      return deb <= ds && fin >= ds;
    });
    html += `<div class="cal-day${isToday ? ' today' : isWE ? ' we' : ''}">
      <div class="cal-num">${d}</div>
      ${dayBk.map(b => `<div class="cal-ev" onclick="${clickFn}('${b.id}')" style="background:${colorFn(b)}22;color:${colorFn(b)};border-left:2px solid ${colorFn(b)}" title="${esc(b.client||'')} — ${esc(b.voiture||'')}">
        ${(b.voiture || b.client || '').substring(0, 14)}
      </div>`).join('')}
    </div>`;
  }
  return html + '</div>';
}

async function startApp(user) {
  $('login-screen').style.display = 'none';

    console.error('startApp error:', err);
    currentUser = { email: user.email, nom: user.email, role: 'admin' };

  }
}

  const ts = todayStr();
  const debut = b.debut.substring(0, 10);

  if (debut > ts) return { label: 'À venir', badge: 'b-blue' };
  return { label: 'En cours', badge: 'b-green' };

// Calcule le statut dynamique d'un booking selon les dates
function bkDynStatus(b) {
  if (!b || !b.debut) return { label: '—', badge: 'b-gray' };
  const ts = todayStr();
  const debut = b.debut.substring(0, 10);
  const fin = b.fin ? b.fin.substring(0, 10) : debut;
  if (fin < ts) return { label: 'Fermé', badge: 'b-gray' };
  if (debut > ts) return { label: 'À venir', badge: 'b-blue' };
  return { label: 'En cours', badge: 'b-green' };
}

async function renderFlotte() {
  set('app-page', '<div class="loading"><div class="spin"></div> Chargement...</div>');
  const [vRes, bkRes] = await Promise.all([
    db.from('vehicles').select('*').order('nom'),
    (async () => {
      let all = [];
      let from = 0;
      while(true) {
        const { data: p } = await db.from('ferdinand_bookings')
          .select('voiture,prix,debut,fin,statut,type_booking,prix_mensuel')
          .not('voiture','is',null)
          .range(from, from+999);
        if(!p||!p.length) break;
        all=all.concat(p);
        if(p.length<1000) break;
        from+=1000;
      }
      return { data: all };
    })()
  ]);
  fleetData = vRes.data || [];
  const bookings = bkRes.data || [];
  const ts = todayStr();
  const tom = new Date(); tom.setDate(tom.getDate()+1);
  const tomStr = tom.toISOString().split('T')[0];

  // Calculate CA and dynamic status (locations + abonnements)
  fleetCA = {}; fleetDynStatus = {};
  bookings.forEach(b => {
    const nom = (b.voiture || '').trim();
    if (!fleetCA[nom]) fleetCA[nom] = { total: 0, count: 0, mrr: 0, caAbo: 0 };
    const isAbo = b.type_booking === 'abonnement' || (b.prix_mensuel && b.prix_mensuel > 0);

    if (isAbo && b.prix_mensuel > 0) {
      // Règle IFRS : séparer réalisé (mois terminés) et prévisionnel (mois courant+futurs)
      const { realise, previsionnel } = getAbonnementCA(b);
      if (!fleetCA[nom].caAboRealise) fleetCA[nom].caAboRealise = 0;
      if (!fleetCA[nom].caAboPrev) fleetCA[nom].caAboPrev = 0;
      fleetCA[nom].caAboRealise += realise;
      fleetCA[nom].caAboPrev += previsionnel;
      fleetCA[nom].total += realise; // total = locations + réalisé abo seulement
      // MRR si actif maintenant
      const fin = b.fin || '';
      if ((!fin || fin >= ts) && b.debut <= ts) fleetCA[nom].mrr += b.prix_mensuel;
    } else if (b.prix) {
      fleetCA[nom].total += b.prix;
      fleetCA[nom].count++;
    }

    // Statut dynamique
    if (b.debut && (b.fin || isAbo)) {
      const fin = b.fin || new Date(new Date(b.debut).setMonth(new Date(b.debut).getMonth()+24)).toISOString().split('T')[0];
      if (b.debut <= ts && fin >= ts && !fleetDynStatus[nom]) {
        fleetDynStatus[nom] = {
          status: isAbo ? 'long' : 'court',
          booking: b,
          label: isAbo ? 'Abonnement actif' : 'En location'
        };
      } else if (b.debut === tomStr && !fleetDynStatus[nom]) {
        fleetDynStatus[nom] = { status: 'apreparer', booking: b };
      }
    }
  });
  // Mettre à jour le cache des noms de voitures
  _voitureNames = fleetData.filter(v => v.statut !== 'cede').map(v => v.nom).sort();
  renderFlotteHTML();
}

// Affichage du nom complet d'un véhicule : Marque + Modèle
function vNom(v) {
  if (!v) return '—';
  if (v.marque && v.modele) return v.marque + ' ' + v.modele;
  if (v.marque) return v.marque;
  return v.nom || '—';
}

function getCA(nom) {
  // Match exact uniquement — évite Boxster vs Boxster S
  return fleetCA[nom] || null;
}

// CA abonnement selon règles IFRS
// Réalisé = mois dont le DERNIER JOUR est antérieur au 1er du mois courant
// Prévisionnel = mois courant + mois futurs (pas de prorata)
function getAbonnementCA(b) {
  if (!b.debut || !b.prix_mensuel) return { realise: 0, previsionnel: 0 };
  const today = new Date();
  // 1er jour du mois courant = frontière réalisé/prévisionnel
  const frontier = new Date(today.getFullYear(), today.getMonth(), 1);
  const start = new Date(b.debut);
  const end = b.fin ? new Date(b.fin) : null;
  // Si l'abonnement n'a pas encore commencé → tout prévisionnel
  // Si terminé → tout réalisé (jusqu'à la fin)
  let realise = 0, previsionnel = 0;
  // Itérer mois par mois
  let cur = new Date(start.getFullYear(), start.getMonth(), 1);
  const endLimit = end || new Date(today.getFullYear(), today.getMonth() + 24, 1);
  let count = 0;
  while (cur <= endLimit && count < 60) {
    count++;
    const lastDayOfMonth = new Date(cur.getFullYear(), cur.getMonth() + 1, 0);
    if (lastDayOfMonth < frontier) {
      realise += b.prix_mensuel; // mois terminé → réalisé
    } else {
      previsionnel += b.prix_mensuel; // mois courant ou futur → prévisionnel
    }
    cur = new Date(cur.getFullYear(), cur.getMonth() + 1, 1);
  }
  return { realise, previsionnel };
}

function renderFlotteHTML() {
  const cnt = { standby: 0, court: 0, long: 0, repare: 0, leasing: 0, apreparer: 0, cede: 0 };
  fleetData.forEach(v => {
    const ds = fleetDynStatus[v.nom];
    const s = ds ? ds.status : v.statut;
    if (cnt[s] !== undefined) cnt[s]++; else cnt.standby++;
  });
  const rev = fleetData.filter(v => v.loyer > 0).reduce((s,v) => s + v.loyer, 0);
  let list;
  if (fleetFilter === 'tous') {
    list = [...fleetData];
  } else if (fleetFilter === 'actifs') {
    // Actifs = toutes sauf cédées
    list = fleetData.filter(v => v.statut !== 'cede');
  } else {
    list = fleetData.filter(v => {
      const ds = fleetDynStatus[v.nom];
      const s = ds ? ds.status : v.statut;
      return s === fleetFilter;
    });
  }

  set('app-page', `
    <div class="pg-header">
      <div><div class="pg-title">Flotte Ferdinand</div><div class="pg-sub">${fleetData.filter(v=>v.statut!=='cede').length} véhicules actifs · ${fmt(rev)}€/mois revenus</div></div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm${fleetView==='cards'?' btn-primary':''}" onclick="fleetView='cards';renderFlotteHTML()">⊞ Cartes</button>
        <button class="btn btn-sm${fleetView==='table'?' btn-primary':''}" onclick="fleetView='table';renderFlotteHTML()">⊟ Tableau</button>
        <button class="btn btn-primary" onclick="openAddVehicle()">+ Véhicule</button>
      </div>
    </div>
    ${mkStats([
      { l: 'Disponibles', v: cnt.standby, c: 'var(--green)' },
      { l: 'En location', v: cnt.court + cnt.long, c: 'var(--blue)' },
      { l: 'À préparer', v: cnt.apreparer, c: 'var(--amber)' },
      { l: 'Réparation', v: cnt.repare, c: 'var(--red)' },
      { l: 'Cédées', v: cnt.cede, c: 'var(--text3)' },
      { l: 'Revenus/mois', v: fmt(rev) + '€', c: 'var(--green)' },
    ])}
    <div class="filters">
      ${[['actifs','Actives'],['tous','Toutes'],['standby','Disponibles'],['court','En location'],['repare','Réparation'],['cede','Cédées']].map(([f,l]) => `<button class="fpill${f===fleetFilter?' active':''}" onclick="setFleetFilter('${f}')">${l}</button>`).join('')}
    </div>
    ${fleetView === 'table' ? renderFlotteTable(list) : `<div id="fleet-list">${list.map(v => vCard(v)).join('')}</div>`}
  `);
}

function setFleetFilter(f) { fleetFilter = f; renderFlotteHTML(); }

    { key: 'modele',       label: 'Modèle',       type: 'text',   width: '150px' },

    { key: 'loc',          label: 'Localisation', type: 'text',   width: '110px' },
    { key: 'detention',    label: 'Détention',    type: 'select', width: '140px', opts: ['Ferdinand & Friends','Titre perso','Autre société'].map(v=>({k:v,l:v})) },

    { key: 'prix_cession', label: 'Prix cession', type: 'number', width: '100px' },

  ];

  const header = cols.map(c => `<th style="width:${c.width}">${c.label}</th>`).join('');
  const rows = list.map(v => {
    const ca = getCA(v.nom);
    const ds = fleetDynStatus[v.nom];
    const dynLabel = ds ? (ds.label || 'En location') : (ST_LBL[v.statut] || v.statut);
    const dynBadge = ds ? (ds.status === 'court' ? 'b-blue' : ds.status === 'long' ? 'b-purple' : 'b-amber') : (ST_BADGE[v.statut] || 'b-gray');

    const cells = cols.map(c => {
      const val = v[c.key] !== null && v[c.key] !== undefined ? v[c.key] : '';
      if (c.type === 'select') {
        const opts = c.opts.map(o => `<option value="${o.k}" ${val===o.k?'selected':''}>${o.l}</option>`).join('');
        return `<td><select class="etbl-cell etbl-select" data-id="${v.id}" data-key="${c.key}"
          onchange="saveFleetCell(this)" style="font-size:12.5px;padding:4px 6px;width:100%;border:1px solid transparent;border-radius:4px;background:transparent;cursor:pointer;color:var(--fg);font-family:inherit"
          onfocus="this.style.borderColor='var(--fg)'" onblur="this.style.borderColor='transparent'">${opts}</select></td>`;
      }
      return `<td><input class="etbl-cell${c.mono?' style=\"font-family:monospace\"':''}"
        type="${c.type}" data-id="${v.id}" data-key="${c.key}"
        value="${esc(String(val))}"
        onchange="saveFleetCell(this)"
        onkeydown="if(event.key==='Enter'){this.blur()}"
        ${c.type==='number'?'style="text-align:right"':''}/></td>`;
    }).join('');

    const caStr = ca ? `<span style="font-size:11px;color:var(--green);font-weight:600">${fmt(ca.total)}€</span>` : '';
    return `<tr>
      <td style="width:20px;text-align:center;padding:4px 8px">
        <span class="badge ${dynBadge}" style="font-size:9px;padding:1px 5px">${dynLabel.substring(0,10)}</span>
      </td>
      ${cells}

        <button class="btn btn-sm" onclick="openEditVehicle('${v.id}')" style="padding:0 6px;height:22px;font-size:11px">↗</button>
      </td>
    </tr>`;
  }).join('');

  return `<div style="margin-top:4px">
    <div style="font-size:11.5px;color:var(--fg3);margin-bottom:8px">Cliquez sur une cellule pour modifier. Entrée ou Tab pour confirmer — sauvegarde automatique.</div>
    <div class="etbl-wrap">
      <table class="etbl">
        <thead><tr>
          <th style="width:85px">Statut</th>
          ${header}
          <th style="width:70px">CA réalisé</th>
          <th style="width:40px"></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

async function saveFleetCell(el) {
  const id = el.dataset.id;
  const key = el.dataset.key;
  let val = el.type === 'number' ? (parseFloat(el.value) || 0) : el.value;
  if (el.type === 'date' && !val) val = null;

  const v = fleetData.find(x => x.id === id);
  if (!v) return;
  const oldNom = v.nom;

  v[key] = val;

  // Si marque ou modele change → recalculer nom et propager en cascade
  if (key === 'marque' || key === 'modele') {
    const newNom = ((v.marque||'') + ' ' + (v.modele||'')).trim();
    if (newNom && newNom !== oldNom) {
      v.nom = newNom;
      await Promise.all([
        db.from('ferdinand_bookings').update({ voiture: newNom }).eq('voiture', oldNom),
        db.from('entretiens').update({ voiture: newNom }).eq('voiture', oldNom),
        db.from('fleet_tasks').update({ voiture: newNom }).eq('voiture', oldNom),
        db.from('vehicles').update({ [key]: val, nom: newNom }).eq('id', id),
      ]);
      bkData.forEach(b => { if (b.voiture === oldNom) b.voiture = newNom; });
      _voitureNames = [];
    } else {
      await db.from('vehicles').update({ [key]: val }).eq('id', id);
    }
  } else if (key === 'nom') {
    // Direct nom change (legacy) → cascade
    if (val && val !== oldNom) {
      await Promise.all([
        db.from('ferdinand_bookings').update({ voiture: val }).eq('voiture', oldNom),
        db.from('entretiens').update({ voiture: val }).eq('voiture', oldNom),
        db.from('fleet_tasks').update({ voiture: val }).eq('voiture', oldNom),
      ]);
      bkData.forEach(b => { if (b.voiture === oldNom) b.voiture = val; });
      _voitureNames = [];
    }
    await db.from('vehicles').update({ [key]: val }).eq('id', id);
  } else {
    await db.from('vehicles').update({ [key]: val }).eq('id', id);
  }

  // Visual feedback
  el.classList.add('saved');
  setTimeout(() => el.classList.remove('saved'), 1200);
}

    <div class="exp-head" onclick="toggleV('${v.id}')">
      <div style="flex:1;min-width:0">

function toggleV(id) { openV[id] = !openV[id]; if (!openVTab[id]) openVTab[id] = 'infos'; renderFlotteHTML(); }
function setVTab(id, tab) { openVTab[id] = tab; renderFlotteHTML(); }
async function addVTask(id) {
  const inp = $('vt-' + id); if (!inp || !inp.value.trim()) return;
  const v = fleetData.find(x => x.id === id);
  const tasks = [...(v.tasks || []), inp.value.trim()];
  await db.from('vehicles').update({ tasks }).eq('id', id);
  v.tasks = tasks; inp.value = ''; renderFlotteHTML();
}
async function removeVTask(id, idx) {
  const v = fleetData.find(x => x.id === id);
  const tasks = (v.tasks || []).filter((_, i) => i !== idx);
  await db.from('vehicles').update({ tasks }).eq('id', id);
  v.tasks = tasks; renderFlotteHTML();
}
async function addVDoc(id) {
  const n = prompt('Nom du document :'); if (!n) return;
  const v = fleetData.find(x => x.id === id);
  const docs = [...(v.docs || []), n];
  await db.from('vehicles').update({ docs }).eq('id', id);
  v.docs = docs; renderFlotteHTML();
}

function getVehicleForm() {
  const statut = $('vf-statut').value;
  const marque = ($('vf-marque')?.value || '').trim();
  const modele = ($('vf-modele')?.value || '').trim();
  const nom = marque && modele ? marque + ' ' + modele : modele || marque;
  return {
    nom,  // Marque + Modèle = identifiant FK dans les bookings
    marque,
    modele,
    immat: $('vf-immat').value,
    annee: $('vf-annee').value,
    statut,
    loc: $('vf-loc').value,
    detention: $('vf-deten').value,
    garage: $('vf-garage').value,
    entretien: $('vf-entretien').value,
    prochain: $('vf-prochain').value,
    notes: $('vf-notes').value,
    date_cession: statut === 'cede' ? ($('vf-cede-date')?.value || null) : null,
    prix_cession: statut === 'cede' ? (parseFloat($('vf-cede-prix')?.value) || null) : null,
  };
}
function openAddVehicle() {
  openModal('Nouveau véhicule', vehicleFormHTML(), async () => {
    const vf = getVehicleForm();
    const v = { id: 'v' + Date.now(), ...vf, tasks: [], docs: ['Carte grise', 'Assurance'] };
    if (!v.marque && !v.modele && !v.nom) { alert('Marque ou modèle requis'); return; }
    await db.from('vehicles').insert(v);
    fleetData.push(v);
    _voitureNames = []; // reset cache
    closeModal(); renderFlotteHTML();
  });
}
function openEditVehicle(id) {
  const v = fleetData.find(x => x.id === id);
  openModal('Modifier — ' + vNom(v), vehicleFormHTML(v), async () => {
    const u = getVehicleForm();
    const oldNom = v.nom;
    const newNom = u.nom;
    await db.from('vehicles').update(u).eq('id', id);
    // Si le nom a changé → mettre à jour partout en cascade
    if (oldNom && newNom && oldNom !== newNom) {
      await Promise.all([
        db.from('ferdinand_bookings').update({ voiture: newNom }).eq('voiture', oldNom),
        db.from('entretiens').update({ voiture: newNom }).eq('voiture', oldNom),
        db.from('fleet_tasks').update({ voiture: newNom }).eq('voiture', oldNom),
      ]);
      // Mettre à jour aussi dans bkData et entData si chargés en mémoire
      bkData.forEach(b => { if (b.voiture === oldNom) b.voiture = newNom; });
      if (typeof entData !== 'undefined') entData.forEach(e => { if (e.voiture === oldNom) e.voiture = newNom; });
      if (typeof ftData !== 'undefined') ftData.forEach(t => { if (t.voiture === oldNom) t.voiture = newNom; });
    }
    Object.assign(v, u);
    _voitureNames = []; // reset cache
    closeModal(); renderFlotteHTML();
  }, `<button class="btn btn-danger btn-sm" style="margin-right:auto" onclick="deleteVehicle('${id}')">Supprimer</button>`);
}
async function deleteVehicle(id) {
  if (!confirm('Supprimer ce véhicule ?')) return;
  await db.from('vehicles').delete().eq('id', id);
  fleetData = fleetData.filter(x => x.id !== id); closeModal(); renderFlotteHTML();
}

let bkData = [], bkPage = 1, bkFilter = 'upcoming', bkSearch = '', fleetVehicleFilter = '';
const BK_PER = 50;

async function renderLocations() {
  set('app-page', '<div class="loading"><div class="spin"></div> Chargement...</div>');
  // Charger tous les bookings en plusieurs pages si nécessaire
  let allData = [];
  let from = 0;
  const pageSize = 1000;
  while (true) {
    const { data: page } = await db.from('ferdinand_bookings')
      .select('*')
      .order('debut', { ascending: false })
      .range(from, from + pageSize - 1);
    if (!page || page.length === 0) break;
    allData = allData.concat(page);
    if (page.length < pageSize) break;
    from += pageSize;
  }
  const data = allData;
  bkData = data || [];
  renderLocationsHTML();
}

function getBkList() {
  let list = [...bkData];
  const ts = todayStr();
  if (bkFilter === 'upcoming') list = list.filter(b => {
    const fin = b.fin ? b.fin.substring(0,10) : (b.debut ? b.debut.substring(0,10) : '');
    return fin >= ts;
  });
  else if (bkFilter !== 'tous') list = list.filter(b => b.debut && b.debut.startsWith(bkFilter));
  if (bkSearch) { const q = bkSearch.toLowerCase(); list = list.filter(b => (b.client||'').toLowerCase().includes(q) || (b.voiture||'').toLowerCase().includes(q)); }
  if (fleetVehicleFilter) list = list.filter(b => (b.voiture||'') === fleetVehicleFilter);
  return list;
}

function renderLocationsHTML() {
  const caTotal = bkData.reduce((s, b) => s + (b.prix || 0), 0);
  const voitures = ['', '911 Carrera S', '911 Targa 4 GTS', 'Boxster', 'Boxster S', 'Cayenne Hybrid', 'Cayenne Craie', 'Cayman GTS', 'Ferrari Portofino', 'Macan GTS', 'Macan S', 'Mercedes'];
  set('app-page', `
    <div class="pg-header">
      <div><div class="pg-title">Ferdinand — Locations</div><div class="pg-sub">${bkData.length} bookings · CA total ${fmt(caTotal)}€</div></div>
      <button class="btn btn-primary" onclick="openAddBooking()">+ Booking</button>
    </div>
    <div id="bk-stats"></div>
    <div class="filters">
      ${['upcoming','tous','2026','2025','2024','2023','2022','2021'].map(f => `<button class="fpill${f===bkFilter?' active':''}" onclick="setBkFilter('${f}')">${f==='upcoming'?'À venir':f==='tous'?'Tous':f}</button>`).join('')}
      <div class="search-wrap"><span class="search-icon">🔍</span><input class="search-box" id="bk-search" placeholder="Client, voiture..." oninput="bkSearch=this.value;bkPage=1;refreshBkList()"></div>
      <select class="fi" style="width:auto;padding:0 10px;height:32px" onchange="fleetVehicleFilter=this.value;bkPage=1;refreshBkList()" id="bk-voi-select">
        ${(['', ..._voitureNames.length?_voitureNames:voitures]).map(v => `<option value="${v}" ${fleetVehicleFilter===v?'selected':''}>${v||'Toutes voitures'}</option>`).join('')}
      </select>
    </div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:8px">Cliquer sur une ligne pour modifier</div>
    <div id="bk-table"></div>
    <div id="bk-pag"></div>
  `);
  // Charger la liste dynamique des voitures si pas encore fait
  loadVoitureNames().then(() => {
    const sel = document.getElementById('bk-voi-select');
    if (sel && _voitureNames.length) {
      const cur = fleetVehicleFilter;
      sel.innerHTML = ['', ..._voitureNames].map(v =>
        `<option value="${v}" ${cur===v?'selected':''}>${v||'Toutes voitures'}</option>`
      ).join('');

}

function setBkFilter(f) { bkFilter = f; bkPage = 1; refreshBkList(); }

function refreshBkList() {
  const list = getBkList();
  const ca = list.reduce((s, b) => s + (b.prix || 0), 0);
  const label = bkFilter === 'upcoming' ? 'À venir' : bkFilter === 'tous' ? 'Total' : bkFilter;
  const nEnCours = list.filter(b => bkDynStatus(b).label === 'En cours').length;

  set('bk-stats', mkStats([
    { l: `Bookings (${label})`, v: fmt(list.length) },
    { l: `CA (${label})`, v: fmt(ca) + '€', c: 'var(--green)' },
    { l: 'En cours', v: nEnCours, c: 'var(--green)' },
    { l: 'À venir', v: nAVenir, c: 'var(--blue)' },
    { l: 'CA total historique', v: fmt(bkData.reduce((s,b) => s+(b.prix||0), 0)) + '€' },
  ]));
  const start = (bkPage - 1) * BK_PER;
  const page = list.slice(start, start + BK_PER);

      <td><span class="badge ${srcBadge(b.source)}">${b.source||'—'}</span></td>
      <td><span class="badge ${bkDynStatus(b).badge}">${bkDynStatus(b).label}</span></td>
      <td>${b.lien_contrat?`<a href="${b.lien_contrat}" target="_blank" onclick="event.stopPropagation()" style="color:var(--blue)">📄</a>`:'—'}</td>
      <td style="font-size:12px;color:var(--text2);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.commentaire||''}</td>
    </tr>`;
  });
  set('bk-table', mkTable(['Voiture','Client','Début','Fin','Prix','Source','Statut','Contrat','Notes'], rows));
  set('bk-pag', mkPag(list.length, BK_PER, bkPage, 'setBkPage'));
}
function setBkPage(p) { bkPage = p; refreshBkList(); }

function getBkForm() {
  const debut = $('bf-d').value || null;
  const fin = $('bf-f').value || null;
  const ts = todayStr();
  let statut = 'Fermé';
  if (debut && fin) {

    else statut = 'En cours';

    statut = 'À venir';

  return { voiture: $('bf-v').value, client: $('bf-c').value, email: $('bf-e').value, tel: $('bf-t').value, debut, fin, prix: parseFloat($('bf-p').value) || 0, source: $('bf-s').value, statut, km: parseInt($('bf-km').value) || 0, lien_contrat: $('bf-ctr').value || null, commentaire: $('bf-cm').value, type_booking: 'ponctuel', prix_mensuel: 0 };

async function openEditBooking(id) {

    const u = getBkForm();
    await db.from('ferdinand_bookings').update(u).eq('id', id);

async function deleteBooking(id) {

}

// FERDINAND — PLANNING
// ═══════════════════════════════════════════════════════
let planYear = new Date().getFullYear(), planMonth = new Date().getMonth();

async function renderPlanning() {
  set('app-page', '<div class="loading"><div class="spin"></div> Chargement...</div>');
  // Filtrer par plage ±1 an — requête simple sans .or() qui pose problème
  const yearStart = (planYear - 1) + '-01-01';
  const yearEnd   = (planYear + 1) + '-12-31';
  const { data } = await db.from('ferdinand_bookings')
    .select('id,voiture,client,debut,fin,prix,source,statut,type_booking,prix_mensuel')
    .gte('debut', yearStart)
    .lte('debut', yearEnd)
    .order('debut')
    .limit(2000);
  // Abonnements longs commencés avant la fenêtre mais encore actifs
  const { data: aboLongs } = await db.from('ferdinand_bookings')
    .select('id,voiture,client,debut,fin,prix,source,statut,type_booking,prix_mensuel')
    .eq('type_booking', 'abonnement')
    .lt('debut', yearStart)
    .gte('fin', yearStart)
    .limit(100);
  const bookings = [...(data||[]), ...(aboLongs||[])].filter(b => b.debut).map(b => ({
    ...b, fin: b.fin || b.debut
  }));
  renderPlanningHTML(bookings);
}

function renderPlanningHTML(bookings) {
  const ml = new Date(planYear, planMonth, 1).toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
  const firstStr = `${planYear}-${String(planMonth+1).padStart(2,'0')}-01`;
  const lastStr = `${planYear}-${String(planMonth+1).padStart(2,'0')}-${String(new Date(planYear,planMonth+1,0).getDate()).padStart(2,'0')}`;
  const bkMois = bookings.filter(b => {
    const deb = b.debut ? b.debut.substring(0,10) : null;
    const fin = b.fin ? b.fin.substring(0,10) : deb;
    return deb && fin && deb <= lastStr && fin >= firstStr;
  });
  const voiColor = v => ({ '911 Carrera S': '#2563eb', '911 Targa 4 GTS': '#7c3aed', 'Boxster': '#059669', 'Boxster S': '#059669', 'Cayman GTS': '#db2777', 'Cayenne Hybrid': '#d97706', 'Cayenne Craie': '#d97706', 'Ferrari Portofino': '#dc2626', 'Macan GTS': '#65a30d', 'Macan S': '#65a30d', 'Mercedes': '#6b7280' }[v] || '#6b7280');
  // Couleur par type — abonnements en violet
  const bkColor = b => b.type_booking === 'abonnement' ? '#7c3aed' : voiColor(b.voiture);

  set('app-page', `
    <div class="pg-header">
      <div><div class="pg-title">Ferdinand — Planning</div><div class="pg-sub">${bkMois.length} locations ce mois</div></div>
      <button class="btn btn-primary" onclick="openAddBooking()">+ Booking</button>
    </div>
    ${mkStats([
      { l: 'Ce mois', v: bkMois.length, c: 'var(--blue)' },
      { l: 'CA ce mois', v: fmt(bkMois.reduce((s,b) => {
    // Pour les abonnements : compter 1 mensualité, pas le total du contrat
    if (b.type_booking === 'abonnement' || b.prix_mensuel > 0) return s + (b.prix_mensuel || 0);
    return s + (b.prix || 0);
  }, 0)) + '€', c: 'var(--green)' },
      { l: 'Voitures actives', v: [...new Set(bkMois.map(b=>b.voiture))].length },
    ])}
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <button class="btn btn-sm" onclick="planMonth--;if(planMonth<0){planMonth=11;planYear--;}renderPlanning()">←</button>
      <span style="font-size:15px;font-weight:600;flex:1;text-align:center">${ml.charAt(0).toUpperCase()+ml.slice(1)}</span>
      <button class="btn btn-sm" onclick="planMonth++;if(planMonth>11){planMonth=0;planYear++;}renderPlanning()">→</button>
      <button class="btn btn-sm" onclick="planYear=new Date().getFullYear();planMonth=new Date().getMonth();renderPlanning()">Aujourd'hui</button>
    </div>
    <div class="card" style="padding:10px">
      ${mkCalendar(planYear, planMonth, bkMois, b => b.type_booking==='abonnement'?'#7c3aed':voiColor(b.voiture), 'openEditBookingOrAbo')}
    </div>
    ${bkMois.length ? `<div style="margin-top:14px">
      ${bkMois.sort((a,b)=>a.debut.localeCompare(b.debut)).map(b => {
        const col = voiColor(b.voiture);
        const nights = b.debut && b.fin ? Math.ceil((new Date(b.fin)-new Date(b.debut))/864e5) : 0;
        return `<div onclick="openEditBooking('${b.id}')" style="border:1px solid var(--border);border-left:3px solid ${col};border-radius:6px;padding:8px 12px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:#fff">
          <div>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
              <span style="width:8px;height:8px;border-radius:50%;background:${col};flex-shrink:0"></span>
              <span style="font-weight:600">${b.voiture||'—'}</span>
              <span class="badge ${srcBadge(b.source)}">${b.source}</span>
              ${(()=>{const s=bkDynStatus(b);return`<span class="badge ${s.badge}">${s.label}</span>`;})()}
            </div>
            <div style="font-size:13px">${b.client||'—'}</div>
            <div style="font-size:12px;color:var(--text2)">${fmtShort(b.debut)} → ${fmtShort(b.fin)}${nights ? ` · ${nights} nuit${nights>1?'s':''}` : ''}</div>
          </div>
          ${b.prix ? `<div style="font-weight:700;font-size:14px;color:var(--green)">${fmt(b.prix)}€</div>` : ''}
        </div>`;
      }).join('')}
    </div>` : ''}
  `);
}

// FERDINAND — FINANCE STRIPE
// ═══════════════════════════════════════════════════════
async function renderFinance() {
  set('app-page', `
    <div class="pg-header"><div><div class="pg-title">Ferdinand — Finance Stripe</div><div class="pg-sub">Rapprochement paiements</div></div></div>
    <div id="stripe-content"><div class="loading"><div class="spin"></div> Chargement Stripe...</div></div>
  `);
  try {
    const [sRes, bRes] = await Promise.all([
      fetch('/api/stripe?limit=100'),
      db.from('ferdinand_bookings').select('id,client,voiture,debut,prix,stripe_payment_id')
    ]);
    if (!sRes.ok) throw new Error('Erreur API Stripe');
    const sData = await sRes.json();
    const charges = (sData.data || []).filter(c => c.captured !== false && (c.amount_captured || 0) > 0);
    const cautions = (sData.data || []).filter(c => c.captured === false || (c.amount_captured || 0) === 0);
    const bookings = bRes.data || [];
    renderFinanceData(charges, cautions, bookings);
  } catch(e) {
    set('stripe-content', `<div class="alert a-red">Erreur : ${e.message}. Vérifiez que STRIPE_RESTRICTED_KEY est configurée dans Vercel.</div>`);
  }
}

function strSim(a, b) {
  if (!a || !b) return 0;
  a = a.toLowerCase(); b = b.toLowerCase();
  if (a === b) return 1;
  if (a.includes(b) || b.includes(a)) return 0.8;
  const wa = new Set(a.split(/\s+/)), wb = new Set(b.split(/\s+/));
  const inter = [...wa].filter(w => wb.has(w)).length;
  return inter / new Set([...wa,...wb]).size;
}

function renderFinanceData(charges, cautions, bookings) {
  const total = charges.reduce((s,c) => s+(c.amount_captured||0), 0);
  const linked = bookings.filter(b => b.stripe_payment_id).length;

  // Reconciliation
  const results = charges.map(c => {
    const name = (c.billing_details?.name || c.description || '').toLowerCase();
    const amount = (c.amount_captured || 0) / 100;
    const date = new Date(c.created * 1000);
    // Un paiement Stripe peut être un acompte (partiel) — on tolère un écart jusqu'à 80%
    let best = null, bestScore = 0;
    bookings.filter(b => !b.stripe_payment_id).forEach(b => {
      let score = 0;
      const sim = strSim(name, (b.client||'').toLowerCase());
      if (sim > 0.7) score += 2; else if (sim > 0.4) score += 1;
      // Tolérance élargie : un acompte peut être 30-70% du montant total
      const diff = b.prix ? Math.abs(amount - b.prix) / b.prix : 1;
      if (diff < 0.1) score += 2;
      else if (diff < 0.4) score += 1;   // acompte probable
      else if (diff < 0.75) score += 0;  // possible mais faible confiance
      if (b.debut) { const days = Math.abs(date - new Date(b.debut)) / 864e5; if (days < 7) score += 2; else if (days < 30) score += 1; }
      if (score > bestScore) { bestScore = score; best = b; }
    });
    return { c, match: best, score: bestScore, auto: bestScore >= 4, suggest: bestScore >= 2 && bestScore < 4 };
  });

  const auto = results.filter(r => r.auto);
  const suggest = results.filter(r => r.suggest && !r.auto);
  const unmatched = results.filter(r => !r.auto && !r.suggest);

  let html = mkStats([
    { l: 'Paiements encaissés', v: charges.length, c: 'var(--green)' },
    { l: 'Total encaissé', v: fmt(total/100) + '€', c: 'var(--green)' },
    { l: 'Cautions (non encaissées)', v: cautions.length, c: 'var(--amber)' },
    { l: 'Locations liées', v: linked, c: 'var(--blue)' },
    { l: 'Non pointées', v: unmatched.length },
  ]);

  if (auto.length) html += `<div class="card">
    <div style="font-size:13px;font-weight:600;color:var(--green);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
      ✓ Rapprochements automatiques (${auto.length})
      <button class="btn btn-sm btn-primary" onclick="confirmAllAuto()">Confirmer tous</button>
    </div>
    ${mkTable(['Client Stripe','Montant','Date','↔ Booking','Voiture','Action'],
      auto.map(r => `<tr>
        <td><strong>${r.c.billing_details?.name||r.c.description||'—'}</strong></td>
        <td style="color:var(--green);font-weight:600">${fmt((r.c.amount_captured||0)/100)}€${r.match && r.match.prix && Math.abs((r.c.amount_captured||0)/100 - r.match.prix)/r.match.prix > 0.1 ? ' <span class="badge b-amber" title="Paiement partiel / acompte">Acompte</span>' : ''}</td>
        <td>${new Date(r.c.created*1000).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'})}</td>
        <td>${r.match?.client||'—'}</td>
        <td>${r.match?.voiture||'—'}</td>
        <td><button class="btn btn-sm" style="background:var(--green);color:#fff;border-color:var(--green)" onclick="confirmLink('${r.c.id}','${r.match?.id}',${(r.c.amount_captured||0)/100})">✓ Lier</button></td>
      </tr>`)
    )}
  </div>`;

  if (unmatched.length) html += `<div class="card">
    <div style="font-size:13px;font-weight:600;margin-bottom:10px">Transactions non pointées (${unmatched.length})</div>
    ${mkTable(['Client Stripe','Montant','Date','Statut','Action'],
      unmatched.map(r => `<tr>
        <td>${r.c.billing_details?.name||r.c.description||'—'}</td>
        <td style="font-weight:600;color:var(--green)">${fmt((r.c.amount_captured||0)/100)}€</td>
        <td>${new Date(r.c.created*1000).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'})}</td>
        <td><span class="badge ${r.c.refunded?'b-amber':r.c.status==='succeeded'?'b-green':'b-red'}">${r.c.refunded?'Remboursé':r.c.status==='succeeded'?'Réussi':r.c.status}</span></td>
        <td><button class="btn btn-sm" onclick="openManualLink('${r.c.id}')">Lier</button></td>
      </tr>`)
    )}
  </div>`;

  if (cautions.length) html += `<div class="card">
    <div style="font-size:13px;font-weight:600;color:var(--amber);margin-bottom:8px">Cautions / Autorisations (${cautions.length}) — non encaissées</div>
    <div class="alert a-warn">Ces transactions sont des autorisations sur carte. L'argent n'a pas été prélevé.</div>
    ${mkTable(['Client','Montant autorisé','Date'],
      cautions.map(c => `<tr>
        <td>${c.billing_details?.name||c.description||'—'}</td>
        <td style="color:var(--amber);font-weight:600">${fmt((c.amount||0)/100)}€</td>
        <td>${new Date(c.created*1000).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'})}</td>
      </tr>`)
    )}
  </div>`;

  set('stripe-content', html);
  window._stripeCharges = charges;
  window._stripeBk = bookings;
}

  renderFinance();

let aboData = [], aboFilter = 'actifs';

async function renderAbonnements() {
  set('app-page', '<div class="loading"><div class="spin"></div> Chargement...</div>');
  // Charger les abonnements depuis ferdinand_bookings avec type_booking='abonnement'
  let all = [];
  let from = 0;
  while(true) {
    const { data: p } = await db.from('ferdinand_bookings')
      .select('*')
      .eq('type_booking', 'abonnement')
      .order('debut', { ascending: false })
      .range(from, from+999);
    if(!p||!p.length) break;
    all = all.concat(p);
    if(p.length<1000) break;
    from+=1000;
  }
  aboData = all;
  renderAbonnementsHTML();
}

function getAboStatut(b) {
  const ts = todayStr();
  const fin = b.fin ? b.fin.substring(0,10) : null;
  const deb = b.debut ? b.debut.substring(0,10) : null;
  if (!deb) return { label: '—', badge: 'b-gray' };
  if (fin && fin < ts) return { label: 'Terminé', badge: 'b-gray' };
  if (deb > ts) return { label: 'À venir', badge: 'b-blue' };
  return { label: 'Actif', badge: 'b-green' };
}

function getAboMensualites(b) {
  if (!b.debut || !b.prix_mensuel) return 0;
  const start = new Date(b.debut);
  const ts = todayStr();
  const end = b.fin ? new Date(b.fin) : new Date();
  const endOrNow = b.fin && b.fin < ts ? new Date(b.fin) : new Date(ts);
  return Math.max(0, Math.round((endOrNow - start) / (1000*60*60*24*30)));
}

function renderAbonnementsHTML() {
  const ts = todayStr();
  const actifs = aboData.filter(b => {
    const fin = b.fin ? b.fin.substring(0,10) : null;
    const deb = b.debut ? b.debut.substring(0,10) : null;
    return deb && deb <= ts && (!fin || fin >= ts);
  });
  const termines = aboData.filter(b => b.fin && b.fin.substring(0,10) < ts);
  const avenir = aboData.filter(b => b.debut && b.debut.substring(0,10) > ts);

  const mrrTotal = actifs.reduce((s,b) => s + (b.prix_mensuel||0), 0);
  // CA IFRS : séparer réalisé et prévisionnel
  let caRealise = 0, caPrevisionnel = 0;
  aboData.forEach(b => {
    const { realise, previsionnel } = getAbonnementCA(b);
    caRealise += realise;
    caPrevisionnel += previsionnel;
  });
  const caTotal = caRealise + caPrevisionnel;

  let list = aboFilter === 'actifs' ? actifs : aboFilter === 'termines' ? termines : aboFilter === 'avenir' ? avenir : aboData;

  set('app-page', `
    <div class="pg-header">
      <div><div class="pg-title">Ferdinand — Abonnements</div>
      <div class="pg-sub">Locations longue durée · ${aboData.length} contrats</div></div>
      <button class="btn btn-primary" onclick="openAddAbonnement()">+ Abonnement</button>
    </div>
    ${mkStats([
      { l: 'Actifs', v: actifs.length, c: 'var(--green)' },
      { l: 'MRR actuel', v: fmt(mrrTotal) + '€/mois', c: 'var(--purple)' },
      { l: 'CA réalisé', v: fmt(caRealise) + '€', c: 'var(--green)' },
      { l: 'Prévisionnel', v: fmt(caPrevisionnel) + '€', c: 'var(--purple)' },
      { l: 'Terminés', v: termines.length, c: 'var(--fg3)' },
    ])}
    <div class="filters">
      ${[['actifs','Actifs'],['avenir','À venir'],['termines','Terminés'],['tous','Tous']].map(([f,l]) =>
        `<button class="fpill${f===aboFilter?' active':''}" onclick="setAboFilter('${f}')">${l}</button>`
      ).join('')}
    </div>
    ${list.length ? `<div>
      ${list.map(b => {
        const st = getAboStatut(b);
        const moisEcoules = getAboMensualites(b);
        const caGenere = (b.prix_mensuel||0) * moisEcoules;
        const finDate = b.fin ? b.fin.substring(0,10) : null;
        const dureeStr = b.debut && finDate ? `${b.debut.substring(0,7)} → ${finDate.substring(0,7)}` : b.debut ? `Depuis ${b.debut.substring(0,7)}` : '—';
        return `<div class="exp-card">
          <div class="exp-head" onclick="openEditAbonnement('${b.id}')" style="cursor:pointer">
            <div style="flex:1;min-width:0">
              <div style="display:flex;gap:5px;margin-bottom:4px;flex-wrap:wrap;align-items:center">
                <span class="badge ${st.badge}">${st.label}</span>
                ${b.prix_mensuel ? `<span class="badge b-purple">${fmt(b.prix_mensuel)}€/mois</span>` : ''}
                <span class="badge b-gray">${b.voiture||'—'}</span>
              </div>
              <div style="font-weight:600;font-size:14px">${b.client||'—'}</div>
              <div style="font-size:12px;color:var(--text2);margin-top:1px">${dureeStr}</div>
              <div style="font-size:11px;margin-top:2px">
                <span style="color:var(--green);font-weight:600">${fmt(caGenere)}€ encaissé</span>
                <span style="color:var(--text3)"> · ${moisEcoules} mois</span>
                ${b.lien_contrat ? ` · <a href="${b.lien_contrat}" target="_blank" style="color:var(--blue)" onclick="event.stopPropagation()">📄 Contrat</a>` : ''}
              </div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              ${b.prix_mensuel ? `<div style="font-size:16px;font-weight:700;color:var(--purple)">${fmt(b.prix_mensuel)}€</div><div style="font-size:11px;color:var(--text3)">par mois</div>` : ''}
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>` : `<div style="text-align:center;padding:40px;color:var(--text2)">
      <div style="font-size:32px;margin-bottom:8px">📋</div>
      <div style="font-weight:500">Aucun abonnement ${aboFilter === 'actifs' ? 'actif' : ''}</div>
      <div style="font-size:12px;margin-top:4px">Les abonnements sont des locations longue durée.</div>
      <button class="btn btn-primary" style="margin-top:12px" onclick="openAddAbonnement()">+ Créer un abonnement</button>
    </div>`}
  `);
}

let ftData = [], ftFilter = 'open';

async function renderFleetTasks() {
  set('app-page', '<div class="loading"><div class="spin"></div> Chargement...</div>');
  const { data } = await db.from('fleet_tasks').select('*').order('echeance', { ascending: true, nullsFirst: false }).limit(500);
  ftData = data || [];
  renderFleetTasksHTML();
}

function renderFleetTasksHTML() {
  const open = ftData.filter(t => !t.done);
  const done = ftData.filter(t => t.done);
  const urgentes = open.filter(t => t.priorite === 'urgente');
  const ts = todayStr();
  const enRetard = open.filter(t => t.echeance && t.echeance < ts);

  let list = ftFilter === 'open' ? open : ftFilter === 'done' ? done : ftData;

  const PRIO_BADGE = { urgente: 'b-red', normale: 'b-blue', basse: 'b-gray' };

  set('app-page', `
    <div class="pg-header">
      <div><div class="pg-title">Tâches Flotte</div>
      <div class="pg-sub">${open.length} tâches ouvertes</div></div>
      <button class="btn btn-primary" onclick="openAddFleetTask()">+ Tâche</button>
    </div>
    ${mkStats([
      { l: 'Ouvertes', v: open.length, c: 'var(--blue)' },
      { l: 'Urgentes', v: urgentes.length, c: urgentes.length>0?'var(--red)':'var(--green)' },
      { l: 'En retard', v: enRetard.length, c: enRetard.length>0?'var(--red)':'var(--green)' },
      { l: 'Terminées', v: done.length, c: 'var(--text3)' },
    ])}
    ${urgentes.length ? `<div class="alert a-red">🚨 ${urgentes.length} tâche${urgentes.length>1?'s':''} urgente${urgentes.length>1?'s':''} — ${urgentes.map(t=>t.titre).join(', ')}</div>` : ''}
    <div class="filters">
      ${[['open','Ouvertes'],['done','Terminées'],['tous','Toutes']].map(([f,l])=>`<button class="fpill${f===ftFilter?' active':''}" onclick="setFtFilter('${f}')">${l}</button>`).join('')}
    </div>
    <div>
      ${list.map(t => {
        const isRetard = !t.done && t.echeance && t.echeance < ts;
        return `<div class="exp-card" style="border-left:3px solid ${t.priorite==='urgente'?'var(--red)':t.priorite==='basse'?'var(--border)':'var(--blue)'}">
          <div style="display:flex;align-items:flex-start;gap:10px;padding:12px 14px">
            <button onclick="toggleFtDone('${t.id}')" style="margin-top:2px;width:18px;height:18px;border-radius:4px;border:2px solid ${t.done?'var(--green)':'var(--border2)'};background:${t.done?'var(--green)':'#fff'};cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px">${t.done?'✓':''}</button>
            <div style="flex:1;min-width:0">
              <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:3px">
                <span style="font-weight:${t.done?'400':'600'};text-decoration:${t.done?'line-through':'none'};color:${t.done?'var(--text3)':'var(--text)'}">${t.titre}</span>
                <span class="badge ${PRIO_BADGE[t.priorite]||'b-gray'}">${t.priorite||'normale'}</span>
                ${t.voiture?`<span class="badge b-gray">${t.voiture}</span>`:''}
              </div>
              ${t.notes?`<div style="font-size:12px;color:var(--text2)">${t.notes}</div>`:''}
              ${t.echeance?`<div style="font-size:12px;color:${isRetard?'var(--red)':'var(--text3)'}">📅 ${isRetard?'En retard · ':''}${fmtDate(t.echeance)}</div>`:''}
            </div>
            <button onclick="openEditFleetTask('${t.id}')" style="border:none;background:none;cursor:pointer;color:var(--text3);font-size:13px;padding:2px 6px">✏</button>
          </div>
        </div>`;
      }).join('') || `<div style="text-align:center;padding:40px;color:var(--text2)">
        <div style="font-size:32px;margin-bottom:8px">✅</div>
        <div style="font-weight:500">Aucune tâche ${ftFilter==='open'?'ouverte':''}</div>
        <button class="btn btn-primary" style="margin-top:12px" onclick="openAddFleetTask()">+ Créer une tâche</button>
      </div>`}
    </div>
  `);
}

function setFtFilter(f) { ftFilter = f; renderFleetTasksHTML(); }

async function toggleFtDone(id) {
  const t = ftData.find(x => x.id === id); if (!t) return;

async function openEditFleetTask(id) {

async function renderAReservations() {
  set('app-page', '<div class="loading"><div class="spin"></div> Chargement...</div>');
  await loadAbData();
  renderAResaHTML();
}

function getAbList() {
  let list = [...abData];
  const ts = todayStr();
  if (abFilter === 'upcoming') list = list.filter(b => b.arrive && b.arrive >= ts && !b.annule);
  else if (abFilter !== 'tous') list = list.filter(b => b.arrive && b.arrive.startsWith(abFilter));
  if (abSearch) { const q = abSearch.toLowerCase(); list = list.filter(b => (b.client||'').toLowerCase().includes(q)); }
  if (abBienFilter) list = list.filter(b => b.bien === abBienFilter);
  return list.sort((a, b) => b.arrive.localeCompare(a.arrive));
}
const getAbRev = b => (b.airbnb||0) + (b.direct||0) + (b.montant||0);

function renderAResaHTML() {
  const all = abData.filter(b => !b.annule);
  set('app-page', `
    <div class="pg-header">
      <div><div class="pg-title">AirBnB — Réservations</div><div class="pg-sub">Paris + Le Touquet</div></div>
      <button class="btn btn-primary" onclick="openAddABK()">+ Réservation</button>
    </div>
    <div id="ab-stats"></div>
    <div class="filters">
      ${['upcoming','tous','2026','2025','2024','2023'].map(f => `<button class="fpill${f===abFilter?' active':''}" onclick="setAbFilter('${f}')">${f==='upcoming'?'À venir':f==='tous'?'Tous':f}</button>`).join('')}
      <div class="search-wrap"><span class="search-icon">🔍</span><input class="search-box" placeholder="Client..." oninput="abSearch=this.value;abPage=1;refreshAbList()"></div>
      <select class="fi" style="width:auto;padding:6px 10px" onchange="abBienFilter=this.value;abPage=1;refreshAbList()">
        <option value="">Tous les biens</option>
        <option value="touquet" ${abBienFilter==='touquet'?'selected':''}>Le Touquet</option>
        <option value="paris" ${abBienFilter==='paris'?'selected':''}>Paris</option>
      </select>
    </div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:8px">Cliquer pour modifier</div>
    <div id="ab-table"></div><div id="ab-pag"></div>
  `);
  refreshAbList();
}

function setAbFilter(f) { abFilter = f; abPage = 1; refreshAbList(); }
function refreshAbList() {
  const list = getAbList();
  const ca = list.reduce((s,b) => s + getAbRev(b), 0);
  const label = abFilter === 'upcoming' ? 'À venir' : abFilter === 'tous' ? 'Total' : abFilter;
  set('ab-stats', mkStats([
    { l: `Résa (${label})`, v: fmt(list.length) },
    { l: `CA (${label})`, v: fmt(ca) + '€', c: 'var(--green)' },
    { l: 'Total AirBnB net', v: '159 482€' },
  ]));
  const start = (abPage - 1) * BK_PER;
  const page = list.slice(start, start + BK_PER);
  const rows = page.map(b => {
    const nights = b.arrive && b.depart ? Math.ceil((new Date(b.depart)-new Date(b.arrive))/864e5) : null;
    const bienColor = b.bien === 'paris' ? '#2563eb' : '#7c3aed';
    return `<tr class="clickable" onclick="openEditABK('${b.id}')">
      <td><span class="badge" style="background:${bienColor}22;color:${bienColor}">${b.bien==='paris'?'Paris':'Touquet'}</span></td>
      <td>${b.client||'—'}</td>
      <td><span class="badge ${srcBadge(b.source)}">${b.source||'—'}</span></td>
      <td style="white-space:nowrap">${fmtShort(b.arrive)}</td>
      <td style="white-space:nowrap">${fmtShort(b.depart)||'—'}</td>
      <td>${nights ? nights + ' nuits' : '—'}</td>
      <td style="font-weight:600;color:var(--green)">${getAbRev(b)?fmt(getAbRev(b))+'€':'—'}</td>
      <td style="font-size:12px;color:var(--text2)">${b.notes||''}</td>
    </tr>`;
  });
  set('ab-table', mkTable(['Bien','Client','Source','Arrivée','Départ','Durée','Montant','Notes'], rows));
  set('ab-pag', mkPag(list.length, BK_PER, abPage, 'setAbPage'));
}
function setAbPage(p) { abPage = p; refreshAbList(); }

async function renderAPlanning() {
  set('app-page', '<div class="loading"><div class="spin"></div> Chargement...</div>');
  if (!abData.length) await loadAbData();
  const bookings = abData.filter(b => b.arrive && b.depart && !b.annule).map(b => ({ ...b, debut: b.arrive, fin: b.depart, voiture: b.bien === 'paris' ? 'Paris' : 'Touquet' }));

  set('app-page', `
    <div class="pg-header"><div><div class="pg-title">AirBnB — Planning</div><div class="pg-sub">Paris + Le Touquet</div></div><button class="btn btn-primary" onclick="openAddABK()">+ Réservation</button></div>
    ${mkStats([{ l: 'Ce mois', v: bkMois.length, c: 'var(--blue)' }, { l: 'CA', v: fmt(bkMois.reduce((s,b)=>s+getAbRev(b),0))+'€', c: 'var(--green)' }])}
    <div style="display:flex;gap:8px;margin-bottom:12px;font-size:12px">
      <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#7c3aed;display:inline-block"></span>Le Touquet</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#2563eb;display:inline-block"></span>Paris</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <button class="btn btn-sm" onclick="abPlanMonth--;if(abPlanMonth<0){abPlanMonth=11;abPlanYear--;}renderAPlanning()">←</button>
      <span style="font-size:15px;font-weight:600;flex:1;text-align:center">${ml.charAt(0).toUpperCase()+ml.slice(1)}</span>
      <button class="btn btn-sm" onclick="abPlanMonth++;if(abPlanMonth>11){abPlanMonth=0;abPlanYear++;}renderAPlanning()">→</button>
      <button class="btn btn-sm" onclick="abPlanYear=new Date().getFullYear();abPlanMonth=new Date().getMonth();renderAPlanning()">Aujourd'hui</button>
    </div>
    <div class="card" style="padding:10px">${mkCalendar(abPlanYear, abPlanMonth, bkMois, bienColor, 'openEditABK')}</div>
    ${bkMois.length ? `<div style="margin-top:14px">${bkMois.sort((a,b)=>a.debut.localeCompare(b.debut)).map(b => {
      const col = bienColor(b);
      const nights = Math.ceil((new Date(b.fin)-new Date(b.debut))/864e5);
      return `<div onclick="openEditABK('${b.id}')" style="border:1px solid var(--border);border-left:3px solid ${col};border-radius:6px;padding:8px 12px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:#fff">
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px"><span style="font-weight:600">${b.voiture}</span><span class="badge ${srcBadge(b.source)}">${b.source}</span></div>
          <div>${b.client||'—'}</div>
          <div style="font-size:12px;color:var(--text2)">${fmtShort(b.arrive)} → ${fmtShort(b.depart)} · ${nights} nuit${nights>1?'s':''}</div>
        </div>
        ${getAbRev(b) ? `<div style="font-weight:700;color:var(--green)">${fmt(getAbRev(b))}€</div>` : ''}

    }).join('')}</div>` : ''}
  `);

let elisaView = 'agenda', elisaTasks = [];
let elCalYear = new Date().getFullYear(), elCalMonth = new Date().getMonth();
const VACANCES = [
  {label:'Printemps 2025',start:'2025-04-19',end:'2025-05-04'},
  {label:'Été 2025',start:'2025-07-05',end:'2025-08-31'},
  {label:'Toussaint 2025',start:'2025-10-18',end:'2025-11-02'},
  {label:'Noël 2025',start:'2025-12-20',end:'2026-01-04'},
  {label:'Hiver 2026',start:'2026-02-14',end:'2026-03-01'},
  {label:'Printemps 2026',start:'2026-04-11',end:'2026-04-26'},
];
const REF_PAPA = new Date(2025,3,2);

function getPeriod(date) {
  for (const v of VACANCES) { const s=new Date(v.start),e=new Date(v.end); e.setHours(23,59,59); if(date>=s&&date<=e) return {type:'vac',label:v.label}; }
  const d=new Date(date); d.setHours(12); const ref=new Date(REF_PAPA); ref.setHours(12);
  const diff=Math.floor((d-ref)/864e5); const cycle=((diff%14)+14)%14;
  return {type:cycle<=5?'papa':'maman'};
}
function isVac(date) { for(const v of VACANCES){const s=new Date(v.start),e=new Date(v.end);e.setHours(23,59,59);if(date>=s&&date<=e)return true;}return false; }
function isTrans(date) { const d=new Date(date);d.setHours(12);const ref=new Date(REF_PAPA);ref.setHours(12);const diff=Math.floor((d-ref)/864e5);const cycle=((diff%14)+14)%14;return cycle===0||cycle===5; }

async function renderElisa() {
  set('app-page', '<div class="loading"><div class="spin"></div> Chargement...</div>');
  const { data } = await db.from('elisa_tasks').select('*').order('date');

  renderElisaHTML();
}

function renderElisaHTML() {
  const p = getPeriod(today()), isPapa = p.type === 'papa';
  let nT = new Date(today());
  for (let i=1;i<=14;i++) { const d=new Date(today()); d.setDate(d.getDate()+i); if(isTrans(d)){nT=d;break;} }
  const nV = VACANCES.find(v => new Date(v.start) > today());
  set('app-page', `
    <div class="pg-header">
      <div><div class="pg-title">Elisa</div><div class="pg-sub">Garde alternée · École Saint François d'Assise · Boulogne-Billancourt</div></div>
      <button class="btn btn-primary" onclick="openAddElisaTask()">+ Tâche</button>
    </div>
    ${mkStats([
      {l:'Cette semaine',v:isPapa?'Papa ♥':'Maman',c:isPapa?'var(--green)':'var(--pink)'},
      {l:'Prochaine transition',v:nT.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short',year:'numeric'})},
      {l:'Prochaines vacances',v:nV?nV.label:'—'},
      {l:'Tâches',v:elisaTasks.filter(t=>!t.done).length},
    ])}
    <div class="tabs">
      ${['agenda','semaine','taches','infos'].map(v=>`<button class="tab${elisaView===v?' active':''}" onclick="setElisaView('${v}')">${{agenda:'Agenda',semaine:'Cette semaine',taches:'Tâches',infos:'Infos école'}[v]}</button>`).join('')}
    </div>
    <div id="elisa-view"></div>
  `);
  renderElisaView();
}

function setElisaView(v) { elisaView = v; renderElisaView(); }
function renderElisaView() {
  if (elisaView==='agenda') renderElisaAgenda();
  else if (elisaView==='semaine') renderElisaSemaine();
  else if (elisaView==='taches') renderElisaTaches();
  else renderElisaInfos();
}

function renderElisaAgenda() {
  const first=new Date(elCalYear,elCalMonth,1), last=new Date(elCalYear,elCalMonth+1,0);
  const startDow=(first.getDay()+6)%7;
  const ml=first.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
  const ts=todayStr();
  let html=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
    <button class="btn btn-sm" onclick="elCalMonth--;if(elCalMonth<0){elCalMonth=11;elCalYear--;}renderElisaAgenda()">←</button>
    <span style="font-size:15px;font-weight:600;flex:1;text-align:center">${ml.charAt(0).toUpperCase()+ml.slice(1)}</span>
    <button class="btn btn-sm" onclick="elCalMonth++;if(elCalMonth>11){elCalMonth=0;elCalYear++;}renderElisaAgenda()">→</button>
  </div>
  <div style="display:flex;gap:10px;margin-bottom:8px;font-size:12px;flex-wrap:wrap">
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#ecfdf5;border:1px solid #6ee7b7;display:inline-block"></span>Papa</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#fdf2f8;border:1px solid #fbcfe8;display:inline-block"></span>Maman</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#bbf7d0;display:inline-block"></span>Vac. papa</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#fbcfe8;display:inline-block"></span>Vac. maman</span>
  </div>
  <div class="cal-grid">
    ${['Lu','Ma','Me','Je','Ve','Sa','Di'].map(d=>`<div class="cal-hd">${d}</div>`).join('')}
    ${Array(startDow).fill('<div class="cal-day we"></div>').join('')}`;
  for (let d=1;d<=last.getDate();d++) {
    const date=new Date(elCalYear,elCalMonth,d);
    const p=getPeriod(date); const vac=isVac(date); const trans=isTrans(date);
    const dow=date.getDay();
    const ds=`${elCalYear}-${String(elCalMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=ds===ts;
    let bg, border;
    if(vac){bg=p.type==='papa'?'#bbf7d0':'#fbcfe8';border=p.type==='papa'?'#6ee7b7':'#fbcfe8';}
    else{bg=p.type==='papa'?'#ecfdf5':'#fdf2f8';border=p.type==='papa'?'#6ee7b7':'#fbcfe8';}
    let pills='';
    if(!vac&&p.type==='papa'&&dow!==0&&dow!==6&&dow!==3)pills+=`<div style="background:#bfdbfe;color:#1e40af;font-size:9px;border-radius:3px;padding:1px 3px;margin-bottom:1px">Dépôt</div>`;
    if(dow===3&&p.type==='papa'&&!vac)pills+=`<div style="background:#ddd6fe;color:#5b21b6;font-size:9px;border-radius:3px;padding:1px 3px;margin-bottom:1px">Danse</div>`;
    if(trans)pills+=`<div style="background:#fde68a;color:#78350f;font-size:9px;border-radius:3px;padding:1px 3px;margin-bottom:1px">${dow===3?'→Papa':'→Maman'}</div>`;
    html+=`<div style="min-height:70px;padding:3px 4px;background:${bg};border:1px solid ${border};${isToday?'outline:2px solid #2563eb;outline-offset:-2px':''}">
      <div style="font-size:11px;font-weight:600;color:${isToday?'#2563eb':'#374151'};margin-bottom:2px">${d}</div>${pills}
    </div>`;
  }
  set('elisa-view', html+'</div>');
}

function renderElisaSemaine() {
  const now=today(); const dow=(now.getDay()+6)%7;
  const mon=new Date(now); mon.setDate(mon.getDate()-dow);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(d.getDate()+i);return d;});
  const dn=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
  let html='';
  days.forEach((date,i)=>{
    const p=getPeriod(date); const vac=isVac(date); const dow2=date.getDay();
    const isPapa=p.type==='papa'; const trans=isTrans(date); const isToday=date.getTime()===now.getTime();
    const evts=[];
    if(!vac&&isPapa&&dow2!==0&&dow2!==6&&dow2!==3)evts.push({t:'Dépôt école',s:'8h15–8h20 · Florian',c:'#bfdbfe',tc:'#1e40af'});
    if(!vac&&isPapa&&(dow2===4||dow2===5))evts.push({t:'Récupération',s:'16h30 ou 17h45',c:'#bbf7d0',tc:'#065f46'});
    if(dow2===3&&isPapa&&!vac)evts.push({t:'Danse',s:'15h30–16h30',c:'#ddd6fe',tc:'#5b21b6'});
    if(trans)evts.push({t:dow2===3?'Début semaine papa':'→ Maman',s:dow2===3?'Mercredi après-midi':'Dépôt école puis Magali',c:'#fde68a',tc:'#78350f'});
    html+=`<div style="background:${isPapa?'#ecfdf5':'#fdf2f8'};border:1px solid ${isPapa?'#6ee7b7':'#fbcfe8'};border-radius:8px;padding:10px 12px;margin-bottom:6px;${isToday?'outline:2px solid #2563eb;outline-offset:-2px':''}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
        <span style="font-weight:700;font-size:13px;color:${isPapa?'#065f46':'#9d174d'}">${dn[i]} ${date.getDate()} ${date.toLocaleDateString('fr-FR',{month:'short',year:'numeric'})}</span>
        <span class="badge ${isPapa?'b-green':'b-pink'}">${isPapa?'Papa':'Maman'}</span>
      </div>
      ${evts.map(e=>`<div style="background:${e.c};border-radius:4px;padding:3px 7px;margin-bottom:3px"><div style="font-size:12px;font-weight:600;color:${e.tc}">${e.t}</div><div style="font-size:11px;color:${e.tc};opacity:.8">${e.s}</div></div>`).join('')||'<div style="font-size:12px;color:#9ca3af">Jour libre</div>'}
    </div>`;
  });
  set('elisa-view', html);
}

      ${mkTable(['Nom','Email','Rôle prévu'],[
        `<tr><td>Florian de Mazière</td><td><a href="mailto:florian@ferdinandparis.com" style="color:var(--blue)">florian@ferdinandparis.com</a></td><td><span class="badge b-green">Assistant</span></td></tr>`,
        `<tr><td>Magali Brunel</td><td><a href="mailto:magali.anne.brunel@gmail.com" style="color:var(--blue)">magali.anne.brunel@gmail.com</a></td><td><span class="badge b-pink">Co-parent</span></td></tr>`,
      ])}
    </div>
  `);
}

function openEditUser(id, role) {
  const ROLES = { admin: 'Administrateur', assistant: 'Assistant', coparent: 'Co-parent', viewer: 'Lecteur' };
  openModal('Modifier le rôle', `
    <div class="fg"><label class="fl">Rôle</label><select class="fi" id="ur-role">
      ${Object.entries(ROLES).map(([r,l]) => `<option value="${r}" ${r===role?'selected':''}>${l}</option>`).join('')}
    </select></div>`,
    async () => {
      const newRole = $('ur-role').value;
      await db.from('user_profiles').update({ role: newRole }).eq('id', id);
      closeModal(); renderAdmin();
    }
  );
}
