<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pénélope</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f9fafb;
  --bg2:#ffffff;
  --bg3:#f3f4f6;
  --bg4:#e5e7eb;
  --text:#111827;
  --text2:#6b7280;
  --text3:#9ca3af;
  --border:#e5e7eb;
  --border2:#d1d5db;
  --blue:#2563eb;--blue-bg:#eff6ff;
  --green:#059669;--green-bg:#ecfdf5;
  --amber:#d97706;--amber-bg:#fffbeb;
  --red:#dc2626;--red-bg:#fef2f2;
  --purple:#7c3aed;--purple-bg:#f5f3ff;
  --pink:#db2777;--pink-bg:#fdf2f8;
  --r:8px;
  --shadow:0 1px 2px 0 rgb(0 0 0 / .05);
  --shadow-md:0 4px 6px -1px rgb(0 0 0 / .07), 0 2px 4px -2px rgb(0 0 0 / .07);
}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:248px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.main{flex:1;overflow-y:auto;background:var(--bg);}
.page-content-area{padding:28px 32px;max-width:1100px;}

/* ── SIDEBAR ── */
.sidebar-logo{padding:14px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sidebar-logo-mark{width:26px;height:26px;background:#111827;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sidebar-logo-mark span{color:#fff;font-size:11px;font-weight:700;letter-spacing:-.3px;}
.sidebar-logo h1{font-size:14px;font-weight:600;color:#111827;letter-spacing:-.2px;}
.sidebar-logo p{font-size:11px;color:var(--text3);}
.nav-section{padding:14px 12px 4px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;}
.nav-item{display:flex;align-items:center;gap:8px;padding:6px 10px;margin:1px 4px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:400;color:var(--text2);transition:all .1s;border:1px solid transparent;}
.nav-item svg{flex-shrink:0;opacity:.7;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item:hover svg{opacity:1;}
.nav-item.active{background:var(--bg3);color:var(--text);font-weight:500;border-color:var(--border);}
.nav-item.active svg{opacity:1;}
.nav-sub{padding-left:20px;font-size:12px;}
.sidebar-user{padding:10px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:9px;margin:auto 4px 4px;}
.user-avatar{width:26px;height:26px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--text);flex-shrink:0;}

/* ── PAGE HEADER ── */
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:10px;}
.page-title{font-size:18px;font-weight:600;letter-spacing:-.4px;color:var(--text);}
.page-sub{font-size:12.5px;color:var(--text2);margin-top:2px;}

/* ── STATS ROW ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:0;margin-bottom:20px;background:var(--border);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.stat{background:#fff;padding:16px 20px;}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:500;}
.stat-val{font-size:22px;font-weight:600;letter-spacing:-.8px;line-height:1.1;}

/* ── CARD ── */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;margin-bottom:12px;}
.card-title{font-size:13px;font-weight:600;margin-bottom:12px;}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11.5px;font-weight:500;padding:2px 8px;border-radius:4px;white-space:nowrap;}
.b-direct{background:#ecfdf5;color:#065f46;}
.b-airbnb{background:#fef2f2;color:#991b1b;}
.b-roadstr{background:#f5f3ff;color:#5b21b6;}
.b-gdc{background:#eff6ff;color:#1e40af;}
.b-mrm{background:#f9fafb;color:#374151;border:1px solid var(--border);}
.b-green{background:#ecfdf5;color:#065f46;}
.b-amber{background:#fffbeb;color:#92400e;}
.b-red{background:#fef2f2;color:#991b1b;}
.b-blue{background:#eff6ff;color:#1e40af;}
.b-purple{background:#f5f3ff;color:#5b21b6;}
.b-gray{background:#f9fafb;color:#374151;border:1px solid var(--border);}
.b-pink{background:#fdf2f8;color:#9d174d;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;border:1px solid var(--border2);background:#fff;color:var(--text);font-size:12.5px;font-weight:500;cursor:pointer;transition:background .1s;white-space:nowrap;font-family:inherit;line-height:1.4;}
.btn:hover{background:var(--bg3);}
.btn-primary{background:#111827;color:#fff;border-color:#111827;}
.btn-primary:hover{background:#1f2937;}
.btn-sm{padding:4px 10px;font-size:12px;}
.btn-danger{color:var(--red);border-color:var(--border2);}
.btn-danger:hover{background:var(--red-bg);border-color:#fca5a5;}

/* ── FILTERS ── */
.filter-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.fpill{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:#fff;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .1s;}
.fpill:hover{background:var(--bg3);color:var(--text);}
.fpill.active{background:#111827;color:#fff;border-color:#111827;}
.search-wrap{position:relative;flex:1;min-width:180px;}
.search-box{width:100%;padding:7px 10px 7px 30px;border:1px solid var(--border2);border-radius:6px;font-size:12.5px;background:#fff;color:var(--text);font-family:inherit;}
.search-box:focus{outline:none;border-color:#111827;box-shadow:0 0 0 3px rgb(17 24 39 / .06);}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--r);background:#fff;}
.table{width:100%;border-collapse:collapse;min-width:500px;}
.table th{text-align:left;font-size:11px;font-weight:600;color:var(--text2);padding:10px 14px;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--bg3);letter-spacing:.04em;text-transform:uppercase;}
.table td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:12.5px;vertical-align:middle;}
.table tr:last-child td{border-bottom:none;}
.table tr:hover td{background:var(--bg3);}
.table tr[onclick]{cursor:pointer;}

/* ── FORM ── */
.form-group{margin-bottom:12px;}
.form-label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500;}
.form-input{width:100%;padding:8px 11px;border:1px solid var(--border2);border-radius:6px;font-size:13px;background:#fff;color:var(--text);font-family:inherit;}
.form-input:focus{outline:none;border-color:#111827;box-shadow:0 0 0 3px rgb(17 24 39 / .06);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgb(0 0 0 / .4);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(2px);}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:10px;padding:24px;width:90%;max-width:500px;max-height:92vh;overflow-y:auto;border:1px solid var(--border);box-shadow:0 20px 60px rgb(0 0 0 / .15);}
.modal-title{font-size:15px;font-weight:600;margin-bottom:16px;letter-spacing:-.2px;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);}

/* ── TABS ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px;}
.tab{padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);border:none;background:transparent;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--text);border-bottom-color:#111827;}

/* ── EXPANDABLE CARD ── */
.inv-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;overflow:hidden;}
.inv-head{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;cursor:pointer;}
.inv-head:hover{background:var(--bg3);}
.inv-body{border-top:1px solid var(--border);}
.inv-tabs{display:flex;border-bottom:1px solid var(--border);}
.itab{flex:1;padding:8px 4px;text-align:center;font-size:12px;font-weight:500;cursor:pointer;color:var(--text2);border:none;background:transparent;font-family:inherit;border-bottom:2px solid transparent;}
.itab.active{color:var(--text);border-bottom-color:#111827;}
.inv-panel{padding:14px 16px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.info-lbl{font-size:11px;color:var(--text3);margin-bottom:2px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;}
.info-val{font-size:13px;font-weight:500;}

/* ── ALERTS ── */
.alert{padding:10px 14px;border-radius:6px;font-size:12.5px;margin-bottom:10px;display:flex;align-items:flex-start;gap:8px;border:1px solid transparent;}
.alert-warn{background:#fffbeb;color:#78350f;border-color:#fde68a;}
.alert-red{background:#fef2f2;color:#7f1d1d;border-color:#fca5a5;}
.alert-green{background:#ecfdf5;color:#064e3b;border-color:#6ee7b7;}
.alert-blue{background:#eff6ff;color:#1e3a8a;border-color:#93c5fd;}

/* ── CALENDAR ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.cal-head{text-align:center;font-size:11px;font-weight:600;color:var(--text2);padding:6px 0;background:var(--bg3);}
.cal-cell{min-height:80px;padding:4px 5px;background:#fff;}
.cal-cell.today{background:#fffbeb;}
.cal-cell.we{background:var(--bg3);}
.cal-num{font-size:11px;font-weight:600;margin-bottom:3px;color:var(--text2);}
.cal-cell.today .cal-num{color:var(--blue);font-weight:700;}
.cal-ev{font-size:9.5px;border-radius:3px;padding:2px 4px;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;font-weight:500;}

/* ── PAGINATION ── */
.pagination{display:flex;gap:4px;flex-wrap:wrap;margin-top:14px;align-items:center;}
.ppage{padding:5px 10px;border-radius:5px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);font-family:inherit;}
.ppage.active{background:#111827;color:#fff;border-color:#111827;}
.ppage:hover:not(.active){background:var(--bg3);}

/* ── MISC ── */
.pay-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);}
.pay-row:last-child{border-bottom:none;}
.doc-pill{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;margin:2px;font-family:inherit;}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:8px;font-size:12.5px;}
.bar-label{width:100px;color:var(--text2);flex-shrink:0;font-size:12px;}
.bar-bg{flex:1;background:var(--bg3);border-radius:3px;height:6px;}
.bar-fill{height:6px;border-radius:3px;}

/* ── LOADING ── */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text2);font-size:13px;}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:#111827;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── LOGIN ── */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);}
.login-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:36px;text-align:center;width:360px;box-shadow:var(--shadow-md);}
.login-logo{font-size:26px;font-weight:700;letter-spacing:-.8px;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:28px;}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:10px;border-radius:6px;border:1px solid var(--border2);background:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;}
.btn-google:hover{background:var(--bg3);}

/* ── ROLES ── */
.role-badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px;}
.role-admin{background:#fef2f2;color:#991b1b;}
.role-assistant{background:#ecfdf5;color:#065f46;}
.role-coparent{background:#fdf2f8;color:#9d174d;}
.role-viewer{background:#f9fafb;color:#374151;border:1px solid var(--border);}

/* ── ELISA CALENDAR ── */
.elisa-papa{background:#ecfdf5;}
.elisa-maman{background:#fdf2f8;}
.elisa-vac-papa{background:#bbf7d0;}
.elisa-vac-maman{background:#fbcfe8;}
.elisa-empty{background:transparent;border:none;}

/* ── MOBILE ── */
@media(max-width:768px){
  .sidebar{position:fixed;left:-248px;top:0;bottom:0;z-index:100;transition:left .2s;}
  .sidebar.open{left:0;}
  .page-content-area{padding:14px;}
  .form-row{grid-template-columns:1fr;}
  .stats-row{grid-template-columns:1fr 1fr;}
}
.mobile-bar{display:none;align-items:center;gap:12px;padding:10px 16px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
@media(max-width:768px){.mobile-bar{display:flex;}}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="login-screen" style="display:none;">
  <div class="login-card">
    <div class="login-logo">Pénélope</div>

    <button class="btn-google" onclick="loginGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>

    </button>
    <div id="login-error" style="color:var(--red);font-size:12px;margin-top:12px;display:none;"></div>

<!-- APP -->
<div id="app-shell" style="display:none;">
<div class="mobile-bar">
  <button onclick="document.getElementById('sidebar').classList.toggle('open')" style="background:none;border:none;cursor:pointer;font-size:20px;">☰</button>
  <span style="font-size:15px;font-weight:800;">Pénélope</span>
</div>
<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">

      <div class="sidebar-logo-mark"><span>P</span></div>

        <h1>Pénélope</h1>

      <div class="user-avatar" id="user-avatar">?</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);" id="user-name">—</div>
        <div style="font-size:11px;color:var(--text3);" id="user-role">—</div>
      </div>
      <button onclick="logout()" style="border:none;background:none;cursor:pointer;color:var(--text3);font-size:12px;">✕</button>

  <div class="main" id="main-content">
    <div class="loading" id="loading-screen"><div class="spinner"></div> Chargement...</div>

</div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
    <div class="modal-footer" id="modal-footer">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="modalSave()">Sauvegarder</button>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const SB_URL='https://ucoxqqrzdbutvtskpevh.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjb3hxcXJ6ZGJ1dHZ0c2twZXZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjE3NjYsImV4cCI6MjA5MDc5Nzc2Nn0.GYFRNB1nXxUucUEp-1_xanfZOBWho6JjBkbtmFMFhJY';
const {createClient}=supabase;
const db=createClient(SB_URL,SB_KEY);

// ─── COULEURS SOURCES — UNIVERSELLES ─────────────────────
const SRC_BADGE={
  'Direct':'b-direct','AirBNB':'b-airbnb','Roadstr':'b-roadstr',
  'Gens de Confiance':'b-gdc','MRM':'b-mrm','Interne':'b-mrm',
};
const SRC_COLOR={
  'Direct':'#1D9E75','AirBNB':'#E24B4A','Roadstr':'#7F77DD',
  'Gens de Confiance':'#378ADD','MRM':'#888780','Interne':'#888780',
};
function srcBadge(s){return SRC_BADGE[s]||'b-gray';}
function srcColor(s){return SRC_COLOR[s]||'#888780';}

// Couleurs voitures planning
const VOI_COLORS={
  '911 Carrera S':'#185FA5','911 Targa 4 GTS':'#534AB7',
  'Boxster':'#1D9E75','Boxster S':'#1D9E75','Cayman GTS':'#993556',
  'Cayenne Hybrid':'#BA7517','Cayenne Turbo':'#BA7517',
  'Ferrari Portofino':'#E24B4A','FERRARI':'#E24B4A',
  'Macan GTS':'#639922','Macan S':'#639922',
  'Mercedes':'#888780','Range Rover':'#5F5E5A',
  'Taycan':'#185FA5','Lamborghini':'#EF9F27',
};
function voiColor(nom){for(const k of Object.keys(VOI_COLORS)){if(nom&&nom.includes(k))return VOI_COLORS[k];}return '#888780';}

// Statut calculé dynamiquement depuis les dates — jamais statique
function computeStatut(b){
  if(b.statut==='Accident')return{label:'Accident',cls:'b-red'};
  if(b.statut==='Annulé'||b.statut==='annule')return{label:'Annulé',cls:'b-gray'};
  const now=today();
  const debut=b.debut?new Date(b.debut):null;
  const fin=b.fin?new Date(b.fin):null;
  if(debut&&debut>now)return{label:'À venir',cls:'b-green'};
  if(debut&&debut<=now&&fin&&fin>=now)return{label:'En cours',cls:'b-blue'};
  if(fin&&fin<now)return{label:'Terminé',cls:'b-gray'};
  return{label:b.statut||'—',cls:'b-gray'};
}

// Même logique pour AirBnB
function computeStatutAB(b){
  if(b.annule)return{label:'Annulé',cls:'b-gray'};
  const now=today();
  const arrive=b.arrive?new Date(b.arrive):null;
  const depart=b.depart?new Date(b.depart):null;
  if(arrive&&arrive>now)return{label:'À venir',cls:'b-green'};
  if(arrive&&arrive<=now&&depart&&depart>=now)return{label:'En cours',cls:'b-blue'};
  if(depart&&depart<now)return{label:'Terminé',cls:'b-gray'};
  return{label:'—',cls:'b-gray'};
}

// ─── AUTH & USERS ─────────────────────────────────────────
let currentUser=null;
let currentRole='viewer';
async function getOrCreateProfile(user){
  try{
    const{data}=await db.from('user_profiles').select('*').eq('id',user.id);
    if(data&&data.length>0)return data[0];

// Pagination
function makePagination(total,perPage,current,onClickFn){
  const pages=Math.ceil(total/perPage);
  if(pages<=1)return'';
  const maxShow=7;
  let btns=`<button class="ppage" onclick="${onClickFn}(Math.max(1,${current}-1))" ${current===1?'disabled':''}>←</button>`;
  for(let i=1;i<=Math.min(pages,maxShow);i++){btns+=`<button class="ppage${i===current?' active':''}" onclick="${onClickFn}(${i})">${i}</button>`;}
  if(pages>maxShow)btns+=`<span style="color:var(--text3);font-size:12px">…${pages}</span>`;
  btns+=`<button class="ppage" onclick="${onClickFn}(Math.min(${pages},${current}+1))" ${current===pages?'disabled':''}>→</button>`;
  return`<div class="pagination">${btns}</div>`;
}

// Calendrier universel
function makeCalendar(year,month,bookings,colorFn,onClickFn){
  const first=new Date(year,month,1),last=new Date(year,month+1,0);
  const startDow=(first.getDay()+6)%7;
  const todayStr=today().toISOString().split('T')[0];
  let html=`<div class="cal-grid">
    ${['Lu','Ma','Me','Je','Ve','Sa','Di'].map(d=>`<div class="cal-head">${d}</div>`).join('')}
    ${Array(startDow).fill('<div class="cal-cell elisa-empty"></div>').join('')}`;
  for(let d=1;d<=last.getDate();d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dt=new Date(year,month,d);
    const isToday=ds===todayStr;const isWE=dt.getDay()===0||dt.getDay()===6;
    // Comparer les dates en string pour éviter les problèmes de timezone
      const dtStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayBk=bookings.filter(b=>{
        if(!b.debut)return false;
        const deb=b.debut.substring(0,10);
        const fin=(b.fin||b.debut).substring(0,10);
        return deb<=dtStr&&fin>=dtStr;
      });
    html+=`<div class="cal-cell${isToday?' today':isWE?' we':''}">
      <div class="cal-num" style="color:${isToday?'var(--blue)':isWE?'var(--text2)':'var(--text)'}">${d}</div>
      ${dayBk.map(b=>{
        const col=colorFn(b);
        return`<div class="cal-ev" onclick="${onClickFn}('${b.id}')" style="background:${col}22;color:${col};border-left:2px solid ${col}" title="${b.client||''} — ${b.voiture||b.bien||''}">${(b.voiture||b.client||b.bien||'').substring(0,12)}</div>`;
      }).join('')}
    </div>`;
  }
  return html+'</div>';
}

// F — INVENTAIRE
let fleetCA={};  // CA par voiture
let fleetDynamicStatus={}; // Statut dynamique calculé depuis les bookings

async function renderFInventaire(){
  set('page-content','<div class="loading"><div class="spinner"></div>Chargement...</div>');
  const[vRes,bkRes]=await Promise.all([
    db.from('vehicles').select('*').order('nom'),
    db.from('ferdinand_bookings').select('voiture,prix,debut,fin,statut').order('debut')
  ]);
  fleetData=vRes.data||[];
  const bookings=bkRes.data||[];
  const todayStr=today().toISOString().split('T')[0];
  const tomorrowStr=new Date(today().getTime()+864e5).toISOString().split('T')[0];

  // Calculer CA et statut dynamique par voiture
  fleetCA={};
  fleetDynamicStatus={};

  bookings.forEach(b=>{
    if(!b.voiture)return;
    const nom=b.voiture.trim();
    // CA
    if(b.prix){
      if(!fleetCA[nom])fleetCA[nom]={total:0,count:0,paye:0};
      fleetCA[nom].total+=(b.prix||0);
      fleetCA[nom].count++;
      if(b.statut==='Fermé')fleetCA[nom].paye+=(b.prix||0);
    }
    // Statut dynamique
    if(!b.debut)return;
    const debut=b.debut;
    const fin=b.fin||debut;
    // En location aujourd'hui ?
    if(debut<=todayStr&&fin>=todayStr){
      fleetDynamicStatus[nom]={status:'court',label:'En location',booking:b};
    }
    // Départ demain → À préparer (priorité si pas déjà en location)
    else if(debut===tomorrowStr&&!fleetDynamicStatus[nom]){
      fleetDynamicStatus[nom]={status:'apreparer',label:'À préparer',booking:b};
    }
  });

  renderFInventaireHTML();
}

// Cherche le CA pour une voiture en essayant plusieurs variantes du nom
function getVehicleCA(nomVehicule){
  if(!nomVehicule)return null;
  // Essai direct
  if(fleetCA[nomVehicule])return fleetCA[nomVehicule];
  // Essai par correspondance partielle
  const keys=Object.keys(fleetCA);
  const nom=nomVehicule.toLowerCase().replace('porsche ','').replace('ferrari ','').replace('lamborghini ','');
  for(const k of keys){
    const kn=k.toLowerCase().replace('porsche ','').replace('ferrari ','').replace('lamborghini ','');
    if(kn.includes(nom)||nom.includes(kn))return fleetCA[k];
  }
  return null;
}

// Détermine si un booking est un abonnement
function isAbonnement(b){
  return b.type_booking==='abonnement'||(b.prix_mensuel&&b.prix_mensuel>0);
}

// Éclate un abonnement en mensualités virtuelles
function expandAbonnement(b){
  if(!isAbonnement(b)||!b.debut)return[b];
  const prixM=parseFloat(b.prix_mensuel)||parseFloat(b.prix)||0;
  // Dates de début et fin
  const startParts=b.debut.split('-');
  const startY=parseInt(startParts[0]),startM=parseInt(startParts[1])-1;
  let endY,endM;
  if(b.fin){
    const endParts=b.fin.split('-');
    endY=parseInt(endParts[0]);endM=parseInt(endParts[1])-1;
  } else {
    // Pas de fin : 24 mois dans le futur
    const futureDate=new Date();
    futureDate.setMonth(futureDate.getMonth()+24);
    endY=futureDate.getFullYear();endM=futureDate.getMonth();
  }
  const rows=[];let count=0;
  for(let y=startY,m=startM;(y<endY||(y===endY&&m<=endM))&&count<60;){
    count++;
    // Début de ce mois
    const dayStart=(y===startY&&m===startM)?parseInt(startParts[2]):1;
    const debutStr=`${y}-${String(m+1).padStart(2,'0')}-${String(dayStart).padStart(2,'0')}`;
    // Fin de ce mois
    const lastDay=new Date(y,m+1,0).getDate();
    const finStr=`${y}-${String(m+1).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
    const label=new Date(y,m,1).toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
    rows.push({...b,
      id:`${b.id}__${y}_${m+1}`,
      _originalId:b.id,
      debut:debutStr,fin:finStr,
      prix:prixM,prix_mensuel:prixM,
      _isMensualite:true,_label:label,
    });
    m++;if(m>11){m=0;y++;}
  }
  return rows.length?rows:[b];
}

function getBkFiltered(){
  // Éclater abonnements en mensualités
  let list=[];
  bkData.forEach(b=>{
    list.push(...expandAbonnement(b));
  });
  // Appliquer filtres
  if(bkFilter==='upcoming'){
    // Montrer les bookings actifs aujourd'hui OU à venir (fin >= aujourd'hui)
    const todayStr=today().toISOString().split('T')[0];
    list=list.filter(b=>{
      if(!b.debut)return false;
      const fin=(b.fin||b.debut).substring(0,10);
      return fin>=todayStr;
    });
  } else if(bkFilter!=='tous'){
    list=list.filter(b=>b.debut&&b.debut.startsWith(bkFilter));
  }
  if(bkSearch){
    const q=bkSearch.toLowerCase();
    list=list.filter(b=>(b.client||'').toLowerCase().includes(q)||(b.voiture||'').toLowerCase().includes(q));
  }
  if(bkVehicleFilter)list=list.filter(b=>(b.voiture||'').toLowerCase().includes(bkVehicleFilter.toLowerCase()));
  return list.sort((a,b_)=>new Date(b_.debut)-new Date(a.debut));
}

function toggleAboFields(type){
  document.getElementById('bkf-ponctuel-row').style.display=type==='abonnement'?'none':'grid';

function getBkFormData(){
  const type=(document.getElementById('bkf-type')?.value)||'ponctuel';
  const isAbo=type==='abonnement';
  const prixMensuel=parseFloat(document.getElementById('bkf-mensuel')?.value)||0;
  const debut=document.getElementById('bkf-d')?.value||null;
  const fin=document.getElementById('bkf-f')?.value||null;
  let prix=0;
  if(isAbo){
    // Pour abonnement : prix total = mensuel × nb mois calculé depuis les dates
    let nbMois=parseInt(document.getElementById('bkf-nbmois')?.value)||0;
    if(debut&&fin&&!nbMois)nbMois=Math.max(1,Math.round((new Date(fin)-new Date(debut))/(1000*60*60*24*30)));
    if(!nbMois)nbMois=1;
    prix=prixMensuel*nbMois;
  } else {
    prix=parseFloat(document.getElementById('bkf-p')?.value)||0;
  }
  return{
    voiture:document.getElementById('bkf-v')?.value||'',
    client:document.getElementById('bkf-c')?.value||'',
    email:document.getElementById('bkf-e')?.value||'',
    tel:document.getElementById('bkf-t')?.value||'',
    debut,fin,prix,
    type_booking:type,
    prix_mensuel:isAbo?prixMensuel:0,
    source:document.getElementById('bkf-s')?.value||'Direct',
    statut:document.getElementById('bkf-st')?.value||'En cours',
    statut_paiement:document.getElementById('bkf-pay')?.value||'Non renseigné',
    montant_recu:parseFloat(document.getElementById('bkf-received')?.value)||0,
    pick_up:document.getElementById('bkf-pk')?.value||'',
    lien_contrat:document.getElementById('bkf-ctr')?.value||null,
    commentaire:document.getElementById('bkf-cm')?.value||''
  };
}

function openEditBooking(id){
  // Pour les mensualités virtuelles, retrouver l'abonnement original
  const realId=id.includes('_')?id.split('_')[0]:id;
  const b=bkData.find(x=>x.id===realId||x.id===id);if(!b)return;
  openModal(`Modifier — ${b.client}`,bookingFormHTML(b),async()=>{
    const u=getBkFormData();
    let{error}=await db.from('ferdinand_bookings').update(u).eq('id',id);
    if(error){
      // Fallback sans les nouvelles colonnes
      const{type_booking,prix_mensuel,...uSafe}=u;
      const res=await db.from('ferdinand_bookings').update(uSafe).eq('id',id);
      if(res.error){alert('Erreur : '+res.error.message);return;}
    }
    Object.assign(b,u);closeModal();refreshBkList();
  },`<button class="btn btn-danger" style="margin-right:auto" onclick="deleteBooking('${id}')">Supprimer</button>`);
}

// F — FINANCE STRIPE
async function renderFFinance(){
  set('page-content',`<div class="page-header">
    <div><div class="page-title">Ferdinand — Finance & Paiements</div>
    <div class="page-sub">Rapprochement Stripe ↔ Locations</div></div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-sm" onclick="renderFFinance()">↺ Actualiser</button>
    </div>
  </div>
  <div id="stripe-stats"><div class="loading"><div class="spinner"></div>Chargement Stripe...</div></div>
  <div id="stripe-content"></div>`);
  try{
    const [stripeRes,bkRes]=await Promise.all([
      fetch('/api/stripe?limit=100'),
      db.from('ferdinand_bookings').select('*').order('debut',{ascending:false})
    ]);
    if(!stripeRes.ok){const e=await stripeRes.json();throw new Error(e.error||'Erreur '+stripeRes.status);}
    const stripeData=await stripeRes.json();
    stripeCharges=stripeData.data||[];
    stripeBookings=bkRes.data||[];
    renderStripeData(stripeCharges,stripeBookings);
  }catch(e){
    set('stripe-stats',`<div class="alert alert-red">Erreur : ${e.message}. Vérifiez que STRIPE_RESTRICTED_KEY est configurée dans Vercel et que api/stripe.js est déployé.</div>`);
    set('stripe-content','');
  }
}

function renderStripeData(allCharges,bookings){
  // Séparer paiements réels (captured) et cautions (autorisations non capturées)
  const charges=allCharges.filter(c=>c.captured!==false&&(c.amount_captured||0)>0);
  const cautions=allCharges.filter(c=>c.captured===false||(c.amount_captured||0)===0);
  const total=charges.reduce((s,c)=>s+(c.amount_captured||c.amount||0),0);
  const reussis=charges.filter(c=>c.status==='succeeded').length;
  const deja=bookings.filter(b=>b.stripe_payment_id).length;
  
  set('stripe-stats',statsRow([
    {l:'Paiements encaissés',v:charges.length,c:'var(--green)'},
    {l:'Total encaissé',v:fmt(total/100)+'€',c:'var(--green)'},
    {l:'Cautions (non encaissées)',v:cautions.length,c:'var(--amber)'},
    {l:'Locations liées',v:deja,c:'var(--blue)'},
    {l:'Non pointées',v:charges.length-deja},
  ]));

  // Rapprochement
  const reconciled=reconcileStripe(charges,bookings);
  const autoMatched=reconciled.filter(r=>r.auto);
  const suggested=reconciled.filter(r=>r.suggest&&!r.auto);
  const unmatched=reconciled.filter(r=>!r.auto&&!r.suggest);

  let html='';

  // Auto-matchés
  if(autoMatched.length){
    html+=`<div class="card">
      <div class="card-title" style="color:var(--green)">✓ Rapprochements automatiques (${autoMatched.length}) 
        <button class="btn btn-sm btn-primary" onclick="confirmAllAuto()">Confirmer tous</button>
      </div>
      ${makeTable(['Client Stripe','Montant','Date','↔ Booking','Voiture','Confiance','Action'],
        autoMatched.map(r=>{
          const c=r.charge;const b=r.match;
          const name=c.billing_details?.name||c.description||'—';
          const d=new Date(c.created*1000).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});
          const montant=fmt((c.amount_captured||c.amount||0)/100)+'€';
          const conf=r.score>=5?'Élevée':r.score>=3?'Moyenne':'Faible';
          const confCls=r.score>=5?'b-green':r.score>=3?'b-amber':'b-gray';
          return`<tr>
            <td><strong>${name}</strong></td>
            <td style="color:var(--green);font-weight:600">${montant}</td>
            <td style="white-space:nowrap">${d}</td>
            <td>${b.client}</td>
            <td style="font-size:12px;color:var(--text2)">${b.voiture||'—'}</td>
            <td><span class="badge ${confCls}">${conf}</span></td>
            <td><button class="btn btn-sm" style="background:var(--green);color:#fff;border-color:var(--green)" onclick="confirmLink('${c.id}','${b.id}',${(c.amount_captured||c.amount||0)/100})">✓ Lier</button>
            <button class="btn btn-sm" onclick="openManualLink('${c.id}')">Choisir</button></td>
          </tr>`;
        })
      )}
    </div>`;
  }

  // Suggestions
  if(suggested.length){
    html+=`<div class="card">
      <div class="card-title" style="color:var(--amber)">? Suggestions à vérifier (${suggested.length})</div>
      ${makeTable(['Client Stripe','Montant','Date','↔ Booking suggéré','Voiture','Action'],
        suggested.map(r=>{
          const c=r.charge;const b=r.match;
          const name=c.billing_details?.name||c.description||'—';
          const d=new Date(c.created*1000).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});
          const montant=fmt((c.amount_captured||c.amount||0)/100)+'€';
          return`<tr>
            <td><strong>${name}</strong></td>
            <td style="color:var(--green);font-weight:600">${montant}</td>
            <td style="white-space:nowrap">${d}</td>
            <td style="color:var(--text2)">${b?b.client:'Aucun'}</td>
            <td style="font-size:12px;color:var(--text2)">${b?b.voiture||'—':'—'}</td>
            <td>${b?`<button class="btn btn-sm" style="background:var(--green);color:#fff;border-color:var(--green)" onclick="confirmLink('${c.id}','${b.id}',${(c.amount_captured||c.amount||0)/100})">✓ Lier</button>`:''}
            <button class="btn btn-sm" onclick="openManualLink('${c.id}')">Choisir</button></td>
          </tr>`;
        })
      )}
    </div>`;
  }

  // Non matchées
  html+=`<div class="card">
    <div class="card-title">Transactions non pointées (${unmatched.length})</div>
    ${makeTable(['Client Stripe','Montant','Date','Statut','Action'],
      unmatched.map(r=>{
        const c=r.charge;
        const name=c.billing_details?.name||c.description||'—';
        const d=new Date(c.created*1000).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});
        const montant=fmt((c.amount_captured||c.amount||0)/100)+'€';
        const statut=c.refunded?'Remboursé':c.status==='succeeded'?'Réussi':c.status;
        const badgeCls=c.refunded?'b-amber':c.status==='succeeded'?'b-green':'b-red';
        return`<tr>
          <td>${name}</td>
          <td style="font-weight:600;color:var(--green)">${montant}</td>
          <td style="white-space:nowrap">${d}</td>
          <td><span class="badge ${badgeCls}">${statut}</span></td>
          <td><button class="btn btn-sm" onclick="openManualLink('${c.id}')">Lier manuellement</button></td>
        </tr>`;
      }),'Toutes les transactions sont pointées ✓')}
  </div>`;

  // Section cautions
  if(cautions.length){
    const cautionRows=cautions.map(function(c){
      const name=c.billing_details&&c.billing_details.name?c.billing_details.name:c.description||'—';
      const d=new Date(c.created*1000).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});
      const montant=fmt((c.amount||0)/100)+'€';
      return '<tr><td>'+name+'</td><td style="color:var(--amber);font-weight:600">'+montant+'</td><td>'+d+'</td><td><span class="badge b-amber">Autorisation</span></td></tr>';
    });

      +'<div class="alert alert-warn" style="margin-bottom:10px">Ces transactions sont des autorisations sur carte (caution). L’argent n’a pas été prélevé. Ne pas pointer contre une location.</div>'
      +makeTable(['Client','Montant autorisé','Date','Statut'],cautionRows,'Aucune caution')
      +'</div>';
  }

  set('stripe-content',html);
}

async function confirmLink(stripeId,bookingId,amount){
  await db.from('ferdinand_bookings').update({
    stripe_payment_id:stripeId,
    statut_paiement:'Payé intégral',
    montant_recu:amount
  }).eq('id',bookingId);
  // Refresh
  stripeBookings=stripeBookings.map(b=>b.id===bookingId?{...b,stripe_payment_id:stripeId,statut_paiement:'Payé intégral',montant_recu:amount}:b);
  renderStripeData(stripeCharges,stripeBookings);
}

async function confirmAllAuto(){
  const reconciled=reconcileStripe(stripeCharges,stripeBookings);
  const autoMatched=reconciled.filter(r=>r.auto);
  for(const r of autoMatched){
    await confirmLink(r.charge.id,r.match.id,(r.charge.amount_captured||r.charge.amount||0)/100);
  }
}

function openManualLink(stripeId){
  const c=stripeCharges.find(x=>x.id===stripeId);
  const name=c?.billing_details?.name||c?.description||'';
  const montant=fmt((c?.amount_captured||c?.amount||0)/100)+'€';
  const opts=stripeBookings.filter(b=>!b.stripe_payment_id).slice(0,50)
    .map(b=>`<option value="${b.id}">${b.client} — ${b.voiture||'?'} — ${fmtShort(b.debut)} — ${b.prix?fmt(b.prix)+'€':''}</option>`).join('');
  openModal(`Lier manuellement — ${name} (${montant})`,
    `<div class="form-group"><label class="form-label">Sélectionner le booking correspondant</label>
    <select class="form-input" id="manual-bk" size="8" style="height:200px">${opts}</select></div>`,
    async()=>{
      const bkId=document.getElementById('manual-bk').value;
      if(!bkId)return;
      await confirmLink(stripeId,bkId,(c.amount_captured||c.amount||0)/100);
      closeModal();
    }
  );
}

let elisaView='agenda';let elisaTasks=[];
let elisaCalYear=new Date().getFullYear();let elisaCalMonth=new Date().getMonth();
const VACANCES=[{label:'Printemps 2025',start:'2025-04-19',end:'2025-05-04'},{label:'Été 2025',start:'2025-07-05',end:'2025-08-31'},{label:'Toussaint 2025',start:'2025-10-18',end:'2025-11-02'},{label:'Noël 2025',start:'2025-12-20',end:'2026-01-04'},{label:'Hiver 2026',start:'2026-02-14',end:'2026-03-01'},{label:'Printemps 2026',start:'2026-04-11',end:'2026-04-26'}];
const REF_PAPA=new Date(2025,3,2);
function getPeriod(date){for(const v of VACANCES){const s=new Date(v.start),e=new Date(v.end);e.setHours(23,59,59);if(date>=s&&date<=e)return{type:'vac',label:v.label};}const d=new Date(date);d.setHours(12);const ref=new Date(REF_PAPA);ref.setHours(12);const diff=Math.floor((d-ref)/(1000*60*60*24));const cycle=((diff%14)+14)%14;return{type:cycle<=5?'papa':'maman'};}
function isVac(date){for(const v of VACANCES){const s=new Date(v.start),e=new Date(v.end);e.setHours(23,59,59);if(date>=s&&date<=e)return true;}return false;}
function isSchool(date){const dow=date.getDay();if(dow===0||dow===6||dow===3)return false;return!isVac(date);}
function isTrans(date){const d=new Date(date);d.setHours(12);const ref=new Date(REF_PAPA);ref.setHours(12);const diff=Math.floor((d-ref)/(1000*60*60*24));const cycle=((diff%14)+14)%14;return cycle===0||cycle===5;}

function renderElisaAgenda(){

  const todayStr=today().toISOString().split('T')[0];
  let html=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
    <button class="btn btn-sm" onclick="elisaCalMonth--;if(elisaCalMonth<0){elisaCalMonth=11;elisaCalYear--;}renderElisaAgenda()">←</button>

    <button class="btn btn-sm" onclick="elisaCalMonth++;if(elisaCalMonth>11){elisaCalMonth=0;elisaCalYear++;}renderElisaAgenda()">→</button>
  </div>
  <div style="display:flex;gap:10px;margin-bottom:8px;font-size:12px;flex-wrap:wrap">
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#E1F5EE;border:1px solid #9FE1CB;display:inline-block"></span>Papa</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#FBEAF0;border:1px solid #F4C0D1;display:inline-block"></span>Maman</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#C0DD97;display:inline-block"></span>Vac. papa</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#F0997B;display:inline-block"></span>Vac. maman</span>
  </div>
  <div class="cal-grid">
    ${['Lu','Ma','Me','Je','Ve','Sa','Di'].map(d=>`<div class="cal-head">${d}</div>`).join('')}
    ${Array(startDow).fill('<div style="min-height:70px;"></div>').join('')}`;
  for(let d=1;d<=last.getDate();d++){
    const date=new Date(elisaCalYear,elisaCalMonth,d);
    const p=getPeriod(date);const vac=isVac(date);const trans=isTrans(date);const school=isSchool(date);const dow=date.getDay();
    const ds=`${elisaCalYear}-${String(elisaCalMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=ds===todayStr;
    let cls='';
    if(vac)cls=p.type==='papa'?'elisa-vac-papa':'elisa-vac-maman';
    else cls=p.type==='papa'?'elisa-papa':'elisa-maman';
    let pills='';
    if(school&&p.type==='papa'&&dow!==3)pills+=`<div style="background:#B5D4F4;color:#0C447C;font-size:9px;border-radius:3px;padding:1px 3px;margin-bottom:1px">Dépôt 8h20</div>`;

    if(trans)pills+=`<div style="background:#FAC775;color:#633806;font-size:9px;border-radius:3px;padding:1px 3px;margin-bottom:1px">${dow===3?'→Papa':'→Maman'}</div>`;
    html+=`<div class="${cls} cal-cell" style="${isToday?'outline:2px solid var(--blue);outline-offset:-2px':''}">
      <div class="cal-num" style="color:${isToday?'var(--blue)':''}">${d}${isToday?' •':''}</div>${pills}
    </div>`;
  }
  html+=`</div>`;set('elisa-view',html);
}

function renderElisaSemaine(){
  const now=today();const dow=(now.getDay()+6)%7;const mon=new Date(now);mon.setDate(mon.getDate()-dow);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(d.getDate()+i);return d;});
  const dn=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];

    const p=getPeriod(date);const vac=isVac(date);const school=isSchool(date);const dow2=date.getDay();const isPapa=p.type==='papa';const trans=isTrans(date);const isToday=date.getTime()===now.getTime();
    const evts=[];
    if(school&&isPapa&&dow2!==3)evts.push({t:'Dépôt école',s:'8h15–8h20 · Florian',c:'#B5D4F4',tc:'#0C447C'});

        <span style="font-weight:700;font-size:13px;color:${isPapa?'#085041':'#72243E'}">${dn[i]} ${date.getDate()}</span>

function openEditUser(id,currentRole){
  openModal('Modifier le rôle',`
    <div class="form-group"><label class="form-label">Rôle</label>
      <select class="form-input" id="ur-role">
        ${Object.entries(ROLE_LABELS).map(([r,l])=>`<option value="${r}" ${r===currentRole?'selected':''}>${l}</option>`).join('')}
      </select>
    </div>`,
  async()=>{
    const role=document.getElementById('ur-role').value;
    await db.from('user_profiles').update({role}).eq('id',id);
    closeModal();renderAdminUsers();
  });
}

// ══════════════════════════════════════════════════════════
// INIT & AUTH
// ══════════════════════════════════════════════════════════
let launched=false;

function launchApp(user){
  if(launched)return;
  launched=true;

  // Determine role from email immediately — no async needed
  const email=user.email||'';
  const adminEmails=['olivier@ykone.com','olivier.billon@gmail.com'];
  currentRole=adminEmails.includes(email)?'admin':'viewer';
  const name=user.user_metadata?.full_name||user.user_metadata?.name||email;
  currentUser={email,nom:name,role:currentRole};

  // Show app immediately
  document.getElementById('login-screen').style.display='none';
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('app-shell').style.display='block';
  document.getElementById('page-content').style.display='block';

  // Update sidebar
  const initials=name.split(' ').filter(Boolean).map(n=>n[0]).join('').substring(0,2).toUpperCase()||'OB';
  document.getElementById('user-avatar').textContent=initials;
  document.getElementById('user-name').textContent=name;
  document.getElementById('user-role').textContent=ROLE_LABELS[currentRole]||currentRole;
  document.getElementById('sidebar-sub').textContent='Penelope';

  buildNav();
  showPage('dashboard');

  // Background tasks — non-blocking
  setTimeout(()=>{
    getOrCreateProfile(user).catch(e=>console.warn('Profile:',e));
    seedAll().catch(e=>console.warn('Seed:',e));
  },500);
}

async function init(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-shell').style.display='none';
  document.getElementById('loading-screen').style.display='flex';
  document.getElementById('page-content').style.display='none';

  db.auth.onAuthStateChange((event,session)=>{
    if(session?.user&&!launched){launchApp(session.user);}
    if(event==='SIGNED_OUT'){launched=false;location.reload();}
  });

  const{data:{session}}=await db.auth.getSession();
  if(session?.user){
    launchApp(session.user);
  } else {
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('login-screen').style.display='flex';
  }
}

init();
</script>
