<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferdinand Cockpit</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f8f7f4;--bg2:#fff;--bg3:#f1efe8;
  --text:#1a1a18;--text2:#6b6a65;--text3:#a09e98;
  --border:#e2e0d8;--border2:#c8c5bb;
  --blue:#185FA5;--blue-bg:#E6F1FB;
  --green:#0F6E56;--green-bg:#E1F5EE;
  --amber:#854F0B;--amber-bg:#FAEEDA;
  --red:#A32D2D;--red-bg:#FCEBEB;
  --purple:#534AB7;--purple-bg:#EEEDFE;
  --pink:#993556;--pink-bg:#FBEAF0;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}

/* Layout */
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.main{flex:1;overflow-y:auto;padding:24px;}

/* Sidebar */
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid var(--border);}
.sidebar-logo h1{font-size:15px;font-weight:600;color:var(--text);}
.sidebar-logo p{font-size:11px;color:var(--text3);margin-top:2px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;font-size:13px;color:var(--text2);border-left:2px solid transparent;transition:all .15s;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--blue-bg);color:var(--blue);border-left-color:var(--blue);font-weight:500;}
.nav-icon{width:16px;height:16px;flex-shrink:0;}
.nav-section{padding:12px 16px 4px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;}
.sidebar-footer{margin-top:auto;padding:12px 16px;border-top:1px solid var(--border);font-size:12px;color:var(--text3);}

/* Page header */
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.page-title{font-size:20px;font-weight:600;}
.page-sub{font-size:13px;color:var(--text2);margin-top:2px;}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;}
.card-title{font-size:13px;font-weight:500;margin-bottom:12px;}

/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:4px;}
.stat-val{font-size:20px;font-weight:600;}

/* Badges */
.badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.badge-green{background:var(--green-bg);color:var(--green);}
.badge-amber{background:var(--amber-bg);color:var(--amber);}
.badge-red{background:var(--red-bg);color:var(--red);}
.badge-blue{background:var(--blue-bg);color:var(--blue);}
.badge-purple{background:var(--purple-bg);color:var(--purple);}
.badge-gray{background:var(--bg3);color:var(--text2);}
.badge-pink{background:var(--pink-bg);color:var(--pink);}

/* Buttons */
.btn{padding:7px 14px;border-radius:7px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:13px;cursor:pointer;transition:all .15s;}
.btn:hover{background:var(--bg3);}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn-primary:hover{background:#0f4d87;}
.btn-sm{padding:4px 10px;font-size:12px;}
.btn-danger{border-color:var(--red);color:var(--red);}
.btn-danger:hover{background:var(--red-bg);}

/* Table */
.table{width:100%;border-collapse:collapse;}
.table th{text-align:left;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;padding:8px 12px;border-bottom:1px solid var(--border);}
.table td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
.table tr:last-child td{border-bottom:none;}
.table tr:hover td{background:var(--bg3);}

/* Forms */
.form-group{margin-bottom:12px;}
.form-label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500;}
.form-input{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:6px;font-size:13px;background:var(--bg2);color:var(--text);}
.form-input:focus{outline:none;border-color:var(--blue);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000;display:none;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border-radius:12px;padding:24px;width:90%;max-width:460px;max-height:90vh;overflow-y:auto;border:1px solid var(--border);}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);}

/* Tabs */
.tabs{display:flex;gap:4px;background:var(--bg3);border-radius:8px;padding:3px;margin-bottom:16px;width:fit-content;}
.tab{padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;color:var(--text2);border:none;background:transparent;}
.tab.active{background:var(--bg2);color:var(--text);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.1);}

/* Filter pills */
.filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.filter-pill{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;font-size:12px;color:var(--text2);cursor:pointer;}
.filter-pill.active{background:var(--blue-bg);color:var(--blue);border-color:var(--blue);}

/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-head{text-align:center;font-size:11px;color:var(--text2);padding:4px 0;font-weight:500;}
.cal-day{border-radius:5px;padding:4px;min-height:52px;border:1px solid transparent;}
.cal-day-papa{background:#E1F5EE;border-color:#9FE1CB;}
.cal-day-maman{background:#FBEAF0;border-color:#F4C0D1;}
.cal-day-vac-papa{background:#C0DD97;border-color:#97C459;}
.cal-day-vac-maman{background:#F0997B;border-color:#F5C4B3;}
.cal-day-empty{background:transparent;}
.cal-day-num{font-size:11px;font-weight:600;margin-bottom:2px;}
.cal-pill{display:block;font-size:9px;border-radius:3px;padding:1px 3px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}

/* Task item */
.task-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.task-item:last-child{border-bottom:none;}
.task-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}

/* Search */
.search-box{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--border2);border-radius:7px;font-size:13px;background:var(--bg2);color:var(--text);}
.search-wrap{position:relative;margin-bottom:16px;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);}

/* Alert */
.alert{padding:10px 14px;border-radius:7px;font-size:13px;margin-bottom:10px;}
.alert-warn{background:var(--amber-bg);color:var(--amber);border:1px solid #FAC775;}
.alert-red{background:var(--red-bg);color:var(--red);border:1px solid #F09595;}
.alert-green{background:var(--green-bg);color:var(--green);border:1px solid #9FE1CB;}

/* Bar chart */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:12px;}
.bar-label{width:120px;color:var(--text2);flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-bg{flex:1;background:var(--bg3);border-radius:3px;height:6px;}
.bar-fill{height:6px;border-radius:3px;}

/* Vehicle card */
.vehicle-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;}
.vehicle-head{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;cursor:pointer;}
.vehicle-head:hover{background:var(--bg3);}
.vehicle-body{border-top:1px solid var(--border);}
.vehicle-tabs{display:flex;border-bottom:1px solid var(--border);}
.vtab{flex:1;padding:7px 4px;text-align:center;font-size:12px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;}
.vtab.active{color:var(--blue);border-bottom-color:var(--blue);}
.vehicle-panel{padding:14px;}

/* Booking card */
.booking-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.booking-card.upcoming{border-color:#B5D4F4;}

/* Info grid */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.info-item .info-label{font-size:11px;color:var(--text2);margin-bottom:2px;}
.info-item .info-val{font-size:13px;font-weight:500;}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text2);font-size:13px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Responsive */
@media(max-width:768px){
  .sidebar{position:fixed;left:-220px;top:0;bottom:0;z-index:100;transition:left .3s;}
  .sidebar.open{left:0;}
  .main{padding:16px;}
  .form-row{grid-template-columns:1fr;}
  .stats-row{grid-template-columns:1fr 1fr;}
}
.mobile-header{display:none;align-items:center;gap:12px;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);}
@media(max-width:768px){.mobile-header{display:flex;}}
.hamburger{background:none;border:none;cursor:pointer;padding:4px;color:var(--text);}

/* Doc pill */
.doc-pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;margin:3px;}

/* Payment row */
.pay-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.pay-row:last-child{border-bottom:none;}

/* Month bar */
.month-bar{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
.month-bar:last-child{border-bottom:none;}
</style>
</head>

// ─── INIT ───────────────────────────────────────────────────
async function init() {
  document.getElementById('loading-screen').style.display = 'flex';

  await seedTouquetIfEmpty();
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('page-content').style.display = 'block';
  showPage('dashboard');
}

// ─── NAVIGATION ─────────────────────────────────────────────
function showPage(page, navEl) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if(navEl) navEl.classList.add('active');
  else { const el = document.querySelector(`.nav-item[onclick*="${page}"]`); if(el) el.classList.add('active'); }
  const pages = { dashboard: renderDashboard, flotte: renderFlotte, elisa: renderElisa, airbnb: renderAirbnb, immo: renderImmo };
  if(pages[page]) pages[page]();
  if(window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

// ─── MODAL ──────────────────────────────────────────────────
function openModal(title, bodyHtml, saveCallback) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  modalSaveCallback = saveCallback;
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); modalSaveCallback = null; }
function modalSave() { if(modalSaveCallback) modalSaveCallback(); }

// ─── DASHBOARD ───────────────────────────────────────────────
async function renderDashboard() {
  set('page-content', '<div class="loading"><div class="spinner"></div> Chargement...</div>');
  const [vehicles, touquet, paris, elisaTasks] = await Promise.all([
    db.from('vehicles').select('*'),
    db.from('bookings_touquet').select('*'),
    db.from('bookings_paris').select('*'),
    db.from('elisa_tasks').select('*'),
  ]);
  const fleet = vehicles.data || [];
  const tq = touquet.data || [];
  const pa = paris.data || [];
  const tasks = elisaTasks.data || [];

  const inRepair = fleet.filter(v=>v.statut==='repare').length;
  const inRent = fleet.filter(v=>v.loyer>0).reduce((s,v)=>s+v.loyer,0);
  const upcomingTQ = tq.filter(b=>b.arrive&&new Date(b.arrive)>=today()&&!b.annule).length;
  const upcomingPA = pa.filter(b=>b.arrive&&new Date(b.arrive)>=today()&&!b.annule).length;
  const openTasks = tasks.filter(t=>!t.done).length;

  // Elisa semaine
  const REF = new Date(2025,3,2);
  const now = today();
  const diff = Math.floor((now-REF)/(1000*60*60*24));
  const cycle = ((diff%14)+14)%14;
  const isPapa = cycle<=5;

  let html = `
  <div class="page-header">
    <div><div class="page-title">Bonjour Olivier</div><div class="page-sub">${new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div></div>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-label">Véhicules flotte</div><div class="stat-val">${fleet.length}</div></div>
    <div class="stat"><div class="stat-label">En réparation</div><div class="stat-val" style="color:var(--red);">${inRepair}</div></div>
    <div class="stat"><div class="stat-label">Revenus location</div><div class="stat-val" style="color:var(--green);">${fmt(inRent)}€</div></div>
    <div class="stat"><div class="stat-label">Résa AirBnB</div><div class="stat-val" style="color:var(--blue);">${upcomingTQ+upcomingPA}</div></div>
    <div class="stat"><div class="stat-label">Semaine Elisa</div><div class="stat-val" style="font-size:14px;color:${isPapa?'var(--green)':'var(--pink)'};">${isPapa?'Papa':'Maman'}</div></div>
    <div class="stat"><div class="stat-label">Tâches Elisa</div><div class="stat-val">${openTasks}</div></div>
  </div>`;

  // Alertes
  const alerts = [];
  fleet.filter(v=>v.statut==='repare').forEach(v=>alerts.push({type:'red',msg:`${v.nom} est en réparation`}));
  fleet.filter(v=>v.loyer>0&&Math.abs(v.jpay-new Date().getDate())<=2).forEach(v=>alerts.push({type:'warn',msg:`Paiement attendu : ${v.client} (${v.nom}) le ${v.jpay}`}));
  const nextTQ = tq.filter(b=>b.arrive&&new Date(b.arrive)>=today()&&!b.annule).sort((a,b)=>new Date(a.arrive)-new Date(b.arrive))[0];
  if(nextTQ) {
    const daysUntil = Math.ceil((new Date(nextTQ.arrive)-today())/(1000*60*60*24));
    if(daysUntil<=7) alerts.push({type:'warn',msg:`Arrivée Touquet dans ${daysUntil}j : ${nextTQ.client}`});
  }
  if(alerts.length) html+=alerts.map(a=>`<div class="alert alert-${a.type}">${a.msg}</div>`).join('');

  html+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px;">
    <div class="card">
      <div class="card-title">Prochaines réservations Le Touquet</div>
      ${tq.filter(b=>b.arrive&&new Date(b.arrive)>=today()&&!b.annule).sort((a,b)=>new Date(a.arrive)-new Date(b.arrive)).slice(0,4).map(b=>`
        <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;">
          <div><strong>${b.client}</strong><br><span style="color:var(--text2);font-size:12px;">${fmtShort(b.arrive)} → ${fmtShort(b.depart)}</span></div>
          <div style="text-align:right;"><span class="badge ${b.source==='AirBNB'?'badge-red':'badge-green'}">${b.source}</span><br><span style="font-size:12px;color:var(--green);">${fmt((b.airbnb||0)+(b.direct||0))}€</span></div>
        </div>`).join('')||'<div style="color:var(--text2);font-size:13px;padding:8px 0;">Aucune réservation</div>'}
    </div>
    <div class="card">
      <div class="card-title">Flotte — Revenus mensuels</div>
      ${fleet.filter(v=>v.loyer>0).map(v=>`
        <div class="pay-row">
          <div><div style="font-size:13px;font-weight:500;">${v.nom}</div><div style="font-size:12px;color:var(--text2);">${v.client} · le ${v.jpay}</div></div>
          <div style="font-size:14px;font-weight:600;color:var(--green);">${fmt(v.loyer)}€</div>
        </div>`).join('')||'<div style="color:var(--text2);font-size:13px;">Aucun loyer configuré</div>'}
      ${fleet.filter(v=>v.loyer>0).length?`<div style="padding-top:8px;display:flex;justify-content:space-between;font-weight:600;font-size:13px;border-top:1px solid var(--border);margin-top:4px;"><span>Total mensuel</span><span style="color:var(--green);">${fmt(inRent)}€</span></div>`:''}
    </div>
  </div>`;

  set('page-content', html);
}

// ─── FLOTTE ──────────────────────────────────────────────────
let fleetData = [];
let openVehicles = {};
let openVehicleTabs = {};
let fleetFilter = 'tous';

async function renderFlotte() {
  set('page-content','<div class="loading"><div class="spinner"></div> Chargement de la flotte...</div>');
  const {data} = await db.from('vehicles').select('*').order('nom');
  fleetData = data || [];
  renderFletteHTML();
}

function renderFletteHTML() {
  const counts = {standby:0,court:0,long:0,repare:0,leasing:0};
  fleetData.forEach(v=>{if(counts[v.statut]!==undefined)counts[v.statut]++;});
  const revenu = fleetData.filter(v=>v.loyer>0).reduce((s,v)=>s+v.loyer,0);

  let html = `<div class="page-header">
    <div><div class="page-title">Flotte Ferdinand</div><div class="page-sub">${fleetData.length} véhicules · ${fmt(revenu)}€/mois revenus location</div></div>
    <button class="btn btn-primary" onclick="openAddVehicle()">+ Véhicule</button>
  </div>
  <div class="stats-row">
    <div class="stat"><div class="stat-label">Stand by</div><div class="stat-val" style="color:var(--green);">${counts.standby}</div></div>
    <div class="stat"><div class="stat-label">En location</div><div class="stat-val" style="color:var(--amber);">${counts.court+counts.long}</div></div>
    <div class="stat"><div class="stat-label">Réparation</div><div class="stat-val" style="color:var(--red);">${counts.repare}</div></div>
    <div class="stat"><div class="stat-label">Leasing</div><div class="stat-val">${counts.leasing}</div></div>
    <div class="stat"><div class="stat-label">Revenus/mois</div><div class="stat-val" style="color:var(--green);">${fmt(revenu)}€</div></div>
  </div>
  <div class="filters">
    ${['tous','standby','court','long','repare','leasing'].map(f=>`<button class="filter-pill${f===fleetFilter?' active':''}" onclick="setFleetFilter('${f}')">${f==='tous'?'Tous':STATUS_LABELS[f]}</button>`).join('')}
  </div>
  <div class="search-wrap"><span class="search-icon">🔍</span><input class="search-box" id="fleet-search" placeholder="Rechercher..." oninput="renderFleetList()"></div>
  <div id="fleet-list"></div>`;

  set('page-content', html);
  renderFleetList();
}

function setFleetFilter(f) { fleetFilter=f; renderFletteHTML(); }

function renderFleetList() {
  const q = (document.getElementById('fleet-search')||{}).value||'';
  let list = fleetFilter==='tous' ? [...fleetData] : fleetData.filter(v=>v.statut===fleetFilter);
  if(q) list = list.filter(v=>(v.nom+v.immat+(v.client||'')).toLowerCase().includes(q.toLowerCase()));

  const html = list.map(v => {
    const isOpen = openVehicles[v.id];
    const tab = openVehicleTabs[v.id]||'infos';
    const loyerLine = v.loyer?`<div style="font-size:12px;color:var(--text2);margin-top:3px;">${v.client} · <strong>${fmt(v.loyer)}€/mois</strong> · le ${v.jpay}</div>`:v.client?`<div style="font-size:12px;color:var(--text2);margin-top:3px;">${v.client}</div>`:'';

    let body = '';
    if(isOpen) {
      const tabs = `<div class="vehicle-tabs">
        ${['infos','entretien','docs','taches'].map(t=>`<button class="vtab${tab===t?' active':''}" onclick="setVTab('${v.id}','${t}')">${{infos:'Infos',entretien:'Entretien',docs:'Documents',taches:'Tâches'}[t]}</button>`).join('')}
      </div>`;

      let panel='';
      if(tab==='infos') panel=`<div class="info-grid">
        <div class="info-item"><div class="info-label">Immatriculation</div><div class="info-val">${v.immat||'—'}</div></div>
        <div class="info-item"><div class="info-label">Année</div><div class="info-val">${v.annee||'—'}</div></div>
        <div class="info-item"><div class="info-label">Couleur</div><div class="info-val">${v.couleur||'—'}</div></div>
        <div class="info-item"><div class="info-label">Transmission</div><div class="info-val">${v.trans||'—'}</div></div>
        <div class="info-item"><div class="info-label">Localisation</div><div class="info-val">${v.loc||'—'}</div></div>
        <div class="info-item"><div class="info-label">Détention</div><div class="info-val">${v.detention||'—'}</div></div>
        ${v.garage?`<div class="info-item"><div class="info-label">Garage</div><div class="info-val">${v.garage}</div></div>`:''}
      </div>
      ${v.notes?`<div style="margin-top:10px;font-size:12px;color:var(--text2);font-style:italic;">${v.notes}</div>`:''}
      <div style="margin-top:12px;display:flex;gap:8px;"><button class="btn btn-sm" onclick="openEditVehicle('${v.id}')">Modifier ↗</button></div>`;

      else if(tab==='entretien') {
        const warn = v.prochain&&new Date(v.prochain)<=new Date(Date.now()+30*24*60*60*1000);
        panel=`<div class="info-grid">
          <div class="info-item"><div class="info-label">Dernier entretien</div><div class="info-val">${v.entretien?fmtDate(v.entretien):'Non renseigné'}</div></div>
          <div class="info-item"><div class="info-label">Prochain entretien</div><div class="info-val" style="color:${warn?'var(--red)':'inherit'}">${v.prochain?fmtDate(v.prochain):'Non renseigné'}</div></div>
          <div class="info-item"><div class="info-label">Garage référent</div><div class="info-val">${v.garage||'Non renseigné'}</div></div>
        </div>
        ${warn?`<div class="alert alert-warn" style="margin-top:10px;">Entretien à venir : ${fmtDate(v.prochain)}</div>`:''}
        <div style="margin-top:12px;"><button class="btn btn-sm" onclick="openEditVehicle('${v.id}')">Modifier les dates ↗</button></div>`;
      }
      else if(tab==='docs') panel=`<div>${(v.docs||[]).map(d=>`<span class="doc-pill">📄 ${d}</span>`).join('')}<span class="doc-pill" style="border-style:dashed;cursor:pointer;" onclick="addDoc('${v.id}')">+ Ajouter</span></div>`;
      else if(tab==='taches') {
        const tasks = v.tasks||[];
        panel=`${tasks.length?tasks.map((t,i)=>`<div class="task-item"><div class="task-dot" style="background:var(--amber);"></div><span style="flex:1;">${t}</span><button onclick="removeVTask('${v.id}',${i})" style="border:none;background:none;cursor:pointer;color:var(--text3);font-size:16px;">×</button></div>`).join(''):'<div style="color:var(--text2);font-size:13px;padding:4px 0;">Aucune tâche</div>'}
        <div style="display:flex;gap:8px;margin-top:10px;"><input id="vt-${v.id}" placeholder="Nouvelle tâche..." style="flex:1;padding:6px 10px;border:1px solid var(--border2);border-radius:6px;font-size:13px;"><button class="btn btn-sm" onclick="addVTask('${v.id}')">+ Ajouter</button></div>`;
      }

      body = `<div class="vehicle-body">${tabs}<div class="vehicle-panel">${panel}</div></div>`;
    }

    return `<div class="vehicle-card">
      <div class="vehicle-head" onclick="toggleVehicle('${v.id}')">
        <div style="flex:1;">
          <div style="display:flex;gap:6px;margin-bottom:5px;flex-wrap:wrap;">
            <span class="badge ${STATUS_BADGE[v.statut]||'badge-gray'}">${STATUS_LABELS[v.statut]||v.statut}</span>
            <span class="badge badge-gray">${v.detention}</span>
            ${v.immat&&v.immat!=='—'?`<span style="font-size:11px;color:var(--text3);font-family:monospace;">${v.immat}</span>`:''}
          </div>
          <div style="font-weight:600;font-size:14px;">${v.nom}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px;">${v.loc||'—'}</div>
          ${loyerLine}
        </div>
        <span style="color:var(--text3);">${isOpen?'▲':'▼'}</span>
      </div>${body}
    </div>`;
  }).join('') || '<div style="color:var(--text2);padding:20px;text-align:center;">Aucun véhicule trouvé.</div>';

  set('fleet-list', html);
}

function toggleVehicle(id) { openVehicles[id]=!openVehicles[id]; if(!openVehicleTabs[id])openVehicleTabs[id]='infos'; renderFleetList(); }
function setVTab(id,tab) { openVehicleTabs[id]=tab; renderFleetList(); }

async function addVTask(id) {
  const inp=document.getElementById('vt-'+id);
  if(!inp||!inp.value.trim())return;
  const v=fleetData.find(x=>x.id===id);
  const tasks=[...(v.tasks||[]),inp.value.trim()];
  await db.from('vehicles').update({tasks}).eq('id',id);
  v.tasks=tasks; inp.value=''; renderFleetList();
}

async function removeVTask(id,idx) {
  const v=fleetData.find(x=>x.id===id);
  const tasks=(v.tasks||[]).filter((_,i)=>i!==idx);
  await db.from('vehicles').update({tasks}).eq('id',id);
  v.tasks=tasks; renderFleetList();
}

async function addDoc(id) {
  const name=prompt('Nom du document :'); if(!name)return;
  const v=fleetData.find(x=>x.id===id);
  const docs=[...(v.docs||[]),name];
  await db.from('vehicles').update({docs}).eq('id',id);
  v.docs=docs; renderFleetList();
}

// ─── ELISA ───────────────────────────────────────────────────
let elisaView='agenda';
let elisaTasks=[];
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth();

const VACANCES=[
  {label:'Printemps 2025',start:'2025-04-19',end:'2025-05-04'},
  {label:'Été 2025',start:'2025-07-05',end:'2025-08-31'},
  {label:'Toussaint 2025',start:'2025-10-18',end:'2025-11-02'},
  {label:'Noël 2025',start:'2025-12-20',end:'2026-01-04'},
  {label:'Hiver 2026',start:'2026-02-14',end:'2026-03-01'},
  {label:'Printemps 2026',start:'2026-04-11',end:'2026-04-26'},
];
const REF_PAPA=new Date(2025,3,2);

function getPeriod(date){
  for(const v of VACANCES){const s=new Date(v.start),e=new Date(v.end);e.setHours(23,59,59);if(date>=s&&date<=e)return{type:'vac',label:v.label};}
  const d=new Date(date);d.setHours(12);const ref=new Date(REF_PAPA);ref.setHours(12);
  const diff=Math.floor((d-ref)/(1000*60*60*24));
  const cycle=((diff%14)+14)%14;
  return{type:cycle<=5?'papa':'maman'};
}
function isVac(date){for(const v of VACANCES){const s=new Date(v.start),e=new Date(v.end);e.setHours(23,59,59);if(date>=s&&date<=e)return true;}return false;}
function isSchool(date){const dow=date.getDay();if(dow===0||dow===6||dow===3)return false;return!isVac(date);}
function isTrans(date){const d=new Date(date);d.setHours(12);const ref=new Date(REF_PAPA);ref.setHours(12);const diff=Math.floor((d-ref)/(1000*60*60*24));const cycle=((diff%14)+14)%14;return cycle===0||cycle===5;}

async function renderElisa(){
  set('page-content','<div class="loading"><div class="spinner"></div> Chargement...</div>');
  const {data}=await db.from('elisa_tasks').select('*').order('date');

  renderElisaHTML();
}

  let html=`<div class="page-header">

function renderElisaAgenda(){
  const first=new Date(calYear,calMonth,1),last=new Date(calYear,calMonth+1,0);
  const startDow=(first.getDay()+6)%7;
  const monthLabel=first.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
  const todayStr=today().toISOString().split('T')[0];

  let html=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
    <button class="btn btn-sm" onclick="calPrev()">←</button>
    <span style="font-size:15px;font-weight:600;flex:1;text-align:center;">${monthLabel.charAt(0).toUpperCase()+monthLabel.slice(1)}</span>
    <button class="btn btn-sm" onclick="calNext()">→</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:10px;font-size:12px;flex-wrap:wrap;">
    <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#E1F5EE;border:1px solid #9FE1CB;display:inline-block;"></span>Papa</span>
    <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#FBEAF0;border:1px solid #F4C0D1;display:inline-block;"></span>Maman</span>
    <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#C0DD97;display:inline-block;"></span>Vacances papa</span>
    <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#F0997B;display:inline-block;"></span>Vacances maman</span>
  </div>
  <div class="cal-grid">
    ${['Lu','Ma','Me','Je','Ve','Sa','Di'].map(d=>`<div class="cal-head">${d}</div>`).join('')}
    ${Array(startDow).fill('<div class="cal-day cal-day-empty"></div>').join('')}`;

  for(let d=1;d<=last.getDate();d++){
    const date=new Date(calYear,calMonth,d);
    const p=getPeriod(date);
    const vac=isVac(date);
    const trans=isTrans(date);
    const school=isSchool(date);
    const dow=date.getDay();
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=dateStr===todayStr;

    let cls='cal-day ';
    if(vac) cls+=p.type==='papa'?'cal-day-vac-papa':'cal-day-vac-maman';
    else cls+=p.type==='papa'?'cal-day-papa':'cal-day-maman';

    let pills='';
    if(school&&p.type==='papa'){if(dow!==3)pills+=`<span class="cal-pill" style="background:#B5D4F4;color:#0C447C;">Dépôt 8h20</span>`;}
    if(dow===3&&p.type==='papa'&&!vac)pills+=`<span class="cal-pill" style="background:#CECBF6;color:#3C3489;">Danse 15h30</span>`;
    if(trans)pills+=`<span class="cal-pill" style="background:#FAC775;color:#633806;">${dow===3?'→ Papa':'→ Maman'}</span>`;

    html+=`<div class="${cls}" style="${isToday?'outline:2px solid var(--blue);outline-offset:-2px;':''}">
      <div class="cal-day-num">${d}${isToday?' ●':''}</div>${pills}
    </div>`;
  }
  html+=`</div>`;
  set('elisa-view',html);
}

function calPrev(){if(calMonth===0){calMonth=11;calYear--;}else calMonth--;renderElisaAgenda();}
function calNext(){if(calMonth===11){calMonth=0;calYear++;}else calMonth++;renderElisaAgenda();}

function renderElisaSemaine(){
  const now=today();const dow=(now.getDay()+6)%7;
  const mon=new Date(now);mon.setDate(mon.getDate()-dow);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(d.getDate()+i);return d;});
  const dayNames=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];

  let html='';
  days.forEach((date,i)=>{
    const p=getPeriod(date);const vac=isVac(date);const school=isSchool(date);

    const isToday=date.getTime()===now.getTime();
    const evts=[];
    if(school&&isPapa&&dow2!==3)evts.push({t:'Dépôt école',s:'8h15–8h20 · Florian',c:'#B5D4F4',tc:'#0C447C'});

    if(trans)evts.push({t:dow2===3?'Début semaine papa':'→ Maman',s:dow2===3?'Arrivée mercredi après-midi':'Dépôt école puis Magali',c:'#FAC775',tc:'#633806'});

    html+=`<div style="background:${isPapa?'#E1F5EE':'#FBEAF0'};border:1px solid ${isPapa?'#9FE1CB':'#F4C0D1'};border-radius:10px;padding:10px 14px;margin-bottom:8px;${isToday?'outline:2px solid var(--blue);outline-offset:-2px;':''}">

  const rev2025=bookings.filter(b=>b.arrive&&b.arrive.startsWith('2025')&&!b.annule).reduce((s,b)=>s+(b.airbnb||0)+(b.direct||0),0);

  let html=`<div class="page-header">

  if(airbnbView==='reservations') renderAirbnbResas();
  else renderAirbnbCompta();
}

function renderAirbnbResas(){
  const bookings=airbnbBien==='touquet'?tqBookings:paBookings;
  const sorted=[...bookings].sort((a,b)=>new Date(a.arrive)-new Date(b.arrive));
  const groups={};
  sorted.forEach(b=>{const k=(b.arrive||'0000-00').substring(0,7);if(!groups[k])groups[k]=[];groups[k].push(b);});

  let html='<div class="filters"><button class="filter-pill active" id="resa-filter-upcoming" onclick="filterResaView(\'upcoming\',this)">À venir</button><button class="filter-pill" onclick="filterResaView(\'tous\',this)">Toutes</button></div><div id="resa-list">';

  Object.keys(groups).sort().forEach(month=>{
    const [y,m]=month.split('-');
    const label=new Date(parseInt(y),parseInt(m)-1,1).toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
    html+=`<div class="resa-month-header" data-month="${month}" style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:12px 0 6px;">${label}</div>`;
    groups[month].forEach(b=>{
      const rev=(b.airbnb||0)+(b.direct||0)+(b.montant||0);
      const isUp=b.arrive&&new Date(b.arrive)>=today()&&!b.annule;
      const nights=b.arrive&&b.depart?Math.ceil((new Date(b.depart)-new Date(b.arrive))/(1000*60*60*24)):null;
      html+=`<div class="booking-card${isUp?' upcoming':''} resa-item${isUp?' is-upcoming':''}" style="${b.annule?'opacity:.4;':''}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
          <div style="flex:1;">
            <div style="display:flex;gap:6px;margin-bottom:5px;flex-wrap:wrap;">
              <span class="badge ${b.source==='AirBNB'?'badge-red':b.source==='Gens de Confiance'?'badge-purple':'badge-green'}">${b.source||'—'}</span>
              ${b.annule?'<span class="badge badge-gray">Annulé</span>':''}
              ${b.pax?`<span style="font-size:11px;color:var(--text2);">${b.pax} pers.</span>`:''}
              ${nights?`<span style="font-size:11px;color:var(--text2);">${nights} nuits</span>`:''}
            </div>
            <div style="font-weight:600;font-size:14px;">${b.client}</div>
            <div style="font-size:12px;color:var(--text2);margin-top:2px;">${fmtShort(b.arrive)} → ${fmtShort(b.depart)}</div>
            ${b.notes?`<div style="font-size:12px;color:var(--text3);font-style:italic;margin-top:2px;">${b.notes}</div>`:''}
          </div>
          <div style="text-align:right;flex-shrink:0;">
            ${rev>0?`<div style="font-weight:600;font-size:15px;color:var(--green);">${fmt(rev)}€</div>`:''}
            <button onclick="deleteBooking('${b.id}')" style="margin-top:6px;display:block;font-size:11px;padding:2px 8px;border-radius:5px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--text2);">Suppr.</button>
          </div>
        </div>
      </div>`;
    });
  });
  html+='</div>';
  set('airbnb-view',html);
  filterResaView('upcoming',document.getElementById('resa-filter-upcoming'));
}

function filterResaView(f,btn){
  document.querySelectorAll('.resa-item').forEach(el=>{
    el.style.display=(f==='tous'||el.classList.contains('is-upcoming'))?'block':'none';
  });
  document.querySelectorAll('.resa-month-header').forEach(h=>{
    if(f==='upcoming'){
      const month=h.dataset.month;const hasUp=tqBookings.concat(paBookings).some(b=>b.arrive&&b.arrive.startsWith(month)&&new Date(b.arrive)>=today()&&!b.annule);
      h.style.display=hasUp?'block':'none';
    }else h.style.display='block';
  });
  document.querySelectorAll('.filter-pill').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
}

function renderAirbnbCompta(){
  const bookings=airbnbBien==='touquet'?tqBookings:paBookings;
  const years=['2023','2024','2025','2026'];
  let html='<div class="card"><div class="card-title">Revenus par année</div>';
  const yearRevs=years.map(y=>{
    const yb=bookings.filter(b=>b.arrive&&b.arrive.startsWith(y)&&!b.annule);
    const ab=yb.reduce((s,b)=>s+(b.airbnb||0),0);
    const dir=yb.reduce((s,b)=>s+(b.direct||0)+(b.montant||0),0);
    return{y,ab,dir,total:ab+dir,n:yb.length};
  });
  const maxRev=Math.max(...yearRevs.map(r=>r.total),1);
  yearRevs.forEach(r=>{
    const pct=Math.round(r.total/maxRev*100);
    html+=`<div class="bar-row">
      <span class="bar-label">${r.y} (${r.n} résa)</span>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:var(--green);"></div></div>
      <span style="width:80px;text-align:right;font-weight:600;font-size:13px;">${fmt(r.total)}€</span>
    </div>`;
  });
  const tot=bookings.filter(b=>!b.annule).reduce((s,b)=>s+(b.airbnb||0)+(b.direct||0)+(b.montant||0),0);
  html+=`<div style="border-top:1px solid var(--border);padding-top:10px;margin-top:8px;display:flex;justify-content:space-between;font-weight:600;"><span>Total cumulé</span><span style="color:var(--green);">${fmt(tot)}€</span></div></div>`;

  if(airbnbBien==='touquet'){
    html+=`<div class="card"><div class="card-title">Données rapport AirBnB officiel</div>
      <table class="table">
        <tr><td style="color:var(--text2);">Revenus bruts AirBnB</td><td style="text-align:right;font-weight:600;">125 344€</td></tr>
        <tr><td style="color:var(--text2);">Frais de service AirBnB</td><td style="text-align:right;color:var(--red);">-4 512€</td></tr>
        <tr><td style="color:var(--text2);">Total net versé AirBnB</td><td style="text-align:right;font-weight:600;color:var(--green);">120 832€</td></tr>
        <tr><td style="color:var(--text2);">Taxes reversées par AirBnB</td><td style="text-align:right;">3 610€</td></tr>
      </table>
    </div>`;
  } else {
    html+=`<div class="card"><div class="card-title">Données rapport AirBnB officiel</div>
      <table class="table">
        <tr><td style="color:var(--text2);">Revenus bruts AirBnB</td><td style="text-align:right;font-weight:600;">42 608€</td></tr>
        <tr><td style="color:var(--text2);">Frais de service AirBnB</td><td style="text-align:right;color:var(--red);">-1 453€</td></tr>
        <tr><td style="color:var(--text2);">Total net versé AirBnB</td><td style="text-align:right;font-weight:600;color:var(--green);">38 650€</td></tr>
        <tr><td style="color:var(--text2);">Taxes reversées par AirBnB</td><td style="text-align:right;">4 363€</td></tr>
      </table>
    </div>`;
  }
  set('airbnb-view',html);
}

function openAddBooking(){
  const table=airbnbBien==='touquet'?'bookings_touquet':'bookings_paris';
  openModal(`Nouvelle réservation — ${airbnbBien==='touquet'?'Le Touquet':'Paris'}`, `
    <div class="form-group"><label class="form-label">Client</label><input class="form-input" id="nb-client"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Source</label><select class="form-input" id="nb-source"><option value="AirBNB">AirBnB</option><option value="Direct">Direct</option><option value="Gens de Confiance">Gens de Confiance</option></select></div>
      <div class="form-group"><label class="form-label">Personnes</label><input class="form-input" type="number" id="nb-pax"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Arrivée</label><input class="form-input" type="date" id="nb-arrive"></div>
      <div class="form-group"><label class="form-label">Départ</label><input class="form-input" type="date" id="nb-depart"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Montant AirBnB (€)</label><input class="form-input" type="number" id="nb-airbnb"></div>
      <div class="form-group"><label class="form-label">Montant Direct (€)</label><input class="form-input" type="number" id="nb-direct"></div>
    </div>
    <div class="form-group"><label class="form-label">Notes</label><textarea class="form-input" id="nb-notes" rows="2"></textarea></div>`,
  async () => {
    const b={id:'b'+Date.now(),client:document.getElementById('nb-client').value,source:document.getElementById('nb-source').value,arrive:document.getElementById('nb-arrive').value||null,depart:document.getElementById('nb-depart').value||null,pax:parseInt(document.getElementById('nb-pax').value)||null,airbnb:parseFloat(document.getElementById('nb-airbnb').value)||0,direct:parseFloat(document.getElementById('nb-direct').value)||0,notes:document.getElementById('nb-notes').value,annule:false};
    if(!b.client){alert('Client requis');return;}
    const {data}=await db.from(table).insert(b).select();
    if(data){if(airbnbBien==='touquet')tqBookings.push(data[0]);else paBookings.push(data[0]);}
    closeModal();renderAirbnbHTML();
  });
}

async function deleteBooking(id){
  if(!confirm('Supprimer cette réservation ?'))return;
  const table=airbnbBien==='touquet'?'bookings_touquet':'bookings_paris';
  await db.from(table).delete().eq('id',id);
  if(airbnbBien==='touquet')tqBookings=tqBookings.filter(b=>b.id!==id);else paBookings=paBookings.filter(b=>b.id!==id);
  renderAirbnbHTML();
}
